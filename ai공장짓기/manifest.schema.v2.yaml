# =====================================================================
# manifest.schema.v2.yaml — 스킬 팩토리 v2 매니페스트 스키마
#
# 배경: decision-log_skill-factory-architecture.md 참고.
#   폴더복제는 "꽃집 1개까지만" 유지하고, 3번째 도메인(방역)부터
#   core+plugin으로 전환하기로 함(Fable 5 결정, 2026-07-06).
#   이 파일은 그 전환에 대비해 stage 기반 파이프라인 골격을 먼저
#   문서화한 v2 스키마 초안이다 — 아직 코드 구현 전, 설계 문서.
#
# 예시 도메인: 꽃집(flower_shop) 주문처리 파이프라인.
#   ASSUMPTION 표시가 붙은 부분은 이 스키마가 실제로 쓰이기 전에
#   사용자 확인이 필요함(임의로 확정하지 않음 — 요청사항 준수).
# =====================================================================

schema_version: v2

# ---------------------------------------------------------------------
# 0. 트리거(Triggers) — "이 파이프라인이 어떻게 시작되는지" 선언부
#    (2026-07-07 추가 — Fable 5 방역 스킬 아키텍처 결정 반영)
#
#    배경: 방역 스킬은 "손님 문의가 들어오면 시작"(event)과 "정기 방문주기
#    날짜가 되면 시작"(schedule) 두 가지 시작 방식이 공존해야 함. 기존 v2는
#    depends_on 기반 이벤트 순차실행만 표현 가능해 schedule 방식을 넣을
#    자리가 없었음 — 이 섹션으로 해결.
#
#    설계 원칙(Fable 5 결정): 스키마에는 "언제 시작되는지"만 선언한다.
#    schedule 타입의 실제 날짜 확인·실행 트리거링(매일/매시간 확인해서
#    버튼을 누르는 동작)은 스키마 밖의 아주 작은 별도 프로그램(스케줄러)이
#    담당하고, 스키마 자체에는 넣지 않는다 — 스키마를 무겁게 만들지 않기
#    위함. 즉 이 triggers 섹션은 "입구가 몇 개고 어디로 들어가는지"만
#    기술하는 선언적 목록이지, 스케줄링 엔진이 아니다.
# ---------------------------------------------------------------------
triggers:
  - type: event
    description: "외부 이벤트(문의 접수 등)가 들어오면 즉시 파이프라인 시작"
    source: "이벤트 종류 식별자(예: inquiry) — 어떤 입력 채널/이벤트가 이 트리거를 발생시키는지"
    entry_stage: "<stage_id> — 이 트리거가 발생했을 때 시작할 첫 stage"
  - type: schedule
    description: >
      정해진 시간 조건이 되면 파이프라인 시작. 조건 확인·실행 트리거링 자체는
      스키마 밖의 별도 스케줄러 프로그램이 수행하고, 여기서는 "무엇을 기준으로,
      어느 stage부터 시작하는지"만 선언한다.
    interval: "시간 조건 식별자(예: visit_cycle — 고객별 방문주기 도래 시점)"
    entry_stage: "<stage_id> — 이 스케줄이 도래했을 때 시작할 첫 stage"

# 예시(꽃집: 이벤트 트리거만 존재, schedule 트리거 없음 — 실제 인스턴스 없이 형태만):
#   triggers:
#     - type: event
#       source: order_inquiry
#       entry_stage: order_intake
#
# 예시(방역: event + schedule 공존 — 실제 인스턴스는 방역 manifest.yaml 참고):
#   triggers:
#     - type: event
#       source: inquiry
#       entry_stage: 수집봇
#     - type: schedule
#       interval: visit_cycle
#       entry_stage: 리마인더봇

# ---------------------------------------------------------------------
# 1. 공유 컨텍스트 객체 (Shared Context Object)  — 선행조건 1
#    모든 stage가 공유하는 단일 상태 객체. 필드마다 어느 stage가
#    쓰고(written_by) 어느 stage가 읽는지(read_by) 명시한다.
#    (정부지원사업 스킬에는 이런 명시적 공유객체가 없었음 — v2 신규)
# ---------------------------------------------------------------------
shared_context:

  order_raw_text:
    type: string
    description: >
      고객 주문 원문. 텍스트 채널 주문이면 그 텍스트 자체, 음성 채널이면
      STT 이전 원본(오디오 파일 URL 또는 통화 트랜스크립트 트리거)을 가리킴.
    written_by: [order_intake]
    read_by: [stt]
    # 확인됨(사용자, 2026-07-07, 실데이터 diff 로그 #1): 텍스트/음성 두 채널 모두 실재하나
    # 음성(전화)이 메인 흐름이고 텍스트(문자)는 보조 수단 — 애초 ASSUMPTION은 방향은 맞았지만
    # 비중을 반대로 가정하고 있었음. stt는 "가끔 스킵되는 부가 stage"가 아니라 핵심 stage이고,
    # source_type이 sms/kakao일 때만 예외적으로 스킵하는 조건부 라우팅이 필요함(v2에서는
    # run_if 필드로 표현 가능 — open_issues 참고).

  stt_result:
    type: string
    description: "음성 주문을 STT(음성인식)로 변환한 결과 텍스트."
    written_by: [stt]
    read_by: [clean_order]

  cleaned_order:
    type: object
    description: >
      정리된 주문 초안. 정부지원사업 스킬의 "신청서 초안"(draft_application)에
      대응하는 산출물 — 서술형/원문을 구조화된 데이터로 변환한 결과.
    properties:
      items:
        type: array
        items:
          type: object
          properties:
            name: { type: string }
            qty: { type: integer }
            unit_price_krw: { type: number }
      delivery_address: { type: string }
      requested_datetime: { type: string, format: date-time }
      customer_note: { type: string }
    written_by: [clean_order]
    read_by: [human_review, delivery_confirm, ledger_entry]

  review_comment:
    type: string
    description: >
      검수자(사람)가 정리본에 남긴 승인/반려 코멘트. 정부지원사업 스킬의
      "심사위원 모드 자기검수"(judge_mode_self_review)에 대응하되, v2에서는
      모델 self-check가 아니라 실제 사람이 수행하는 명시적 human stage로 분리.
    written_by: [human_review]
    read_by: [ledger_entry]

  delivery_photo_url:
    type: string
    format: uri
    description: "배송 완료 증빙 사진 URL."
    written_by: [delivery_confirm]
    read_by: [ledger_entry]

  ledger_record:
    type: object
    description: "최종 장부(매출/재고) 기록."
    properties:
      order_id: { type: string }
      amount_krw: { type: number }
      recorded_at: { type: string, format: date-time }
    written_by: [ledger_entry]
    read_by: []

# ---------------------------------------------------------------------
# 2. check 출력 스키마 — 선행조건 2 (제안 형태 그대로 채택)
# ---------------------------------------------------------------------
check_output_schema:

  self_check:              # kind: model 스테이지의 암묵적 자기검수
    type: object
    required: [pass, confidence, reason]
    properties:
      pass: { type: boolean }
      confidence: { type: number, minimum: 0, maximum: 1 }
      reason: { type: string }
    # NOTE: 정부지원사업 스킬의 judge_mode_self_review는 rejection_risks(array)까지
    # 반환했음. v2 최소형은 3필드만 필수로 두고, risks 등 확장 필드는 stage별
    # 옵션으로 열어둔다(강제하지 않음) — 원본 이식 시 재검토 필요.

  human_gate:               # kind: human 스테이지의 명시적 검수
    type: object
    required: [pass, reviewer]
    properties:
      pass: { type: boolean }
      reviewer: { type: string }
      reason: { type: string }

  approval_block:           # [2026-07-07 신규 — Fable 5 결정: 방역 문서승인워크플로우(decision-log 7절) 반영]
    type: object
    description: >
      문서형 산출물(계약서/증명서/보고서 등, 도메인 무관)이 "완료/미완료"
      한 방향 흐름이 아니라 초안→승인대기→승인완료/반려의 반려-재작업
      루프를 거쳐야 할 때, 그 문서 객체 안에 내장하는 범용 하위 블록.
      새 shared_context 최상위 필드나 새 stage 종류를 만들지 않고, 기존
      문서 필드(예: 방역 manifest.yaml의 document_draft.report/certificate)
      안에 이 블록을 그대로 끼워 넣어 쓴다.

      함께 쓰는 관례 2가지(스키마 필드로 강제하지 않고 컨벤션으로만 문서화):
        - `approval_required` (boolean): 이 approval_block을 갖는 문서
          객체와 형제 필드로 둔다. 이 문서 종류가 애초에 승인 게이트를
          거쳐야 하는지 여부 — 도메인 인스턴스가 문서 타입별로 켜고 끔
          (예: 방역 manifest.yaml의 certificate.approval_required: true).
        - `locked` (boolean): 문서 객체 자기 자신의 필드(approval_block
          안에 넣지 않음). status가 승인완료로 바뀌면 locked=true로
          전환하고, 그 이후엔 그 버전을 수정하지 않고 새 버전(version+1)
          으로만 처리한다는 규칙을 문서화 관례로 둔다.
    required: [status, version]
    properties:
      status:
        type: string
        enum: [초안, 승인대기, 승인완료, 반려]
      version:
        type: integer
        description: "1부터 시작. 반려 후 재생성될 때마다 +1 — 이전 버전(반려된 것 포함)은 삭제하지 않고 version_history에 보존한다(감사 추적 목적)."
      approved_by: { type: string }
      approved_at: { type: string, format: date-time }
      rejection_reason: { type: string }
      rejection_target: >
        (선택) 반려 시 어느 갈래로 되돌아갈지 가리키는 식별자(문자열,
        값의 의미는 도메인 인스턴스가 정의). 이 stage의 on_fail.human_reject.
        return_to가 매핑(object) 형태로 선언돼 있으면, 실제 반려 결과에
        담긴 이 값을 key로 사용해 라우팅한다(아래 stage_fields.on_fail 참고).
      version_history:
        type: array
        description: >
          이전 버전들의 스냅샷 배열 — 반려된 버전을 포함해 삭제하지 않고
          보존한다. 항목 형식은 도메인 자유이나 최소 version/status/
          rejection_reason 정도를 권장.

# ---------------------------------------------------------------------
# 3. stage 공통 필드 정의 (문서화 목적 — 실제 인스턴스는 stages: 참고)
# ---------------------------------------------------------------------
stage_fields:
  id: "stage 고유 식별자 (string, 필수)"
  kind: "local | model | human (필수)"
  io:
    reads: "shared_context 필드명 목록"
    writes: "shared_context 필드명 목록"
  check: >
    kind=model → check_output_schema.self_check 참조 (선택, self-check 안 하는 local
    변환 stage라면 생략 가능). kind=human → check_output_schema.human_gate 참조(필수).
    kind=local → 보통 생략.
  on_fail:
    action: "retry | route_to_human | halt"
    human_reject:
      return_to: >
        (선행조건 3, [2026-07-07 확장 — Fable 5 결정: 방역 문서승인워크플로우
        decision-log 7절] 두 형태를 모두 지원, 하위호환 유지) —
          1) 단일 값(string) — "<stage_id>": 기존 방식 그대로. 반려 사유
             구분 없이 항상 이 stage로 되돌아간다. 기존 매니페스트(예:
             대표자검수의 return_to: null)는 전혀 안 바뀌고 그대로 동작한다.
          2) 매핑(object) — { "<rejection_target_key>": "<stage_id>", ... }:
             문서 하나가 여러 반려 사유(예: 표현오류 vs 데이터오류)를 가질
             수 있고, 사유마다 되돌아갈 지점이 달라야 할 때 쓴다. 이 stage의
             check_output_schema.approval_block.rejection_target 값을 key로
             찾아 해당 stage_id로 라우팅한다. 일치하는 key가 없으면 안전하게
             재시도를 중단한다(halt로 취급). 실사용 예시는 방역 manifest.yaml의
             "문서승인" stage 참고(표현오류 -> 문서생성봇, 데이터오류 ->
             현장완료입력봇).
          이 필드는 depends_on 그래프의 엣지가 아니라 "사람/실행기가 참고할
          메타데이터"다 — 반려-재작업 루프를 depends_on 순환으로 표현하지
          않는다(DAG 유지 원칙, 기존 return_to: null도 같은 성격이었음).
  depends_on: "선행 stage id 목록 (list)"
  run_if: >
    (선택, 2026-07-07 추가) 이 stage를 실행할지 말지를 가르는 조건. 생략하면
    "항상 실행"(기존과 동일 — 하위호환 깨지지 않음). 조건이 거짓이면 이
    stage는 건너뛰고(skip), 그 stage가 writes하는 shared_context 필드는
    비어있는 채로 다음 stage로 넘어간다 — 그 필드를 read_by하는 후속
    stage는 해당 필드가 없을 수 있음을 감안해야 한다(선택적 read로 취급).
    v2에서는 run_if를 형식 파서 없는 단순 조건 식별자/문자열로만 다룬다
    (예: "고객이_문서를_요청함") — 정식 표현식 언어(AND/OR/비교연산자 등)
    도입은 v3 후보로 남겨둔다. 실사용 예시는 방역 manifest.yaml의
    문서생성봇(run_if: 고객이_문서를_요청함) 참고.
  entry_points: >
    (선택, 2026-07-07 추가 — 방역 스킬의 "방문알림봇 이중 진입" 문제 해결
    목적) depends_on은 "이 stage 전에 반드시 끝나 있어야 하는 선행 stage
    목록"(AND 의미)만 표현할 수 있어, "서로 다른 트리거 경로 중 아무거나
    타고 들어올 수 있다"(OR 의미)는 표현이 안 됨 — 이 필드로 해결한다.
    형식은 문자열 목록이며 각 원소는 "<trigger.type>:<trigger 식별자>"
    (event면 trigger.source, schedule면 trigger.interval) 형태로, 최상단
    triggers 섹션에 실제 선언된 트리거를 가리켜야 한다. 예:
    entry_points: [event:inquiry, schedule:visit_cycle].

    중요한 원칙(Fable 5 결정 연장선 — 구조를 새로 발명하지 않음): 이 필드는
    "이 stage가 어느 트리거 계통에서도 도달 가능하다"는 것을 문서화하는
    선언일 뿐, depends_on 그래프 자체를 바꾸거나 대체하지 않는다.
    depends_on은 여전히 "가장 직접적인/주된 경로"(보통 event 경로)만 적어
    두면 되고, entry_points가 그 외의 대안 경로(예: 중간에 리마인더봇 같은
    schedule 전용 선행 stage를 거쳐 도달하는 경로)까지 포함해 전부 나열한다.
    즉 실행기 입장에서 "이 stage에 진입하는 방법에는 depends_on 경로 외에도
    entry_points에 나열된 트리거 계통들이 있다"는 것만 알면 되고, 그 계통의
    중간 stage(예: 리마인더봇)가 정확히 몇 단계를 거치는지는 이 필드가
    책임지지 않는다(그건 각 트리거의 entry_stage부터 시작하는 일반 depends_on
    체인이 이미 표현함). 실사용 예시는 방역 manifest.yaml의 방문알림봇 참고.
  async: "true/false — human stage는 기본 true(비동기 대기), local/model은 기본 false"
  tier: >
    haiku | sonnet | opus — kind=model 전용 (Sonnet 5 리뷰 지적 ④ 대응: local stage에는
    tier 축이 아예 없고 대신 exec_params를 쓴다. 서로 다른 stage kind가 서로 다른 실행
    파라미터 축을 갖는 것은 의도된 비대칭 — model은 "어떤 지능 수준", local은 "얼마나
    기다리고 몇 번 재시도할지"가 각각 의미있는 축이기 때문)
  exec_params:
    timeout_sec: "kind=local 전용(주로) — 외부 API(STT 등) 호출 1회의 최대 대기 시간"
    retry_count: "kind=local/model 공통 — self_check/실행 실패 시 자동 재시도 횟수. human은 사용 안 함(대신 on_fail.human_reject)"

# ---------------------------------------------------------------------
# 4. 예시: 꽃집(flower_shop) 주문처리 파이프라인
#    quality_gate 두 모드를 각 1개씩 포함:
#      - clean_order   : 암묵적 self-check (kind: model)
#      - human_review  : 명시적 human stage (kind: human)
# ---------------------------------------------------------------------
domain: flower_shop   # 이 예시 인스턴스가 속한 도메인 (참고용 — 스킬 자체의 domain 필드와 별개 개념)

stages:

  - id: order_intake
    kind: local
    io:
      reads: []
      writes: [order_raw_text]
    exec_params: { timeout_sec: 5, retry_count: 0 }
    depends_on: []
    async: false

  - id: stt
    kind: local
    io:
      reads: [order_raw_text]
      writes: [stt_result]
    exec_params: { timeout_sec: 30, retry_count: 2 }   # 외부 STT API 호출 — gap④ 대응 예시
    depends_on: [order_intake]
    async: false

  - id: clean_order                       # ← quality_gate 모드 1: 암묵적 self-check
    kind: model
    tier: sonnet
    io:
      reads: [stt_result]
      writes: [cleaned_order]
    check:
      mode: self_check
      schema_ref: check_output_schema.self_check
      example:
        pass: true
        confidence: 0.82
        reason: "품목/수량/배송지 모두 추출 완료, 배송 희망일시만 재확인 필요"
    on_fail:
      action: route_to_human    # self_check 실패(confidence 낮음) 시 human_review로 직행
      human_reject:
        return_to: null         # self_check 실패는 "반려"가 아니라 라우팅이므로 미사용
    exec_params: { retry_count: 1 }
    depends_on: [stt]
    async: false

  - id: human_review                      # ← quality_gate 모드 2: 명시적 human stage
    kind: human
    io:
      reads: [cleaned_order]
      writes: [review_comment]
    check:
      mode: human_gate
      schema_ref: check_output_schema.human_gate
      example:
        pass: false
        reviewer: "gombeck1@gmail.com"
        reason: "배송지 상세주소 누락 — 고객 재확인 필요"
    on_fail:
      action: retry
      human_reject:
        return_to: clean_order   # 반려 시 정리 단계로 복귀 (선행조건 3 예시 그대로 채택)
    depends_on: [clean_order]
    async: true

  - id: delivery_confirm
    kind: local
    io:
      reads: [cleaned_order]
      writes: [delivery_photo_url]
    exec_params: { timeout_sec: 10, retry_count: 1 }
    depends_on: [human_review]
    async: false

  - id: ledger_entry
    kind: model
    tier: haiku
    io:
      reads: [cleaned_order, review_comment, delivery_photo_url]
      writes: [ledger_record]
    check:
      mode: self_check
      schema_ref: check_output_schema.self_check
    on_fail:
      action: halt
    exec_params: { retry_count: 1 }
    depends_on: [delivery_confirm]
    async: false

# ---------------------------------------------------------------------
# 5. 묶음(bundle) 순차 처리 정책 — "1건 접수에 N건 산출물"일 때 처리 방식
#    (2026-07-07 사용자 결정)
# ---------------------------------------------------------------------
# 배경: 접수 1건(예: 통화 1건) 안에 독립된 처리 단위(예: 주문)가 여러 건
# 섞여 있을 수 있음. 분리(split) 이후 각 단위를 어떻게 처리할지가 미정
# 이었고, "동시에 여러 갈래로 나눠 처리(병렬 fan-out)"는 depends_on 그래프
# 로 표현할 방법이 없어 가장 큰 스키마 갭으로 남아 있었음
# (꽃집 12봇_kind분류표.yaml의 order_split_bot open_question 참고).
#
# 결정: 병렬 처리 안 함. 분리된 단위를 하나씩 순서대로 처리한다.
#   1번째가 파이프라인 끝(정리→검수→저장→배송→문자완료 등)까지 마친 뒤에야
#   2번째가 분리 이후 단계부터 다시 시작한다. → depends_on 그래프를 바꿀
#   필요 없음. "분리 stage 이후를 단위 개수만큼 반복 실행(순차 loop)"하는
#   실행기 레벨 정책으로 처리하고, 스키마에 병렬 분기 문법을 추가하지 않는다.
#
# 이를 위해 "처리 단위(예: 주문) 데이터"에 아래 2개 필드를 추가한다(도메인
# 무관, 재사용 가능한 패턴 — 실제 필드 배치는 각 도메인 인스턴스 파일 참고,
# 꽃집 예시는 12봇_kind분류표.yaml):
bundle_fields:
  bundle_id:
    type: string
    description: "이 단위가 어느 접수 묶음(예: 통화 1건)에서 나왔는지 식별하는 값"
  bundle_sequence:
    type: object
    properties:
      index: { type: integer, description: "이 묶음 안에서 몇 번째 단위인지 (1부터 시작)" }
      total: { type: integer, description: "이 묶음 안의 총 단위 개수" }
    description: >
      표시용 문자열은 "{index}번째 / 총 {total}개" 형식(예: "2번째 / 총 2개").
  bundle_status:
    type: string
    enum: [진행중, 완료]
    description: >
      묶음 전체 상태. 묶음 안의 모든 단위가 각자 파이프라인 끝까지 완료되면
      "완료"로 갱신한다 — 갱신 책임은 "마지막으로 완료되는 단위의 마지막
      stage"가 진다(예: 꽃집이라면 sms_ledger_bot).
#
# 채우는 시점: 분리 stage(꽃집 예: order_split_bot)가 분리와 동시에
# bundle_id/total을 확정해 각 단위에 실어 보낸다. index는 처리 순서(보통
# 발화/등장 순서)를 그대로 쓴다. bundle_status는 각 단위의 마지막 stage가
# 끝날 때 "이 묶음에서 아직 안 끝난 단위가 남았는지"를 확인해 갱신한다
# (구현 세부는 도메인 파이프라인 쪽 책임 — 여기선 필드 계약만 정의).

# ---------------------------------------------------------------------
# 6. 알려진 미해결 사항 (v3로 넘길 후보, 지금은 임의 확정하지 않음)
# ---------------------------------------------------------------------
open_issues:
  - "order_intake가 텍스트/음성 두 채널을 어떻게 구분해 라우팅하는지 미정의 (ASSUMPTION 참고, 비중은 확인됨: 음성 메인/텍스트 보조)"
  - "check_output_schema.self_check의 확장 필드(risks 등)를 언제 필수로 승격할지 미정"
  - "정부지원사업 원본 스킬을 이 v2 stage 구조로 이식할 때 3단계(공고매칭/신청서초안/심사위원)를 어떤 stage id로 매핑할지 미정 — 2026-07-07 정부지원_manifest_v2.yaml 작업에서 실제로 착수함(작업 B), 결과는 해당 파일 참고"
  - "gap④ 해결(exec_params 도입)로 v0.4.0 스타일 tier(low_cost/mid/high)와 v2 tier(haiku/sonnet/opus) 두 어휘가 공존 — 정부지원 역이식 시 어느 쪽을 정본으로 할지 미정, 일단 원본 값 보존 후 대응표만 병기(작업 B 참고)"
  - "[2026-07-07 해결] 조건부 stage 스킵 표현 수단 없음 — stage_fields에 run_if 필드를 추가해 해결. 조건이 거짓이면 해당 stage를 건너뛰고 writes 필드는 비어있는 채로 다음 stage로 진행(그 필드를 read_by하는 후속 stage는 선택적 read로 취급). 예: source_type이 sms/kakao인 텍스트 주문은 stt stage에 run_if 조건을 걸어 건너뛸 수 있음(이 스키마의 stt 예시엔 아직 실제로 걸지 않음 — shared_context에 source_type 필드가 없는 6필드 예시라서. 실사용 사례는 방역 manifest.yaml의 문서생성봇 run_if: 고객이_문서를_요청함 참고). 단, run_if는 단순 조건 식별자/문자열로만 취급하고 정식 표현식 파서 도입은 v3 후보로 남김."
  - "[2026-07-07 해결] event/schedule 트리거 공존 문제 — 최상단에 triggers 섹션을 추가해 해결(0번 섹션 참고). schedule 트리거의 실제 날짜확인·실행은 스키마 밖 별도 스케줄러 프로그램 책임으로 명확히 분리함(스키마는 무겁게 만들지 않음). 실사용 사례는 방역 manifest.yaml 참고."
  - "발신자 미상 시 이름 위치 기반 혼동이 정상 리스크 패턴이라는 게 실데이터로 확인됨(2026-07-07) — check_output_schema 자체를 바꿀 필요는 없지만, review_manager류 model stage의 check 로직이 '후보 2개 이상 남았을 때 자동으로 human_gate 강제 에스컬레이션'하는 규칙을 최소 1개는 갖고 있어야 한다는 게 실증됨. 아직 스키마 필드로 반영 안 함(꽃집 12봇 kind분류표.yaml에는 review_manager_bot 개별 사례로만 기록돼 있음, 스키마 레벨 일반화는 보류)"
  - "[2026-07-07 해결] 1건 접수→N건 산출물의 병렬 fan-out 문제: 사용자가 '병렬 대신 순차 처리'로 결정 — 위 5번 섹션(bundle_fields) 참고. 단, 이 결정은 '동시에 병렬 처리' 요구가 나중에 생기면 재검토가 필요하다는 전제이지, depends_on 그래프에 실제 병렬 분기 문법이 생긴 건 아님(순차 loop로 우회한 것)."
  - "[2026-07-07 해결] 방문알림봇(방역)처럼 한 stage가 서로 다른 트리거 경로(event/schedule) 양쪽에서 진입 가능한 경우, depends_on(AND 선행조건)만으로는 표현 불가 — stage_fields에 entry_points 필드를 추가해 해결. depends_on은 주 경로만 유지, entry_points가 대안 트리거 경로를 나열(예: [event:inquiry, schedule:visit_cycle]). 실사용 사례는 방역 manifest.yaml의 방문알림봇 참고."
  - "새로 추가된 triggers/run_if/entry_points 섹션·필드는 아직 검증 스크립트(ai공장짓기/scripts/validate_manifest.py)로 기초 수준만 점검됨(entry_points의 트리거 참조 무결성 등은 2026-07-07 검증 단계에서 추가 반영) — 정식 검증 항목 확대는 다음 라운드 과제"
  - "[2026-07-07 해결 — Fable 5 결정, decision-log_skill-factory-architecture.md 7절] 문서형 산출물(완료보고서·소독증명서 등)이 완료/미완료 일방향이 아니라 초안→승인대기→승인완료/반려 루프를 거쳐야 하는 경우를 표현할 수단이 없었음 — check_output_schema.approval_block(범용 승인 블록 패턴) 신규 추가로 해결. 문서 종류별 승인 필요 여부는 approval_required 플래그 컨벤션으로, 반려 사유별 복귀 경로는 on_fail.human_reject.return_to를 단일값(기존, 하위호환)뿐 아니라 매핑(object)도 허용하도록 확장해 표현. 실사용 사례는 방역 manifest.yaml의 문서승인 stage 참고. 이 확장으로 depends_on 그래프에 순환을 만들지 않는다는 원칙은 유지됨(return_to는 그래프 엣지가 아니라 메타데이터)."
