addEventListener('keydown',e=>{keys[e.key.toLowerCase()]=true;if(e.key.toLowerCase()==='z'){const h=document.getElementById('hud');h.style.display=h.style.display==='none'?'block':'none'}});
addEventListener('keyup',e=>keys[e.key.toLowerCase()]=false);
// 클릭 = 노드 정보
const ray=new THREE.Raycaster(),mouse=new THREE.Vector2();
addEventListener('click',e=>{mouse.x=e.clientX/innerWidth*2-1;mouse.y=-(e.clientY/innerHeight)*2+1;ray.setFromCamera(mouse,camera);
 const hit=ray.intersectObjects(meshes)[0];const box=document.getElementById('info');
 if(hit){const n=hit.object.userData;box.innerHTML='<b>'+n.id+'</b> <span style="opacity:.6">('+n.g+' · 연결 '+n.d+')</span><br>'+(n.x||'(내용 없음)');box.style.display='block'}else box.style.display='none'});
addEventListener('resize',()=>{camera.aspect=innerWidth/innerHeight;camera.updateProjectionMatrix();renderer.setSize(innerWidth,innerHeight)});
(function animate(){requestAnimationFrame(animate);
 if(keys['w'])camera.position.z-=4;if(keys['s'])camera.position.z+=4;
 if(keys['a'])camera.position.x-=4;if(keys['d'])camera.position.x+=4;
 group.rotation.y=ry+0.0004*performance.now()*0.05;group.rotation.x=rx;
 renderer.render(scene,camera)})();
</script></body></html>
