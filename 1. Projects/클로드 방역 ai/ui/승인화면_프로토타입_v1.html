<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>문서승인 화면 (프로토타입) — 방역&클린</title>
<style>
  :root{
    --bg:#0f1220;
    --card:#1a1f35;
    --card-hover:#232a4a;
    --text:#e8ecff;
    --text-dim:#9aa3c7;
    --accent:#7fd4ff;
    --primary:#2f6fed;
    --ok:#3a9d5f;
    --warn:#d9a53a;
    --fail:#e05a5a;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--bg);
    color:var(--text);
    font-family:"Pretendard","Malgun Gothic","맑은 고딕",-apple-system,BlinkMacSystemFont,sans-serif;
    font-size:15px;
    line-height:1.7;
    padding-bottom:40px;
  }
  .wrap{max-width:640px;margin:0 auto;padding:0 16px;}
  header.topbar{
    position:sticky;top:0;z-index:10;
    background:var(--bg);
    border-bottom:1px solid #262c4a;
    padding:14px 16px;
    display:flex;align-items:center;gap:12px;
  }
  header.topbar button.back{
    background:none;border:none;color:var(--text);
    font-size:20px;cursor:pointer;padding:4px 8px;border-radius:8px;
  }
  header.topbar button.back:hover{background:var(--card-hover);}
  header.topbar h1{font-size:22px;font-weight:700;margin:0;}
  .subtitle{color:var(--text-dim);font-size:14px;margin:2px 0 0;}

  section{padding:16px;}
  h2.section-title{font-size:18px;font-weight:700;margin:0 0 12px;}

  /* ---- 배지 ---- */
  .badge{
    display:inline-flex;align-items:center;gap:6px;
    padding:5px 10px;border-radius:999px;
    font-size:13px;font-weight:700;white-space:nowrap;
  }
  .badge .dot{width:9px;height:9px;border-radius:50%;display:inline-block;}
  .badge-초안{background:#262c4a;color:var(--text-dim);}
  .badge-초안 .dot{background:var(--text-dim);}
  .badge-승인대기{background:rgba(127,212,255,0.16);color:#bfeaff;}
  .badge-승인대기 .dot{background:var(--accent);}
  .badge-승인완료{background:rgba(58,157,95,0.18);color:#7cd99c;}
  .badge-승인완료 .dot{background:var(--ok);}
  .badge-반려{background:rgba(224,90,90,0.2);color:#ff9c9c;}
  .badge-반려 .dot{background:var(--fail);}
  .badge-ai{background:#262c4a;color:var(--text-dim);font-weight:600;}
  .badge-warn{background:rgba(217,165,58,0.18);color:#f0c877;}
  .badge-doctype{background:#1e2540;border:1px solid #3a4370;color:var(--accent);font-weight:600;}

  /* ---- 대기 큐 ---- */
  .queue-summary{
    color:var(--text-dim);font-size:14px;margin-bottom:14px;
    display:flex;flex-wrap:wrap;gap:8px 10px;align-items:center;
  }
  .doc-card{
    background:var(--card);
    border:1px solid #262c4a;
    border-radius:14px;
    padding:16px;
    margin-bottom:12px;
    cursor:pointer;
    transition:background .15s;
  }
  .doc-card:hover, .doc-card:active{background:var(--card-hover);}
  .doc-card .row1{display:flex;justify-content:space-between;align-items:center;gap:8px;margin-bottom:6px;}
  .doc-card .case-id{color:var(--text-dim);font-size:14px;font-weight:600;}
  .doc-card .headline{font-size:18px;font-weight:700;margin:2px 0 6px;}
  .doc-card .meta{color:var(--text-dim);font-size:14px;margin-bottom:8px;}
  .doctype-row{display:flex;flex-wrap:wrap;gap:8px;}
  .doctype-chip{
    display:flex;align-items:center;gap:6px;
    background:#12162a;border:1px solid #262c4a;border-radius:10px;
    padding:6px 10px;font-size:13px;
  }

  /* ---- 상세 화면 ---- */
  .case-header{
    background:var(--card);border:1px solid #262c4a;border-radius:14px;
    padding:16px;margin-bottom:14px;
  }
  .case-header .headline{font-size:19px;font-weight:700;margin:0 0 6px;}
  .case-header .meta-row{color:var(--text-dim);font-size:14px;display:flex;flex-wrap:wrap;gap:6px 14px;}

  .tabbar{display:flex;gap:8px;margin-bottom:14px;}
  .tabbtn{
    flex:1;padding:12px;border-radius:12px;border:1.5px solid #262c4a;
    background:var(--card);color:var(--text-dim);font-size:15px;font-weight:700;
    cursor:pointer;font-family:inherit;
  }
  .tabbtn.active{border-color:var(--accent);color:var(--accent);background:var(--card-hover);}

  .field-card{
    background:var(--card);
    border:1px solid #262c4a;
    border-radius:14px;
    padding:16px;
    margin-bottom:14px;
  }
  .field-card h3{margin:0 0 12px;font-size:16px;font-weight:700;display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
  .field-row{margin-bottom:14px;}
  .field-row:last-child{margin-bottom:0;}
  .field-label{
    display:flex;align-items:center;gap:8px;flex-wrap:wrap;
    font-size:14px;color:var(--text-dim);margin-bottom:6px;font-weight:600;
  }
  .field-note{font-size:12.5px;color:var(--text-dim);margin-top:5px;line-height:1.5;}
  input[type=text]{
    width:100%;
    background:#12162a;
    border:1.5px solid #262c4a;
    border-radius:10px;
    padding:12px;
    font-size:16px;
    color:var(--text);
    font-family:inherit;
  }
  input[type=text].warn-input{border-color:var(--warn);}
  input:disabled{opacity:.65;}

  .banner{
    border-radius:12px;padding:14px;margin-bottom:14px;
    display:flex;align-items:flex-start;gap:10px;font-weight:700;line-height:1.6;
    flex-direction:column;
  }
  .banner-lock{background:rgba(58,157,95,0.14);border:1px solid rgba(58,157,95,0.5);color:#7cd99c;}
  .banner-reject{background:rgba(224,90,90,0.12);border:1px solid rgba(224,90,90,0.4);color:#ffb3b3;}
  .banner-draft{background:rgba(154,163,199,0.1);border:1px dashed #3a4370;color:var(--text-dim);}
  .banner p{margin:4px 0 0;font-weight:400;font-size:13.5px;}

  /* ---- 원문 보기 ---- */
  .raw-toggle{
    width:100%;text-align:left;background:var(--card);
    border:1px solid #262c4a;border-radius:14px;
    padding:14px 16px;color:var(--text);font-size:15px;font-weight:700;
    cursor:pointer;margin-bottom:14px;
    display:flex;justify-content:space-between;align-items:center;font-family:inherit;
  }
  .raw-box{display:none;margin-top:-6px;margin-bottom:14px;}
  .raw-box.open{display:block;}
  .raw-item{
    background:#12162a;border:1px solid #262c4a;border-radius:10px;
    padding:14px;font-size:14px;white-space:pre-wrap;line-height:1.8;
  }

  /* ---- 버튼 ---- */
  .btn{
    display:block;width:100%;
    border:none;border-radius:12px;
    padding:14px 16px;
    font-size:16px;font-weight:700;
    cursor:pointer;margin-bottom:10px;
    font-family:inherit;
  }
  .btn:disabled{opacity:.4;cursor:not-allowed;}
  .btn-approve{background:var(--ok);color:#06170c;}
  .btn-reject{background:transparent;border:1.5px solid var(--fail);color:#ff9c9c;}
  .btn-secondary{background:#2a3050;color:var(--text);}
  .btn-send{background:var(--primary);color:#fff;}
  .btn-row-note{font-size:13px;color:var(--text-dim);margin:-2px 0 14px;text-align:center;}

  .version-history{font-size:13px;color:var(--text-dim);margin-top:14px;}
  .version-history .vh-item{padding:7px 0;border-top:1px solid #232848;}

  .send-gate{display:flex;flex-direction:column;gap:6px;margin-bottom:12px;}
  .send-gate-item{display:flex;justify-content:space-between;align-items:center;font-size:14px;padding:8px 10px;background:#12162a;border-radius:10px;}

  /* ---- 모달 ---- */
  .modal-backdrop{
    display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);
    align-items:flex-end;justify-content:center;z-index:100;
  }
  .modal-backdrop.open{display:flex;}
  .modal{
    background:var(--card);border-radius:18px 18px 0 0;
    padding:20px 18px 24px;width:100%;max-width:640px;
    max-height:88vh;overflow-y:auto;
  }
  .modal h3{margin:0 0 6px;font-size:19px;}
  .modal p.hint{color:var(--text-dim);font-size:14px;margin:0 0 16px;line-height:1.6;}
  .modal label{display:block;font-size:14px;font-weight:700;color:var(--text-dim);margin-bottom:6px;margin-top:14px;}
  .modal textarea{
    width:100%;background:#12162a;border:1.5px solid var(--fail);border-radius:10px;
    padding:12px;font-size:16px;color:var(--text);font-family:inherit;resize:vertical;
  }
  .modal select{
    width:100%;background:#12162a;border:1.5px solid #262c4a;border-radius:10px;
    padding:12px;font-size:15px;color:var(--text);font-family:inherit;
  }
  .modal .route-note{
    background:rgba(127,212,255,0.1);border:1px solid rgba(127,212,255,0.35);
    border-radius:10px;padding:12px;font-size:13.5px;color:var(--accent);line-height:1.6;margin-top:10px;
  }
  .modal .modal-actions{display:flex;gap:10px;margin-top:20px;}
  .modal .modal-actions .btn{margin-bottom:0;}

  .hidden{display:none !important;}
  .toast{
    position:fixed;left:50%;bottom:24px;transform:translateX(-50%);
    background:#1a1f35;border:1px solid var(--accent);color:var(--text);
    padding:14px 18px;border-radius:12px;font-size:15px;max-width:90vw;
    box-shadow:0 8px 24px rgba(0,0,0,.4);z-index:200;
  }
</style>
</head>
<body>

<header class="topbar">
  <button class="back hidden" id="backBtn" onclick="backToQueue()">←</button>
  <div>
    <h1 id="topTitle">문서승인</h1>
    <p class="subtitle" id="topSubtitle">방역&클린 · 문서승인(대표자) 화면 (프로토타입)</p>
  </div>
</header>

<div class="wrap">

  <!-- ================= 대기 큐 화면 ================= -->
  <section id="queueView">
    <h2 class="section-title" id="queueTitle">문서승인 대기</h2>
    <div class="queue-summary" id="queueSummary"></div>
    <div id="queueList"></div>
  </section>

  <!-- ================= 상세 승인 화면 ================= -->
  <section id="detailView" class="hidden"></section>

</div>

<!-- 반려 모달 -->
<div class="modal-backdrop" id="rejectModal">
  <div class="modal">
    <h3>반려 (되돌리기)</h3>
    <p class="hint">반려 사유를 반드시 입력해야 합니다. 반려 종류에 따라 되돌아가는 단계가 다릅니다
      (manifest.yaml의 문서승인 stage · on_fail.human_reject.return_to 정의 그대로).</p>

    <label for="rejectReason">반려 사유 (필수)</label>
    <textarea id="rejectReason" rows="3" placeholder="예: 사용 약품명이 현장 시공 내역과 다릅니다"></textarea>

    <label for="rejectTarget">반려 종류</label>
    <select id="rejectTarget" onchange="updateRouteNote()">
      <option value="표현오류">표현오류 — 문구·서식만 잘못됨</option>
      <option value="데이터오류">데이터오류 — 현장 데이터 자체가 틀림</option>
    </select>

    <div class="route-note" id="routeNote"></div>

    <div class="modal-actions">
      <button class="btn btn-secondary" style="flex:1" onclick="closeRejectModal()">취소</button>
      <button class="btn btn-reject" style="flex:1;border-color:var(--fail)" onclick="submitReject()">반려 확정</button>
    </div>
  </div>
</div>

<div id="toast" class="toast hidden"></div>

<script>
/* =====================================================================
   데이터 출처: test/새문서_합성테스트_12건.yaml (12건 합성 테스트 픽스처,
   run.py 구조 테스트 전용 — 실제 고객 데이터 아님, 파일 주석에도 명시돼 있음).
   business_info는 golden_set.yaml의 사업자 정보(2026-07-15 대표님 인터뷰
   실답변)를 그대로 옮김: 상호 방역&클린 / 대표자 김남오 /
   사업자등록번호 404-46-00762 / 소재지 경상남도 진주시 향교로 114-2 1층(옥봉동).
   문서 본문 필드(처리내용/소독내용종류 등)는 위 실제 필드(현장명·사용약품·
   방문일)에서 템플릿 문구로 조합한 것이며, 실시면적/소재지(현장)/관리자확인/
   담당자/다음방문예정일처럼 픽스처에 아예 없는 값은 지어내지 않고
   "확인 필요"(warn) 빈칸으로 남겼습니다.
   ===================================================================== */

const BUSINESS_INFO = {
  상호명: "방역&클린",
  대표자명: "김남오",
  사업자등록번호: "404-46-00762",
  소재지: "경상남도 진주시 향교로 114-2 1층(옥봉동)"
};

// 새문서_합성테스트_12건.yaml 원문 그대로. "승인상태: 승인"은 스키마 enum
// 값(초안/승인대기/승인완료/반려)에 맞춰 "승인완료"로 정규화했습니다.
const CASES = [
  { id:1, 고객명:"해오름카페", 현장명:"해오름카페 본점", 방문일:"2026-07-02", 사용약품:"델타린 수화제", 문서요청:["완료보고서","소독증명서"], 사진첨부:true, 초기상태:"승인완료", 만족도:5 },
  { id:2, 고객명:"청솔유치원", 현장명:"청솔유치원 1층 교실동", 방문일:"2026-07-05", 사용약품:"피레스로이드계 연무제", 문서요청:["완료보고서"], 사진첨부:true, 초기상태:"승인완료", 만족도:4 },
  { id:3, 고객명:"한빛약국", 현장명:"한빛약국 매장", 방문일:"2026-07-06", 사용약품:"겔형 살충제", 문서요청:["소독증명서"], 사진첨부:false, 초기상태:"승인대기", 만족도:5 },
  { id:4, 고객명:"수림오피스텔", 현장명:"수림오피스텔 지하주차장", 방문일:"2026-07-07", 사용약품:"ULV 연무제", 문서요청:["완료보고서","소독증명서"], 사진첨부:true, 초기상태:"초안", 만족도:4 },
  { id:5, 고객명:"오복식당", 현장명:"오복식당 주방", 방문일:"2026-07-08", 사용약품:"분무형 살균소독제", 문서요청:["완료보고서"], 사진첨부:true, 초기상태:"반려", 만족도:3 },
  { id:6, 고객명:"새롬학원", 현장명:"새롬학원 상담실", 방문일:"2026-07-09", 사용약품:"겔형 살충제", 문서요청:["소독증명서"], 사진첨부:false, 초기상태:"승인대기", 만족도:4 },
  { id:7, 고객명:"더맑은의원", 현장명:"더맑은의원 대기실", 방문일:"2026-07-10", 사용약품:"표면소독제", 문서요청:["완료보고서","소독증명서"], 사진첨부:true, 초기상태:"초안", 만족도:5 },
  { id:8, 고객명:"리버뷰호텔", 현장명:"리버뷰호텔 객실층", 방문일:"2026-07-11", 사용약품:"분말형 살충제", 문서요청:["완료보고서"], 사진첨부:true, 초기상태:"초안", 만족도:4 },
  { id:9, 고객명:"행복마트", 현장명:"행복마트 창고", 방문일:"2026-07-12", 사용약품:"연막소독제", 문서요청:["소독증명서"], 사진첨부:false, 초기상태:"승인대기", 만족도:4 },
  { id:10, 고객명:"푸른요양원", 현장명:"푸른요양원 공용공간", 방문일:"2026-07-13", 사용약품:"표면소독제+연무제", 문서요청:["완료보고서","소독증명서"], 사진첨부:true, 초기상태:"초안", 만족도:5 },
  { id:11, 고객명:"미소피트니스", 현장명:"미소피트니스 탈의실", 방문일:"2026-07-14", 사용약품:"겔형 살충제", 문서요청:["완료보고서"], 사진첨부:false, 초기상태:"초안", 만족도:4 },
  { id:12, 고객명:"은하문구", 현장명:"은하문구 매장 및 창고", 방문일:"2026-07-15", 사용약품:"분사형 살충제", 문서요청:["소독증명서"], 사진첨부:true, 초기상태:"초안", 만족도:5 }
];

const DOC_LABEL = { report:"완료보고서", certificate:"소독증명서" };
const TYPE_KEY = { "완료보고서":"report", "소독증명서":"certificate" };

// 승인 상태 저장소 — 문서 종류(완료보고서/소독증명서)별로 독립적인 상태를 가짐
// (manifest.yaml: report/certificate 각각 별도 approval 블록, "완료보고서는
// 승인, 소독증명서는 반려"인 케이스를 표현할 수 있어야 한다는 이유).
const APPROVAL = {};

function docKey(caseId, docType){ return caseId + "_" + docType; }

CASES.forEach(function(c){
  c.문서요청.forEach(function(label){
    const type = TYPE_KEY[label];
    const key = docKey(c.id, type);
    const entry = {
      status: c.초기상태,
      version: 1,
      approved_by: null,
      approved_at: null,
      rejection_reason: null,
      rejection_target: null,
      version_history: [],
      manual_edits: {}
    };
    if (entry.status === "승인완료") {
      entry.approved_by = "김남오 대표 (시뮬레이션)";
      entry.approved_at = c.방문일 + " 다음날 09:20";
      entry.version = 2;
      entry.version_history = [
        { version:1, action:"초안 생성", by:"문서생성봇", at:c.방문일 },
        { version:2, action:"승인완료 (잠금)", by:entry.approved_by, at:entry.approved_at }
      ];
    } else if (entry.status === "승인대기") {
      entry.version_history = [
        { version:1, action:"초안 생성 → 검수 요청", by:"문서생성봇", at:c.방문일 }
      ];
    } else if (entry.status === "반려") {
      // 픽스처에 유일한 반려 사례(오복식당) — "데이터오류"로 시연.
      // return_to=현장완료입력봇은 이 프로토타입(문서승인 화면) 범위 밖이라
      // 재생성 버튼을 비활성화해 그 경계를 화면에 그대로 드러냄(지어내지 않음).
      entry.rejection_reason = "사용 약품명 표기가 실제 시공 내역과 달라 보입니다. 현장 재확인이 필요합니다.";
      entry.rejection_target = "데이터오류";
      entry.version = 2;
      entry.version_history = [
        { version:1, action:"초안 생성 → 검수 요청", by:"문서생성봇", at:c.방문일 },
        { version:2, action:"반려 (데이터오류)", by:"김남오 대표 (시뮬레이션)", at:c.방문일 + " 다음날", detail:"되돌릴 곳: 현장완료입력봇" }
      ];
    } else {
      entry.version_history = [
        { version:1, action:"초안 생성 (검수 요청 전)", by:"문서생성봇", at:c.방문일 }
      ];
    }
    APPROVAL[key] = entry;
  });
});

const STATUS_ORDER = { "승인대기":0, "반려":1, "초안":2, "승인완료":3 };
let currentCaseId = null;
let activeDocType = null;
let rawBoxOpen = false;

function nowStr(){
  const d = new Date();
  const pad = function(n){ return String(n).padStart(2,"0"); };
  return d.getFullYear()+"-"+pad(d.getMonth()+1)+"-"+pad(d.getDate())+" "+pad(d.getHours())+":"+pad(d.getMinutes());
}
function escapeHtml(s){
  if (s === null || s === undefined) return "";
  return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}
function getCase(id){ return CASES.find(function(c){ return c.id === id; }); }
function caseWorstStatus(c){
  // 큐 카드 정렬/대표 배지용 — 여러 문서 중 가장 "덜 끝난" 상태를 대표로 씀
  let worst = "승인완료";
  c.문서요청.forEach(function(label){
    const s = APPROVAL[docKey(c.id, TYPE_KEY[label])].status;
    if (STATUS_ORDER[s] < STATUS_ORDER[worst]) worst = s;
  });
  return worst;
}
function statusBadge(status){
  const lock = status === "승인완료" ? "🔒 " : "";
  return '<span class="badge badge-'+status+'"><span class="dot"></span>'+lock+status+'</span>';
}
function showToast(msg){
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.classList.remove("hidden");
  clearTimeout(showToast._timer);
  showToast._timer = setTimeout(function(){ t.classList.add("hidden"); }, 3400);
}

/* ---------------- 큐 렌더링 ---------------- */
function renderQueue(){
  const sorted = CASES.slice().sort(function(a,b){
    return STATUS_ORDER[caseWorstStatus(a)] - STATUS_ORDER[caseWorstStatus(b)];
  });

  const counts = {"초안":0,"승인대기":0,"반려":0,"승인완료":0};
  Object.keys(APPROVAL).forEach(function(k){ counts[APPROVAL[k].status]++; });

  document.getElementById("queueTitle").textContent = "문서승인 대기 (건 기준 " + CASES.length + "건)";
  document.getElementById("queueSummary").innerHTML =
    "문서 기준 · " + ["승인대기","반려","초안","승인완료"].map(function(s){
      return counts[s] > 0 ? '<span class="badge badge-'+s+'"><span class="dot"></span>'+s+' '+counts[s]+'</span>' : "";
    }).join(" ");

  const list = document.getElementById("queueList");
  list.innerHTML = "";

  sorted.forEach(function(c){
    const card = document.createElement("div");
    card.className = "doc-card";
    card.onclick = function(){ openDetail(c.id); };

    const chips = c.문서요청.map(function(label){
      const type = TYPE_KEY[label];
      const ap = APPROVAL[docKey(c.id, type)];
      return '<span class="doctype-chip">' + label + statusBadge(ap.status) + '</span>';
    }).join("");

    card.innerHTML =
      '<div class="row1"><span class="case-id">#' + c.id + ' · ' + escapeHtml(c.고객명) + '</span></div>' +
      '<div class="headline">' + escapeHtml(c.현장명) + '</div>' +
      '<div class="meta">방문일 ' + c.방문일 + ' · 사용약품 ' + escapeHtml(c.사용약품) + (c.사진첨부 ? ' · 📷 현장사진 있음' : '') + '</div>' +
      '<div class="doctype-row">' + chips + '</div>';

    list.appendChild(card);
  });
}

/* ---------------- 상세 화면 ---------------- */
function openDetail(id){
  currentCaseId = id;
  const c = getCase(id);
  activeDocType = TYPE_KEY[c.문서요청[0]];
  rawBoxOpen = false;
  document.getElementById("queueView").classList.add("hidden");
  document.getElementById("detailView").classList.remove("hidden");
  document.getElementById("backBtn").classList.remove("hidden");
  document.getElementById("topTitle").textContent = "문서승인";
  document.getElementById("topSubtitle").textContent = "#" + id + " · " + c.고객명;
  renderDetail();
}
function backToQueue(){
  currentCaseId = null;
  document.getElementById("detailView").classList.add("hidden");
  document.getElementById("queueView").classList.remove("hidden");
  document.getElementById("backBtn").classList.add("hidden");
  document.getElementById("topTitle").textContent = "문서승인";
  document.getElementById("topSubtitle").textContent = "방역&클린 · 문서승인(대표자) 화면 (프로토타입)";
  renderQueue();
}

      { title:"사업자 정보", rows:[

      ]},

        { label:"주요 작업 내용", value:c.사용약품 + " 사용 방역작업 시행", ai:true },

      ]}

  }
  return [
    { title:"사업자 정보", rows:[
      { label:"상호명", value:BUSINESS_INFO.상호명, ai:true },
      { label:"대표자명", value:BUSINESS_INFO.대표자명, ai:true },

      { label:"2. 실시면적", value:"", warn:true, placeholder:"예: 82㎡" },

      { label:"4. 관리자확인", value:"", warn:true, placeholder:"현장 관리자명 또는 서명" },
      { label:"5. 소독기간", value:c.방문일, ai:true },
      { label:"6. 소독내용 종류", value:"방역 소독", ai:true },
      { label:"7. 약품사용내용", value:c.사용약품, ai:true },
      { label:"8. 발급일", value:c.방문일, ai:true, note:"승인 시점 기준으로 자동 갱신 예정(지금은 방문일과 동일하게 표시)" },
      { label:"9. 소독실시자", value:BUSINESS_INFO.대표자명 + " (" + BUSINESS_INFO.상호명 + ")", ai:true }
    ]},
    { title:"참고 정보 (법정항목 외)", rows:[
      { label:"고객명", value:c.고객명, ai:true },
      { label:"현장명 / 공간 유형", value:c.현장명, ai:true }

function fieldRow(caseId, docType, field, row, locked){
  const me = APPROVAL[docKey(caseId, docType)].manual_edits;
  const idAttr = "f_" + caseId + "_" + docType + "_" + field;
  const current = (me[field] !== undefined) ? me[field] : row.value;
  const isWarn = row.warn && !current;
  const badge = row.warn
    ? ' <span class="badge badge-warn">⚠ 확인 필요</span>'
    : ' <span class="badge badge-ai">AI 초안</span>';
  let html = '<div class="field-row">' +
    '<div class="field-label">' + escapeHtml(row.label) + badge + '</div>' +
    '<input type="text" id="' + idAttr + '" class="' + (isWarn ? "warn-input" : "") + '" ' +
    'value="' + escapeHtml(current) + '" placeholder="' + escapeHtml(row.placeholder || "") + '"' +
    (locked ? " disabled" : "") +
    ' oninput="onFieldInput(' + caseId + ',\'' + docType + '\',\'' + field + '\', this.value)">';
  if (row.note) html += '<div class="field-note">' + escapeHtml(row.note) + '</div>';
  html += '</div>';
  return html;
}

function onFieldInput(caseId, docType, field, value){
  APPROVAL[docKey(caseId, docType)].manual_edits[field] = value;
}

function renderRawPreview(c, docType, fields){
  const title = docType === "report" ? "완료보고서 (초안 미리보기)" : "소독증명서 (초안 미리보기)";
  let text = title + "\n" + "─".repeat(28) + "\n";
  fields.forEach(function(section){
    text += "\n[" + section.title + "]\n";
    section.rows.forEach(function(row){
      const me = APPROVAL[docKey(c.id, docType)].manual_edits;
      const v = (me[row.field] !== undefined) ? me[row.field] : row.value;
      text += "- " + row.label + ": " + (v || "(확인 필요 — 미입력)") + "\n";
    });
  });
  return text;
}

function renderDetail(){
  const c = getCase(currentCaseId);
  const fields = buildFields(c, activeDocType);
  const ap = APPROVAL[docKey(c.id, activeDocType)];
  const locked = ap.status === "승인완료";

  let html = "";

  // 케이스 헤더
  html += '<div class="case-header">' +
    '<div class="headline">' + escapeHtml(c.고객명) + ' — ' + escapeHtml(c.현장명) + '</div>' +
    '<div class="meta-row">' +
      '<span>방문일 ' + c.방문일 + '</span>' +
      '<span>사용약품 ' + escapeHtml(c.사용약품) + '</span>' +
      '<span>' + (c.사진첨부 ? '📷 현장사진 있음' : '📷 현장사진 없음') + '</span>' +
      '<span>만족도 ' + '★'.repeat(c.만족도) + '☆'.repeat(5-c.만족도) + '</span>' +
    '</div></div>';

  // 문서 종류 탭 (요청된 문서가 2종류일 때만) — 방역_UI참조.md ⑤: "이 화면만
  // 예외적으로 탭 사용 가능(문서 두 종류가 서로 독립적인 문서라서 섞어 보여주면
  // 오히려 헷갈림)"
  if (c.문서요청.length > 1) {
    html += '<div class="tabbar">';
    c.문서요청.forEach(function(label){
      const type = TYPE_KEY[label];
      const s = APPROVAL[docKey(c.id, type)].status;
      html += '<button class="tabbtn' + (type === activeDocType ? " active" : "") + '" onclick="switchTab(\'' + type + '\')">' +
        label + (s === "승인완료" ? " 🔒" : "") + '</button>';
    });
    html += '</div>';
  }

  // 상태 배너
  if (locked) {
    html += '<div class="banner banner-lock">🔒 승인완료 — ' + escapeHtml(ap.approved_by) + ' · ' + escapeHtml(ap.approved_at) +
      '<p>이 문서는 잠겼습니다. 값을 다시 고치려면 새 버전(반려 후 재생성)만 가능합니다.</p></div>';
  } else if (ap.status === "반려") {
    const routeText = ap.rejection_target === "표현오류"
      ? "문서생성봇이 문구·서식만 다시 생성합니다(이 화면에서 시뮬레이션 가능)."
      : "현장완료입력봇으로 돌아가 현장 데이터를 다시 입력해야 합니다(현장 입력 화면은 이 프로토타입 범위 밖이라 여기서는 재생성할 수 없습니다).";
    html += '<div class="banner banner-reject">반려됨 — ' + ap.rejection_target + '<p>사유: ' + escapeHtml(ap.rejection_reason) + '</p>' +
      '<p>되돌아갈 곳: ' + (ap.rejection_target === "표현오류" ? "문서생성봇" : "현장완료입력봇") + ' — ' + routeText + '</p></div>';
  } else if (ap.status === "초안") {
    html += '<div class="banner banner-draft">📝 초안 — 아직 검수 요청 전입니다.<p>방역_UI참조.md ⑤ 문서 초안 화면에서 [검수 요청]을 눌러야 이 문서승인 큐에 정식으로 올라옵니다. 아래 [검수 요청] 버튼으로 그 전환을 시뮬레이션할 수 있습니다.</p></div>';
  }

  html += '<div style="margin-bottom:14px">' + statusBadge(ap.status) + ' <span style="color:var(--text-dim);font-size:14px">버전 v' + ap.version + '</span></div>';

  // 필드 카드들
  fields.forEach(function(section){
    html += '<div class="field-card"><h3>' + escapeHtml(section.title) + '</h3>';
    section.rows.forEach(function(row, idx){
      row.field = section.title + "_" + idx;
      html += fieldRow(c.id, activeDocType, row.field, row, locked);
    });
    html += '</div>';
  });

  // 전체 문서 보기
  html += '<button class="raw-toggle" onclick="toggleRaw()">전체 문서 보기 <span id="rawArrow">' + (rawBoxOpen ? "▴" : "▾") + '</span></button>';
  html += '<div class="raw-box' + (rawBoxOpen ? " open" : "") + '" id="rawBox"><div class="raw-item">' + escapeHtml(renderRawPreview(c, activeDocType, fields)) + '</div></div>';

  // 승인 처리 버튼
  html += '<div class="field-card"><h3>승인 처리</h3>';
  if (ap.status === "초안") {
    html += '<button class="btn btn-secondary" onclick="requestReview(' + c.id + ')">검수 요청</button>';
    html += '<div class="btn-row-note">문서생성봇 초안을 대표자 검수 대기 상태로 전환합니다.</div>';
  } else if (ap.status === "승인대기") {
    html += '<button class="btn btn-approve" onclick="approveDoc(' + c.id + ')">승인확정</button>';
    html += '<button class="btn btn-reject" onclick="openRejectModal()">반려처리</button>';
  } else if (ap.status === "반려") {
    if (ap.rejection_target === "표현오류") {
      html += '<button class="btn btn-secondary" onclick="regenerateDoc(' + c.id + ')">문서 재생성 (시뮬레이션)</button>';
      html += '<div class="btn-row-note">문서생성봇이 다시 실행되어 새 버전(초안)이 만들어집니다. 이전 버전은 처리 이력에 남습니다.</div>';
    } else {
      html += '<button class="btn btn-secondary" disabled>재생성 불가 — 현장완료입력봇 필요</button>';
      html += '<div class="btn-row-note">데이터오류 반려는 현장 데이터를 다시 입력해야 하는데, 그 화면(현장완료입력봇)은 이 프로토타입에 없습니다.</div>';
    }
  } else {
    html += '<div class="btn-row-note" style="margin:0">승인완료 — 더 이상 이 문서에서 할 처리가 없습니다.</div>';
  }
  html += '</div>';

  // 발송 게이트 (문자장부봇의 "승인완료 아닌 문서는 발송 금지" 철칙을 화면에 그대로 반영)
  const allApproved = c.문서요청.every(function(label){ return APPROVAL[docKey(c.id, TYPE_KEY[label])].status === "승인완료"; });
  html += '<div class="field-card"><h3>완료 안내 발송 (문자장부봇)</h3>';
  html += '<div class="send-gate">';
  c.문서요청.forEach(function(label){
    const type = TYPE_KEY[label];
    const s = APPROVAL[docKey(c.id, type)].status;
    html += '<div class="send-gate-item"><span>' + label + '</span>' + statusBadge(s) + '</div>';
  });
  html += '</div>';
  html += '<button class="btn btn-send" ' + (allApproved ? "" : "disabled") + ' onclick="sendMessage(' + c.id + ')">완료안내발송</button>';
  if (!allApproved) html += '<div class="btn-row-note">요청된 문서가 전부 승인완료 상태여야 발송 버튼이 켜집니다 — "승인완료 아닌 문서는 절대 발송하지 않는다"는 규칙을 화면에서도 강제합니다.</div>';
  html += '</div>';

  // 처리 이력
  if (ap.version_history.length > 0) {
    html += '<div class="version-history"><strong style="color:var(--text)">처리 이력 (' + DOC_LABEL[activeDocType] + ')</strong>';
    ap.version_history.slice().reverse().forEach(function(v){
      html += '<div class="vh-item">v' + v.version + ' · ' + escapeHtml(v.action) + ' · ' + escapeHtml(v.by) + ' · ' + escapeHtml(v.at) + (v.detail ? " · " + escapeHtml(v.detail) : "") + '</div>';
    });
    html += '</div>';
  }

  document.getElementById("detailView").innerHTML = html;
}

function switchTab(type){
  activeDocType = type;
  rawBoxOpen = false;
  renderDetail();
}
function toggleRaw(){
  rawBoxOpen = !rawBoxOpen;
  renderDetail();
}

/* ---------------- 승인 액션 ---------------- */
function requestReview(caseId){
  const ap = APPROVAL[docKey(caseId, activeDocType)];
  ap.status = "승인대기";
  ap.version += 1;
  ap.version_history.push({ version:ap.version, action:"검수 요청", by:"현장입력자 (시뮬레이션)", at:nowStr() });
  showToast("검수 요청을 보냈습니다. 이제 대표자가 승인/반려할 수 있습니다.");
  renderDetail();
}

function approveDoc(caseId){
  const ap = APPROVAL[docKey(caseId, activeDocType)];
  ap.status = "승인완료";
  ap.approved_by = "김남오 대표 (시뮬레이션)";
  ap.approved_at = nowStr();
  ap.version += 1;
  ap.rejection_reason = null;
  ap.rejection_target = null;
  ap.version_history.push({ version:ap.version, action:"승인완료 (잠금)", by:ap.approved_by, at:ap.approved_at });
  showToast(DOC_LABEL[activeDocType] + "을(를) 승인했습니다. 이제부터 값이 잠깁니다.");
  renderDetail();
}

function openRejectModal(){
  document.getElementById("rejectReason").value = "";
  document.getElementById("rejectTarget").value = "표현오류";
  updateRouteNote();
  document.getElementById("rejectModal").classList.add("open");
}
function closeRejectModal(){
  document.getElementById("rejectModal").classList.remove("open");
}
function updateRouteNote(){
  const target = document.getElementById("rejectTarget").value;
  const note = target === "표현오류"
    ? "→ 문서생성봇으로 되돌아갑니다. 문구·서식만 다시 생성하면 되므로 이 화면에서 재생성까지 시뮬레이션할 수 있습니다."
    : "→ 현장완료입력봇으로 되돌아갑니다. 현장 데이터를 다시 입력해야 해서, 이 화면(문서승인)만으로는 재생성할 수 없습니다.";
  document.getElementById("routeNote").textContent = note;
}
function submitReject(){
  const reason = document.getElementById("rejectReason").value.trim();
  if (reason.length < 5) { showToast("반려 사유를 5자 이상 입력해주세요."); return; }
  const target = document.getElementById("rejectTarget").value;
  const ap = APPROVAL[docKey(currentCaseId, activeDocType)];
  ap.status = "반려";
  ap.rejection_reason = reason;
  ap.rejection_target = target;
  ap.version += 1;
  ap.version_history.push({
    version: ap.version, action:"반려 (" + target + ")", by:"김남오 대표 (시뮬레이션)", at:nowStr(),
    detail:"되돌릴 곳: " + (target === "표현오류" ? "문서생성봇" : "현장완료입력봇")
  });
  closeRejectModal();
  showToast("반려 처리했습니다.");
  renderDetail();
}
function regenerateDoc(caseId){
  const ap = APPROVAL[docKey(caseId, activeDocType)];
  ap.status = "초안";
  ap.version += 1;
  ap.rejection_reason = null;
  ap.rejection_target = null;
  ap.version_history.push({ version:ap.version, action:"문서 재생성 → 초안", by:"문서생성봇 (시뮬레이션)", at:nowStr() });
  showToast("문서를 재생성했습니다. 다시 [검수 요청]을 눌러야 승인 대기로 올라갑니다.");
  renderDetail();
}
function sendMessage(caseId){
  showToast("완료 안내를 발송했습니다 (시뮬레이션 — 실제 문자·알림톡 발송 연동 없음).");
}

/* ---------------- 초기 렌더 ---------------- */
renderQueue();
</script>
