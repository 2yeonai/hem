  방역_견적_금액을_정해진_표나_기준으로_계산하시나요: "평수·벌레 종류 기준 대략적인 틀은 있음 - 20평 이하는 동일하게 2만5천원, 20평 이상부터는 평수가 늘수록 증가(예: 30평=10만원), 해충 종류별로도 금액이 다름. 다만 정해진 고정 표는 아니고 사장님이 현장을 직접 보고 판단해서 견적을 냄."
  현장_방역_끝나고_사진을_찍어두시나요: "네, 마케팅 콘텐츠용으로 현장 사진/동영상을 찍음"

