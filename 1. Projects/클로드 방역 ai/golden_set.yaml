신규_문의_일반_참고사항:
  채널_전반: "거의 전화로 내용 전달. 당근마켓이나 문자로는 통화 끝나고 주소만 오는 경우도 있음."
  희망_방문일_전반: "대부분 있음 - 보통 '빨리 와달라'는 요청."
  소독증명서_전반: "요청 시 발급함."
  여러_현장_전반: "한 고객이 빌라 여러 채를 한 번에 요청하는 경우도 있으나 자주는 아님."
  출장_정책: "진주 기반이지만 합천 등 타 지역 출장도 감. 출장비는 별도로 받지 않음 (하루 인건비 15만원 이상 되는 현장 위주로 운영)."
  당근마켓_프로필: "https://www.daangn.com/kr/local-profile/uxcay1276ai4/?referrer=share"

# ---------------------------------------------------------------------
# 유형 2. 정기 방문 리마인더 사례
# ---------------------------------------------------------------------
정기방문_리마인더_사례:
  - 번호: 1
    고객사명: "모온"
    방문_주기: "식당은 무조건 한 달에 한 번. 가정집은 요청할 때만 하거나, 정기로 요청하는 경우도 있음."
    지난번_방문일: "6/15"
    이번_방문일: "7/15 (오늘)"
    방문_전에_어떻게_알림을_받으셨나요: "네이버 캘린더로 일정 관리. 다녀온 기록은 애플 기본 메모 앱에 적어둠. 별도 자동 알림 시스템 없음. 주말/평일 상관없이 특별한 일 없으면 방문."
    확인_필요한_부분: "다음 예정 방문일 8/15로 언급됨 - '지난 방문일 + 주기'로 다음 방문일을 자동 계산하는 로직 설계 시 참고"

# ---------------------------------------------------------------------
# 유형 3. 완료보고서·소독증명서 요청 사례
# ---------------------------------------------------------------------
문서요청_사례:
  - 번호: 1
    고객명_또는_업체명: "비엘르모텔"
    요청한_서류: "소독증명서만 (완료보고서는 요청받은 적 없음 - 완료보고서 자동화되면 쓸 의향은 있다고 하심)"
    서류에_꼭_들어가야_하는_내용: "「감염병의 예방 및 관리에 관한 법률 시행규칙」 별지 제28호서식 기준 - 상호(명칭)/소재지/관리(운영)자, 소독기간, 소독 내용(사용 약품명·용량 등), 대상시설, 실시 면적(용적), 소독 실시자 정보(상호·소재지·성명)"
    실제로_어떻게_전달하셨나요: "프린터로 출력해서 전달. 보통 방문 전에 미리 뽑아감."
    이_문서에_들어간_사업자_정보_상호명_대표자명_사업자등록번호: "상호 방역&클린 / 대표자 김남오 / 사업자등록번호 404-46-00762 / 소재지 경상남도 진주시 향교로 114-2 1층(옥봉동) - 매번 동일한 값"
    보내기_전에_대표님이_확인_승인_하셨나요: "네, 확인하고 보냄"
    한_번에_확정됐나요_아니면_고치고_다시_보낸_적_있나요: "고친 적 있음 - 소독증명서에 고객명을 잘못 써서 다시 뽑은 적 있음 (수신자명 오류)"
    확인_필요한_부분: "모텔이나 90평 이상 빌딩은 소독증명서 첨부가 무조건 필요하다고 하심 - 정확한 규모/업종 기준 추가 확인 필요"

