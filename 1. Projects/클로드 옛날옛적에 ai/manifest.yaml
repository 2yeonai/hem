# =====================================================================
# manifest.yaml — "옛날옛적에" AI 키즈 동화·동요 공장 (파이프라인 1차 스캐폴드)
#
# 기준 문서:
#   - 2. Areas/Claude 세션로그/2026-07-13.md "### 기타" — 원 아이디어 최초 논의.
#     원본 기획서("전체본.md", 신규 공장 후보 10개 우선순위 문서)는 혜미가
#     세션 중 업로드했으나 이 vault에는 저장되지 않았음 — 세션로그의 요약
#     문장이 유일한 근거. "자유입력형 캐릭터·엄마/아이 역할분리·OST/노래
#     기능까지 확장"이라고만 기록돼 있고, 실제 UI 세부/전체 사용자 플로우/
#     타겟 연령대 등은 이 스캐폴드 작성 시점에 알 수 없음 — 임의로 지어내지
#     않고 SKILL.md "알려진 한계"에 그대로 명시함.
#   - ai공장짓기/decision-log_skill-factory-architecture.md §9(2026-07-14,
#     혜미 회신) — 2026-07-13 Fable 5가 미결로 남긴 라우팅 카드 3건
#     (scope-ost/safety-free-input/ip-collision)에 대한 실제 답변. 이
#     manifest의 stage 설계는 그 3건 답변을 그대로 반영한다(아래 각 stage
#     주석에 "§9 해소" 표시로 어디에 반영됐는지 명시):
#       ① scope-ost: OST/노래 기능 MVP 포함 확정 → OST생성봇 stage로 반영.
#       ② safety-free-input: "아이 자유입력"이 아니라 "부모가 아이가 말한
#          것을 대신 입력"하는 형식으로 전제 자체가 변경됨. 입력 주체는
#          보호자이지만 콘텐츠 최종 소비자가 아동이므로 최소 수준의 부적절
#          표현 필터는 그대로 유지 → 발화수집봇(보호자 입력으로 명명)+
#          안전선별봇 stage로 반영.
#       ③ ip-collision: 지금은 개인소유+테스트 단계라 실존 캐릭터명 사용
#          허용, 배포(다수 사용자 서비스화) 시점엔 재검토 필수 → 캐릭터_IP_
#          점검봇 stage(지금은 통과만 시키고 배포 게이트용 플래그만 기록)로 반영.
#
# 착수 성격 (중요): decision-log §9는 "9월, F4 재감사 이후" 착수를 원칙으로
# 남겼으나(2026-07-13 D3 결정), 2026-07-14 혜미가 이 공장 1건에 한해 지금
# 바로 스캐폴드 작업을 명시적으로 승인함(다른 8개 신규 후보는 여전히 9월
# 착수 원칙 유지). 이 파일은 "완성된 서비스"가 아니라 다른 3개 공장과 같은
# 수준의 1차 스캐폴드(폴더 구조+SKILL.md+manifest.yaml v2+run.py mock stub+
# test 샘플)이며, model stage는 전부 미구현 mock이다.
#
# 스키마: ai공장짓기/manifest.schema.v2.yaml (v2 — triggers/run_if/entry_points/
# approval 블록). 이 공장은 아직 문서형 법정 산출물(방역의 완료보고서/
# 소독증명서 같은 것)이 없으므로 check_output_schema.approval_block(승인
# 버저닝/잠금)은 사용하지 않고, 더 가벼운 human_gate(pass/reviewer/reason)
# 패턴만 사용한다 — 동화·노래는 "발송하면 되돌릴 수 없는 법정문서"가 아니라
# "보호자가 보고 다시 만들어달라고 할 수 있는 콘텐츠"이기 때문(과설계 방지).
# =====================================================================

schema_version: v2
domain: kids_story
skill_name: kids-story-ost-factory
based_on_schema: "ai공장짓기/manifest.schema.v2.yaml"

# ---------------------------------------------------------------------
# 트리거 — event 1종만 존재(현재 스캐폴드 범위). 정기 스케줄 트리거는
# 이 공장의 사용 패턴(그때그때 요청)상 필요성이 확인되지 않아 만들지 않음
# — 필요해지면 방역 리마인더봇 패턴을 참고해 추가 가능(open_questions 참고).
# ---------------------------------------------------------------------
triggers:
  - type: event
    source: story_request
    entry_stage: 발화수집봇
    note: >
      보호자가 "아이가 이런 이야기를 해줬다/이런 캐릭터로 동화 만들어줘"
      식으로 요청을 넣으면 즉시 시작. 입력 주체는 항상 보호자다(§9 해소②
      — 아이 본인의 실시간 자유입력이 아님).

# ---------------------------------------------------------------------
# 공유 컨텍스트 객체
# ---------------------------------------------------------------------
shared_context:

  request_meta:
    type: object
    description: "요청 메타정보 — 요청일시, 입력 채널(앱/챗 등, 1차 스캐폴드는 채널 미확정이라 자유 문자열로 둠)"
    properties:
      requested_at: { type: string, format: date-time }
      input_channel: { type: string }
    written_by: [발화수집봇]
    read_by: [입력정리봇]

  child_utterance_raw:
    type: string
    description: >
      [§9 해소② 반영] 아이가 말한 내용을 "보호자가 대신 입력"한 원문 텍스트.
      아이 본인이 직접 입력하는 필드가 아님 — 필드명에 "아이 발화"라는 말이
      들어가지만 실제 입력 행위자는 항상 보호자다. 원본 기획서(전체본.md)가
      vault에 없어 이 필드가 자유서술형 1개인지, 항목별 입력(캐릭터/줄거리/
      감정 등 분리 입력)인지는 확정 못함 — ASSUMPTION: 1차 스캐폴드는 자유
      서술형 1개로 가정, 혜미 확인 필요.
    written_by: [발화수집봇]
    read_by: [입력정리봇, 안전선별봇]

  structured_request:
    type: object
    description: >
      입력정리봇이 child_utterance_raw+request_meta에서 구조화한 요청 필드.
      ost_included 기본값 true(§9 해소① — OST/노래 기능 MVP 포함 확정 반영).
    properties:
      requested_characters:
        type: array
        description: "요청된 캐릭터명 목록(실존 IP 캐릭터명이 섞여 있을 수 있음 — 캐릭터_IP_점검봇이 후속 처리)"
      theme: { type: string, description: "동화 주제/줄거리 방향" }
      child_name: { type: string, description: "(선택) 동화 주인공으로 등장시킬 아이 이름" }
      child_age: { type: integer, description: "(선택) 아이 나이 — 톤/난이도 조절용, ASSUMPTION: 원본 기획서에 연령대 기준 없어 1차 추정 필드로만 둠" }
      tone: { type: string, description: "(선택) 원하는 분위기(예: 따뜻한/모험적인)" }
      ost_included:
        type: boolean
        description: "[§9 해소① 반영] OST/노래 포함 여부. 기본값 true(MVP 포함 확정) — 끄고 싶을 때만 명시적으로 false"
        default: true
    written_by: [입력정리봇]
    read_by: [안전선별봇, 캐릭터_IP_점검봇, 동화생성봇, OST생성봇]

  safety_check_result:
    type: object
    description: >
      [§9 해소② 반영] 최소 수준의 부적절 표현 필터 결과. 입력 주체가
      보호자로 바뀌었어도 콘텐츠의 최종 소비자가 아동이라는 사실은 그대로라
      필터 자체는 유지한다(원래 문제정의는 "아동 실시간 자유입력 유해
      콘텐츠 차단"이었으나, 전제 변경 후에도 최소 필터는 남겨두기로 함).
    properties:
      pass: { type: boolean }
      flagged_terms: { type: array, description: "감지된 부적절 표현 후보(있으면)" }
      reason: { type: string }
    written_by: [안전선별봇]
    read_by: [동화생성봇, 보호자검수]

  ip_flag:
    type: object
    description: >
      [§9 해소③ 반영] 요청된 캐릭터 중 실존 IP(만화·애니메이션 등 저작권
      보호 캐릭터로 의심되는 이름) 감지 결과. 지금 단계(개인소유+테스트)는
      차단하지 않고 통과시키되, 배포(다수 사용자 서비스화) 시점 재검토용
      플래그만 기록한다 — 이 플래그가 곧 "배포 게이트"의 체크 대상이 됨.
    properties:
      detected_characters: { type: array, description: "실존 IP로 의심되는 캐릭터명 목록" }
      deployment_gate_required:
        type: boolean
        description: "true면 배포 전 라이선스 확인 필요 — 지금(테스트 단계)은 파이프라인을 막지 않음"
    written_by: [캐릭터_IP_점검봇]
    read_by: [동화생성봇, 보호자검수, 산출물포맷봇]

  story_draft:
    type: object
    description: "동화 본문 초안"
    properties:
      title: { type: string }
      body: { type: string }
      characters_used: { type: array }
    written_by: [동화생성봇]
    read_by: [OST생성봇, 보호자검수, 산출물포맷봇]

  ost_draft:
    type: object
    description: >
      [§9 해소① 반영] 노래/OST 초안. run_if로 켜고 끌 수 있게 자리는
      만들되, 기본값은 항상 실행(ost_included 기본 true).
      실제 오디오 합성(TTS/작곡)은 이 스캐폴드 범위 밖 — mock은 가사/스타일
      노트 텍스트만 생성한다.
    properties:
      lyrics: { type: string }
      style_note: { type: string, description: "곡 분위기/템포 등 텍스트 설명(실제 오디오 아님)" }
    written_by: [OST생성봇]
    read_by: [보호자검수, 산출물포맷봇]

  review_result:
    type: object
    description: "보호자 최종 검수 결과 — 문서형 법정 산출물이 아니므로 approval_block(버저닝/잠금)이 아닌 가벼운 human_gate 패턴만 사용"
    properties:
      pass: { type: boolean }
      reviewer: { type: string, description: "검수한 보호자 식별자(이름/계정 등)" }
      reason: { type: string }
    written_by: [보호자검수]
    read_by: [산출물포맷봇]

  final_package:
    type: object
    description: "최종 산출물 — 승인된 동화 본문+OST(포함 시)+배포 게이트 메타데이터"
    properties:
      story: { type: object }
      ost: { type: object }
      deployment_gate_required: { type: boolean, description: "ip_flag.deployment_gate_required 그대로 복사 — 최종 산출물에도 배포 전 재검토 필요 여부를 남겨둠" }
      generated_at: { type: string, format: date-time }
    written_by: [산출물포맷봇]
    read_by: []

# ---------------------------------------------------------------------
# stages
# ---------------------------------------------------------------------
stages:

  - id: 발화수집봇
    kind: local
    kind_rationale: "보호자가 입력한 내용을 그대로 저장 — 판단 없음. [§9 해소② 반영] 입력 행위자가 항상 보호자임을 이 stage 이름/설명에서부터 명확히 함"
    io: { reads: [], writes: [request_meta, child_utterance_raw] }
    exec_params: { timeout_sec: 5, retry_count: 0 }
    depends_on: []
    async: false

  - id: 입력정리봇
    kind: model
    tier: low_cost
    tier_rationale: "자유서술 텍스트에서 캐릭터명/주제/이름/나이/톤 등 정형 필드만 뽑아내는 구조화 작업 — 방역 문의정리봇과 같은 근거로 저비용 티어 적용 (ASSUMPTION, 실측 안 됨)"
    kind_rationale: "자유서술 원문을 구조화된 요청 필드로 변환 — 약한 판단 필요(모델 stage)"
    io: { reads: [child_utterance_raw, request_meta], writes: [structured_request] }
    check: { mode: self_check, schema_ref: "ai공장짓기/manifest.schema.v2.yaml#check_output_schema.self_check" }
    on_fail: { action: route_to_human }
    exec_params: { retry_count: 1 }
    depends_on: [발화수집봇]
    async: false

  - id: 안전선별봇
    kind: local
    kind_rationale: >
      [§9 해소② 반영] 최소 수준의 금칙어/부적절 표현 사전 매칭 — 정형 규칙
      기반이라 local로 분류(방역 문의판정봇처럼 문맥 판단이 필요한 수준이
      아니라 단순 매칭 수준으로 가정, ASSUMPTION). 문맥형 판단이 필요하다고
      판명되면 model stage로 격상 검토.
    io: { reads: [child_utterance_raw, structured_request], writes: [safety_check_result] }
    on_fail: { action: route_to_human }
    exec_params: { retry_count: 0 }
    depends_on: [입력정리봇]
    async: false

  - id: 캐릭터_IP_점검봇
    kind: local
    kind_rationale: >
      [§9 해소③ 반영] requested_characters 목록을 실존 IP 캐릭터명 사전과
      대조하는 정형 매칭 — 판단 없음. 감지되어도 지금 단계(개인소유+테스트)는
      막지 않고 deployment_gate_required 플래그만 기록한다. 배포 시점
      재검토는 이 스캐폴드 범위 밖(다음 액션으로만 기록).
    io: { reads: [structured_request], writes: [ip_flag] }
    exec_params: { retry_count: 0 }
    depends_on: [안전선별봇]
    async: false

  - id: 동화생성봇
    kind: model
    tier: mid
    tier_rationale: "동화 본문 창작 — 캐릭터/주제/톤을 반영한 서사 생성이라 문의정리봇류보다 높은 티어 필요 (ASSUMPTION, 골든셋 없어 실측 안 됨)"
    kind_rationale: "구조화된 요청에서 동화 본문을 창작 — LLM 판단 필요"
    io: { reads: [structured_request, safety_check_result, ip_flag], writes: [story_draft] }
    check: { mode: self_check, schema_ref: "ai공장짓기/manifest.schema.v2.yaml#check_output_schema.self_check" }
    on_fail: { action: retry }
    exec_params: { retry_count: 1 }
    depends_on: [캐릭터_IP_점검봇]
    async: false

  - id: OST생성봇
    kind: model
    tier: mid
    tier_rationale: "동화 본문에 맞는 가사/분위기 창작 — 동화생성봇과 유사한 창작 판단 (ASSUMPTION)"
    kind_rationale: "[§9 해소① 반영] OST/노래 기능은 MVP 포함 확정(혜미, 2026-07-14) — story_draft 기반으로 가사·스타일노트 생성. 실제 작곡/TTS 합성은 이 스캐폴드 범위 밖(mock은 텍스트만)"
    run_if: "OST_포함이_요청됨"
    run_if_status: "확정 — structured_request.ost_included로 판정, 기본값 true(§9 해소① 반영: OST 기능 MVP 포함 확정이므로 명시적으로 끄지 않는 한 항상 실행)"
    io: { reads: [story_draft, structured_request], writes: [ost_draft] }
    exec_params: { retry_count: 1 }
    depends_on: [동화생성봇]
    async: false

  - id: 보호자검수
    kind: human
    kind_rationale: >
      아이에게 그대로 노출되는 콘텐츠(동화+노래)의 최종 확인 — company_charter
      원칙(외부/최종 소비자에게 나가는 것은 사람 승인 필요)에 따라 human
      게이트 필수. 법정문서가 아니라 approval_block(버저닝/잠금)은 쓰지 않고
      가벼운 human_gate만 사용(과설계 방지).
    io: { reads: [story_draft, ost_draft, safety_check_result, ip_flag], writes: [review_result] }
    check: { mode: human_gate, schema_ref: "ai공장짓기/manifest.schema.v2.yaml#check_output_schema.human_gate" }
    on_fail: { action: retry, human_reject: { return_to: 동화생성봇 } }
