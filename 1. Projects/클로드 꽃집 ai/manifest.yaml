# =====================================================================
# manifest.yaml - flower shop (temmun kkot sikmulwon) order pipeline skill
# Platform standard format, written from scratch.
#
# This file follows "ai-platform/ai gongjang jonghap gihoek.md" (2026-07-08,
# confirmed by Fable 5) sections 1 (platform common spec) and 3 (flower shop
# work order). The previous manifest.yaml was a gov-support skill cloned with
# only the domain field changed (still had name: gov-support-matching-skill)
# and did not match this skill at all - discarded.
#
# This file = the standard contract ("what it does", read by the platform).
# 12bot_kind_bunryupyo.yaml (same folder) = detailed rationale / open items
# ("why it was decided this way"). The stage list/field names in this file
# and that file must always stay in sync - update both when either changes.
#
# 2026-07-16 structural fix (Fable 5 decision, decision-log §12; executed by
# Sonnet/T6): this file was found parked in 4. Archive/꽃집폴더_정부지원사본_2026-07/
# during the 2026-07-13 R4 cleanup (mistakenly swept in with the real
# gov-support copies even though it is NOT a gov-support copy - it's a
# genuine, from-scratch flower-shop manifest). Restored to this folder's root.
# Two structural problems were fixed on restore (content/stage list unchanged,
# 100% identical to 12bot_kind_bunryupyo.yaml per direct comparison):
#   1. `pipeline: { stages: [...] }` -> top-level `stages:` (v2 schema expects
#      stages at the top level; the nested form made validate_manifest.py
#      silently check 0 stages and report a false PASS).
#   2. Added a top-level `shared_context:` block. It didn't exist before -
#      mechanically derived from the io.reads/io.writes already declared on
#      every stage below (no new design judgment, just aggregation of facts
#      already in this same file).
#
# Validate with (v2 validator, recovered 2026-07-16 - it was never actually
# missing, a mount/cache glitch made it briefly unreadable via bash):
#   python3 "ai공장짓기/scripts/validate_manifest.py" "1. Projects/클로드 꽃집 ai/manifest.yaml"
# =====================================================================

name: flower-shop-order-skill
version: 0.1.2
domain: flower_shop

# ---------------------------------------------------------------------
# triggers - 2026-07-17 added. This section was entirely missing before
# (confirmed by grep "^triggers:" -> 0 matches), which meant static
# validation (runner.py --validate-only) could pass while actual execution
# (runner.py ... --trigger event) always failed with "manifest에 type=event
# 트리거가 없음" (flower_adapter.py 발견사항 1). Only one trigger exists for
# this skill: a new incoming contact (call/kakao/sms/photo/manual) starts
# the pipeline at collection_bot. There is no schedule-type trigger here
# (no reminder-bot stage exists in this 14-stage list, unlike pest-control's
# 리마인더봇) - only "event" is declared, matching the actual stage list.
# ---------------------------------------------------------------------
triggers:
  - type: event
    source: inquiry
    entry_stage: collection_bot
    note: "전화/카카오톡/문자/사진/수기 등으로 신규 주문 문의가 들어오면 즉시 시작"

# ---------------------------------------------------------------------
# io_contract - the skill's real identity (should not change even if
# internal implementation changes)
# ---------------------------------------------------------------------
io_contract:
  input_schema:
    type: object
    required: ["source_type"]
    description: >
      One incoming contact (call / text / kakao / photo / manual entry).
      Depending on source_type, only the matching one of raw_text/raw_audio/
      raw_image is filled in. See 12bot_kind_bunryupyo.yaml shared_context
      (fields written by collection_bot) for detail.
    properties:
      source_type: { type: string, enum: ["call", "kakao", "sms", "photo", "manual"] }
      raw_text: { type: string, description: "Text channel (SMS/KakaoTalk) raw content" }
      raw_audio: { type: string, format: uri, description: "Call recording file URI" }
      raw_image: { type: string, format: uri, description: "Photo (e.g. handwritten order) URI" }
      created_at: { type: string, format: date-time }
  output_schema:
    type: object
    description: >
      Result of processing one incoming contact. If the contact contains more
      than one independent order (decided by order_split_bot), orders are
      processed sequentially (not in parallel) and accumulate in the orders
      array one at a time. bundle_status must be "완료"(done) for the whole
      contact to be considered finished.
    properties:
      bundle_id: { type: string }
      bundle_status: { type: string, enum: ["진행중", "완료", "확인 필요"] }
      orders:
        type: array
        items:
          type: object
          properties:
            order_id: { type: string }
            confirmed_fields: { type: object }
            확인_필요_필드:
              type: array
              items: { type: string }
              description: "Fields deliberately left unfilled (never guessed) even after human_reviewer"
            approval_action: { type: string }
            message_result: { type: object, description: "Result of the completion SMS sent to the customer" }

# ---------------------------------------------------------------------
# model_routing - model names are forbidden, tier names only.
# Mapping used: haiku -> low_cost, sonnet -> mid, opus -> high
# (converted from the haiku/sonnet labels already used in
# 12bot_kind_bunryupyo.yaml)
#
# 2026-07-17 correction: this block used to be the ONLY place tier was
# declared ("not duplicated on stages, to avoid drift"). Runner validation
# (ai공장짓기/runner/runner.py static_validate()/normalize_tier()) reads
# `stage.get("tier")` directly off each stage dict and has no knowledge of
# this model_routing.stages block - so all 6 model stages failed static
# validation with "model stage에 tier가 없음" (confirmed by running
# runner.py --validate-only against this file, see flower_adapter.py's
# 발견사항 1b for the full comparison against the pest-control manifest,
# which does put tier directly on each stage and passes). Fixed by adding
# `tier:` directly on each of the 6 model stages below (see each stage's
# own 2026-07-17 comment) - this block stays as the source-of-truth
# rationale/history, the per-stage tier is now the mechanical duplicate the
# runner needs.
# ---------------------------------------------------------------------
model_routing:
  stages:
    - step: order_classification_bot
      tier: mid   # unconfirmed - proposed without measurement, see open_questions in 12bot_kind_bunryupyo.yaml
    - step: order_split_bot
      tier: mid   # unconfirmed - same as above
    - step: correction_bot
      tier: mid
    - step: order_draft_bot
      tier: low_cost   # unconfirmed - same as above
    - step: ribbon_price_bot
      tier: low_cost
    - step: review_manager_bot
      tier: mid   # unconfirmed - same as above

# ---------------------------------------------------------------------
# quality_gate - skill-wide representative gate (platform-required field).
# Finer per-stage check/on_fail live separately on each stage below.
# ---------------------------------------------------------------------
quality_gate:
  confidence_threshold: 0.6
  # Set lower than gov-support (0.85, high risk) because this is a low-risk
  # (T3) factory - following manifest.schema.json's guidance "keep it low for
  # low-risk (flower shop)". This is an initial guess with no golden_set
  # measurement behind it yet - needs confirmation/tuning later.
  self_check_rules:
    - "If order_classification is 확인필요(needs-check), always route to human review - domain keyword matches (e.g. '꽃') alone must never be enough to pass (see golden_set 003)"
    - "If split_status is 확인필요, never split arbitrarily - route to human review"
    - "If review_manager_bot's pass criteria are not met, route to human_reviewer"
  on_fail:
    retry_count: 1
    escalation_target: human_review

# ---------------------------------------------------------------------
# invocation - the contract the AI-employee platform uses to call this
# skill as a tool
# ---------------------------------------------------------------------
invocation:
  entrypoint: "code/run_pipeline.py"
  # 2026-07-16 correction: this comment previously said "planned path, does
  # not exist yet, only code/storage_bot.py is real" - that was true when
  # this manifest was first written (~07-13) but is now stale. Per
  # HANDOFF.md (2026-07-14), code/run_pipeline.py exists and actually wires
  # all 14 stages together (topological sort of depends_on); all 14 stage
  # implementations exist under code/ and pass their own golden_set tests.
  # The only remaining real gap is that kind:model stages are rule-based
  # mocks, not real LLM calls yet (see HANDOFF.md "아직 안 된 것").
  callable_by:
    - "ai_employee_platform"
    - "manual_cli"

state:
  external_store_ref: "code/flower_orders.json - a JSON file DB managed by storage_bot.py (SQLite was tried first but failed with disk I/O error on this synced folder, see storage_bot.py comments)"

failure_log_format:
  fields: ["timestamp", "step", "input_summary", "error", "confidence_at_failure"]

# =======================================================================
# Below: the 3 common platform rules newly confirmed in
# "ai-platform/ai gongjang jonghap gihoek.md" section 1-4 (2026-07-08)
# =======================================================================

# Rule 1: rerun gate - avoid reprocessing the same incoming contact
# (recording/text) twice by accident
rerun_gate:
  enabled: true
  hash_inputs: [raw_text, raw_audio, raw_image]
  scope: full
  # Rationale: if the raw input hasn't changed, there's no reason the
  # downstream judgment should change either - this is an initial assumption
  # though, not yet verified in operation (e.g. need to confirm it doesn't
  # conflict with a legitimate "please re-review this same call" request).

# Rule 3: reviewer grade - confirmed as T3 in
# "ai gongjang jonghap gihoek.md" section 3
review:
  risk_tier: T3
  mandatory: true   # current design forces this: storage_bot cannot run without human_reviewer completing first (depends_on)
  reviewer_grade: "확인 필요"   # master doc section 1-4-3: "values not assigned yet" - not filling this in arbitrarily
  sla_hours: "확인 필요"        # same as above
  queue_priority: "확인 필요"   # same as above

# Rule 2: reject-loop routing - on_reject is attached only to kind: human
# stages (the master doc's own example only showed it on a human stage).
# This pipeline has exactly one human stage (human_reviewer), which also
# matches the guidance "for T3, one default target is enough". kind: model
# self_check failures keep using the existing stage's on_fail.action
# (route_to_human etc.) - on_reject is not used there.
# (see the human_reviewer entry below in stages)

# ---------------------------------------------------------------------
# stages - 14 stages (moved out of the old `pipeline:` wrapper, see header
# note). depends_on determines execution order (NOT array order). Detailed
# rationale per stage (kind_rationale/tier_rationale/domain_neutral etc.)
# was intentionally left out of this file - it all lives in
# 12bot_kind_bunryupyo.yaml. This file only states "what it does".
# ---------------------------------------------------------------------
stages:

  - id: collection_bot
    kind: local
    io: { reads: [], writes: [raw_text, raw_image, raw_audio, source_type, created_at] }
    depends_on: []

  - id: transcription_bot
    kind: local
    # open question: kind now has 4 values (local/model/human/tool(external)).
    # "calling an external STT/OCR API" may fit tool(external) better than
    # local - keeping the existing decision (local) for now, flagged for
    # re-review (see kind_open_question in 12bot_kind_bunryupyo.yaml)
    io: { reads: [raw_audio, raw_image, raw_text], writes: [stt_text, ocr_text, cleaned_text, engine_meta] }
    depends_on: [collection_bot]

  - id: order_classification_bot
    kind: model
    tier: mid   # 2026-07-17 추가: model_routing.stages와 중복되지만 러너 static_validate()가
                # stage 딕셔너리에서 직접 tier를 찾아서(model_routing 블록은 모름) 러너 호환을 위해
                # 여기에도 명시. model_routing.stages가 여전히 정본 근거(rationale) 출처.
    io: { reads: [stt_text, ocr_text, raw_text], writes: [order_classification] }
    check: { mode: self_check, schema_ref: "manifest.schema.v2.yaml#check_output_schema.self_check" }
    on_fail: { action: route_to_human }   # when order_classification == 확인필요
    depends_on: [transcription_bot]

  - id: order_split_bot
    kind: model
    tier: mid   # 2026-07-17 추가 (사유는 order_classification_bot의 tier 주석 참고)
    io: { reads: [stt_text, ocr_text, raw_text, order_classification], writes: [order_segments, split_status, bundle_id, bundle_sequence] }
    check: { mode: self_check, schema_ref: "manifest.schema.v2.yaml#check_output_schema.self_check" }
    on_fail: { action: route_to_human }   # when split_status == 확인필요
    depends_on: [order_classification_bot]

  - id: correction_bot
    kind: model
    tier: mid   # 2026-07-17 추가 (사유는 order_classification_bot의 tier 주석 참고)
    io: { reads: [order_segments, stt_text, ocr_text], writes: [normalized_text, correction_log, candidates] }
    depends_on: [order_split_bot]

  - id: order_draft_bot
    kind: model
    tier: low_cost   # 2026-07-17 추가 (사유는 order_classification_bot의 tier 주석 참고)
    io: { reads: [normalized_text], writes: [order_draft, field_confidence, field_sources, missing_fields] }
    depends_on: [correction_bot]

  - id: ribbon_price_bot
    kind: model
    tier: low_cost   # 2026-07-17 추가 (사유는 order_classification_bot의 tier 주석 참고)
    io: { reads: [order_draft, normalized_text], writes: [ribbon_message_raw, ribbon_message_final, product_name, price, quantity] }
    depends_on: [order_draft_bot]

  - id: review_manager_bot
    kind: model
    tier: mid   # 2026-07-17 추가 (사유는 order_classification_bot의 tier 주석 참고)
    io:
      reads: [order_draft, field_confidence, field_sources, missing_fields, candidates, ribbon_message_raw, ribbon_message_final, product_name, price, quantity, correction_log, split_status]
      writes: [review_checklist, review_priority, editable_fields]
    check: { mode: self_check, schema_ref: "manifest.schema.v2.yaml#check_output_schema.self_check" }
    on_fail: { action: route_to_human }   # pass/escalate-to-human branch is the normal path here
    depends_on: [ribbon_price_bot]

  - id: human_reviewer
    kind: human
    io: { reads: [review_checklist, review_priority, editable_fields], writes: [confirmed_fields, manual_edits, approval_action] }
    check: { mode: human_gate, schema_ref: "manifest.schema.v2.yaml#check_output_schema.human_gate" }
    on_reject:
      default: review_manager_bot   # "the stage that most recently generated this" = the immediately preceding stage in depends_on (T3 simplified rule)
      max_loops: 3
      on_exhaust: escalate_human
    depends_on: [review_manager_bot]
    async: true

  - id: storage_bot
    kind: local
    io: { reads: [confirmed_fields, manual_edits, approval_action, bundle_id, bundle_sequence], writes: [order, workflow_event, version] }
    depends_on: [human_reviewer]

  - id: print_prep_bot
    kind: local
    io: { reads: [order], writes: [order_print, ribbon_print, delivery_memo, driver_summary] }
    depends_on: [storage_bot]

  - id: dispatch_bot
    kind: local
    io: { reads: [driver_summary, delivery_memo, order], writes: [dispatch_record] }
    depends_on: [print_prep_bot]

  - id: delivery_photo_bot
    kind: local
    io: { reads: [dispatch_record], writes: [delivery_photo, photo_status] }
    depends_on: [dispatch_bot]

  - id: sms_ledger_bot
    kind: local
    io: { reads: [order, delivery_photo, photo_status, bundle_id, bundle_sequence], writes: [message_job, message_result, history_log, bundle_status] }
    depends_on: [delivery_photo_bot]

# ---------------------------------------------------------------------
# shared_context - NEW (2026-07-16). Did not exist in the original file.
# Mechanically derived from the io.reads/io.writes already declared on every
# stage above - one entry per field, written_by/read_by lists built by
# scanning the same stage list (no new content, pure aggregation). Required
# by the v2 validator's cross-check between shared_context and per-stage io.
# ---------------------------------------------------------------------
shared_context:
  raw_text: { written_by: [collection_bot], read_by: [transcription_bot, order_classification_bot, order_split_bot] }
  raw_image: { written_by: [collection_bot], read_by: [transcription_bot] }
  raw_audio: { written_by: [collection_bot], read_by: [transcription_bot] }
  source_type: { written_by: [collection_bot], read_by: [] }
  created_at: { written_by: [collection_bot], read_by: [] }
  stt_text: { written_by: [transcription_bot], read_by: [order_classification_bot, order_split_bot, correction_bot] }
  ocr_text: { written_by: [transcription_bot], read_by: [order_classification_bot, order_split_bot, correction_bot] }
  cleaned_text: { written_by: [transcription_bot], read_by: [] }
  engine_meta: { written_by: [transcription_bot], read_by: [] }
  order_classification: { written_by: [order_classification_bot], read_by: [order_split_bot] }
  order_segments: { written_by: [order_split_bot], read_by: [correction_bot] }
  split_status: { written_by: [order_split_bot], read_by: [review_manager_bot] }
  bundle_id: { written_by: [order_split_bot], read_by: [storage_bot, sms_ledger_bot] }
  bundle_sequence: { written_by: [order_split_bot], read_by: [storage_bot, sms_ledger_bot] }
  normalized_text: { written_by: [correction_bot], read_by: [order_draft_bot, ribbon_price_bot] }
  correction_log: { written_by: [correction_bot], read_by: [review_manager_bot] }
  candidates: { written_by: [correction_bot], read_by: [review_manager_bot] }
  order_draft: { written_by: [order_draft_bot], read_by: [ribbon_price_bot, review_manager_bot] }
  field_confidence: { written_by: [order_draft_bot], read_by: [review_manager_bot] }
  field_sources: { written_by: [order_draft_bot], read_by: [review_manager_bot] }
  missing_fields: { written_by: [order_draft_bot], read_by: [review_manager_bot] }
  ribbon_message_raw: { written_by: [ribbon_price_bot], read_by: [review_manager_bot] }
  ribbon_message_final: { written_by: [ribbon_price_bot], read_by: [review_manager_bot] }
  product_name: { written_by: [ribbon_price_bot], read_by: [review_manager_bot] }
  price: { written_by: [ribbon_price_bot], read_by: [review_manager_bot] }
  quantity: { written_by: [ribbon_price_bot], read_by: [review_manager_bot] }
  review_checklist: { written_by: [review_manager_bot], read_by: [human_reviewer] }
  review_priority: { written_by: [review_manager_bot], read_by: [human_reviewer] }
  editable_fields: { written_by: [review_manager_bot], read_by: [human_reviewer] }
  confirmed_fields: { written_by: [human_reviewer], read_by: [storage_bot] }
  manual_edits: { written_by: [human_reviewer], read_by: [storage_bot] }
  approval_action: { written_by: [human_reviewer], read_by: [storage_bot] }
  order: { written_by: [storage_bot], read_by: [print_prep_bot, dispatch_bot, sms_ledger_bot] }
  workflow_event: { written_by: [storage_bot], read_by: [] }
  version: { written_by: [storage_bot], read_by: [] }
  order_print: { written_by: [print_prep_bot], read_by: [] }
  ribbon_print: { written_by: [print_prep_bot], read_by: [] }
  delivery_memo: { written_by: [print_prep_bot], read_by: [dispatch_bot] }
  driver_summary: { written_by: [print_prep_bot], read_by: [dispatch_bot] }
  dispatch_record: { written_by: [dispatch_bot], read_by: [delivery_photo_bot] }
  delivery_photo: { written_by: [delivery_photo_bot], read_by: [sms_ledger_bot] }
  photo_status: { written_by: [delivery_photo_bot], read_by: [sms_ledger_bot] }
  message_job: { written_by: [sms_ledger_bot], read_by: [] }
  message_result: { written_by: [sms_ledger_bot], read_by: [] }
  history_log: { written_by: [sms_ledger_bot], read_by: [] }
  bundle_status: { written_by: [sms_ledger_bot], read_by: [] }

# ---------------------------------------------------------------------
# Only newly-raised open questions from this standardization pass are
# listed here. All 9 open_questions already in 12bot_kind_bunryupyo.yaml
# remain valid and are not duplicated here.
# ---------------------------------------------------------------------
open_questions:
  - "quality_gate.confidence_threshold=0.6 is a guess - needs adjustment once golden_set gives real measurements"
  - "transcription_bot's kind: the new 4th kind value tool(external) may fit better than local (see stage comment above) - flagged for re-review"
  - "review.reviewer_grade/sla_hours/queue_priority: the master doc explicitly says 'values not assigned yet' - not filling these in arbitrarily"
  - "on_reject is attached only to human_reviewer, the one human stage (the master doc's example only showed on_reject on a human stage). model self_check failures keep using the existing on_fail.action:route_to_human - flag if this reading is wrong"
  - "manifest.schema.json (in 클로드 ai 자동화 folder, v1) predates 2026-07-08 and does not know about the stages/rerun_gate/review sections - not relevant to this v2-structured file, kept only as historical note"
  - "check.schema_ref values point at manifest.schema.v2.yaml, which lives in ai공장짓기/ (a sibling folder), not this folder - validate_manifest.py will WARN (file not found) rather than FAIL on these refs; consider either copying schema locally or teaching the validator to search sibling folders → ✅ 완료(2026-07-18, validate_manifest.py가 형제폴더 ai공장짓기/를 검색하도록 개선, [hyemi])"

# Related documents: 12bot_kind_bunryupyo.yaml (detailed rationale),
# golden_set.yaml (real data), HANDOFF.md (current implementation status -
# all 14 stages actually implemented under code/, see HANDOFF.md 2026-07-14),
# ai-platform/ai gongjang jonghap gihoek.md (platform common spec source)
