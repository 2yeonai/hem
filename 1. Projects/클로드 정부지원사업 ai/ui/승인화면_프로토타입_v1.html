<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>정부지원 신청서·발표자료 승인화면 (프로토타입)</title>
<style>
  :root{
    --bg:#0f1220;
    --card:#1a1f35;
    --card-hover:#232a4a;
    --text:#e8ecff;
    --text-dim:#9aa3c7;
    --accent:#7fd4ff;
    --primary:#2f6fed;
    --ok:#3a9d5f;
    --warn:#d9a53a;
    --fail:#e05a5a;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--bg);
    color:var(--text);
    font-family:"Pretendard","Malgun Gothic","맑은 고딕",-apple-system,BlinkMacSystemFont,sans-serif;
    font-size:15px;
    line-height:1.7;
    padding-bottom:48px;
  }
  .wrap{max-width:720px;margin:0 auto;padding:0 16px;}
  header.topbar{
    position:sticky;top:0;z-index:10;
    background:var(--bg);
    border-bottom:1px solid #262c4a;
    padding:14px 16px;
    display:flex;align-items:center;gap:12px;
  }
  header.topbar button.back{
    background:none;border:none;color:var(--text);
    font-size:20px;cursor:pointer;padding:4px 8px;border-radius:8px;
  }
  header.topbar button.back:hover{background:var(--card-hover);}
  header.topbar h1{font-size:20px;font-weight:700;margin:0;}
  .subtitle{color:var(--text-dim);font-size:13px;margin:2px 0 0;}

  section.screen{padding:16px;}
  h2.section-title{font-size:19px;font-weight:700;margin:0 0 4px;}
  p.section-desc{color:var(--text-dim);font-size:13.5px;margin:0 0 14px;}
  h3.card-title{margin:0 0 12px;font-size:16.5px;font-weight:700;display:flex;align-items:center;gap:8px;flex-wrap:wrap;}

  /* ---- 배지 ---- */
  .badge{
    display:inline-flex;align-items:center;gap:6px;
    padding:5px 10px;border-radius:999px;
    font-size:12.5px;font-weight:700;white-space:nowrap;
  }
  .badge .dot{width:8px;height:8px;border-radius:50%;display:inline-block;}
  .badge-ok{background:rgba(58,157,95,0.16);color:#7cd99c;}
  .badge-ok .dot{background:var(--ok);}
  .badge-warn{background:rgba(217,165,58,0.16);color:#f0c877;}
  .badge-warn .dot{background:var(--warn);}
  .badge-fail{background:rgba(224,90,90,0.16);color:#ff9c9c;}
  .badge-fail .dot{background:var(--fail);}
  .badge-accent{background:rgba(127,212,255,0.14);color:var(--accent);}
  .badge-accent .dot{background:var(--accent);}
  .badge-ai{background:#262c4a;color:var(--text-dim);font-weight:600;}
  .badge-lock{background:rgba(58,157,95,0.18);color:#7cd99c;}
  .badge-reject{background:rgba(224,90,90,0.2);color:#ff9c9c;}

  .inline-tag{
    display:inline-block;padding:1px 7px;border-radius:6px;
    font-size:12px;font-weight:700;margin:0 2px;
  }
  .inline-warn{background:rgba(217,165,58,0.22);color:#f0c877;}
  .inline-accent{background:rgba(127,212,255,0.2);color:var(--accent);}

  /* ---- 큐 ---- */
  .queue-summary{color:var(--text-dim);font-size:13.5px;margin-bottom:14px;}
  .q-card{
    background:var(--card);border:1px solid #262c4a;border-radius:14px;
    padding:16px;margin-bottom:12px;cursor:pointer;transition:background .15s;
  }
  .q-card:hover, .q-card:active{background:var(--card-hover);}
  .q-card .row1{display:flex;justify-content:space-between;align-items:flex-start;gap:8px;margin-bottom:8px;}
  .q-card .kind-tag{color:var(--text-dim);font-size:12.5px;font-weight:700;letter-spacing:.02em;}
  .q-card .headline{font-size:17px;font-weight:700;margin:2px 0 6px;}
  .q-card .meta{color:var(--text-dim);font-size:13.5px;}
  .q-card .badges-row{display:flex;flex-wrap:wrap;gap:6px;margin-top:10px;}

  /* ---- 카드/필드 ---- */
  .field-card{
    background:var(--card);border:1px solid #262c4a;border-radius:14px;
    padding:16px;margin-bottom:14px;
  }
  .info-banner{
    border-radius:12px;padding:14px;margin-bottom:14px;font-size:14px;line-height:1.65;
  }
  .info-banner.warn{background:rgba(217,165,58,0.12);border:1px solid rgba(217,165,58,0.4);color:#f0c877;}
  .info-banner.ok{background:rgba(58,157,95,0.12);border:1px solid rgba(58,157,95,0.4);color:#7cd99c;}
  .info-banner .ib-title{font-weight:700;margin-bottom:4px;}

  .bullet-line{margin-bottom:8px;font-size:14.5px;}
  .bullet-line:last-child{margin-bottom:0;}
  .bullet-line strong{color:var(--accent);}

  .doc-row{
    display:flex;justify-content:space-between;align-items:center;gap:10px;
    padding:9px 0;border-bottom:1px solid #232848;font-size:14px;
  }
  .doc-row:last-child{border-bottom:none;}
  .doc-row .doc-name{flex:1;}
  .doc-note{color:var(--text-dim);font-size:12.5px;margin-top:4px;}

  .psst-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:4px;}
  .psst-box{background:#12162a;border:1px solid #262c4a;border-radius:10px;padding:10px;}
  .psst-box .psst-label{font-weight:700;font-size:13.5px;margin-bottom:4px;display:flex;align-items:center;gap:6px;}
  .psst-box .psst-reason{color:var(--text-dim);font-size:12.5px;line-height:1.5;}

  .judge-item{
    background:#12162a;border:1px solid #262c4a;border-radius:10px;
    padding:10px 12px;margin-bottom:8px;
  }
  .judge-item:last-child{margin-bottom:0;}
  .judge-item .jrow1{display:flex;justify-content:space-between;align-items:center;gap:8px;margin-bottom:4px;}
  .judge-item .jname{font-weight:700;font-size:14px;}
  .judge-item .jscore{font-size:13px;font-weight:700;}
  .judge-item .jq{color:var(--text-dim);font-size:12.5px;margin-bottom:4px;}
  .judge-item .jreason{font-size:13px;line-height:1.55;}
  .score-bar{height:5px;border-radius:3px;background:#262c4a;overflow:hidden;margin-bottom:6px;}
  .score-bar-fill{height:100%;border-radius:3px;}

  .raw-toggle{
    width:100%;text-align:left;background:var(--card);
    border:1px solid #262c4a;border-radius:14px;
    padding:13px 16px;color:var(--text);font-size:14.5px;font-weight:700;
    cursor:pointer;margin-bottom:14px;
    display:flex;justify-content:space-between;align-items:center;
  }
  .raw-box{display:none;margin-top:-6px;margin-bottom:14px;}
  .raw-box.open{display:block;}
  .raw-item{
    background:#12162a;border:1px solid #262c4a;border-radius:10px;
    padding:12px;margin-bottom:10px;font-size:13.5px;line-height:1.6;
  }
  .raw-item:last-child{margin-bottom:0;}
  .raw-item .raw-label{color:var(--accent);font-size:12.5px;font-weight:700;margin-bottom:6px;}
  .raw-item .raw-text{white-space:pre-wrap;word-break:break-word;}

  .ppt-outline-box{
    background:#12162a;border:1px solid #262c4a;border-radius:10px;
    padding:10px 12px;margin-bottom:8px;max-height:180px;overflow-y:auto;
    font-size:12.5px;line-height:1.6;white-space:pre-wrap;word-break:break-word;color:var(--text-dim);
  }

  .vh-item{padding:7px 0;border-top:1px solid #232848;font-size:12.5px;color:var(--text-dim);line-height:1.55;}
  .version-history strong{color:var(--text);}

  /* ---- 버튼 ---- */
  .btn{
    display:block;width:100%;border:none;border-radius:12px;
    padding:14px 16px;font-size:16px;font-weight:700;
    cursor:pointer;margin-bottom:10px;font-family:inherit;
  }
  .btn:disabled{opacity:.4;cursor:not-allowed;}
  .btn-confirm{background:var(--ok);color:#06170c;}
  .btn-reject{background:transparent;border:1.5px solid var(--fail);color:#ff9c9c;}
  .btn-secondary{background:#2a3050;color:var(--text);}
  .btn-toggle{background:#2a3050;color:var(--text);font-size:13.5px;padding:9px 12px;width:auto;margin:0;}
  .btn-row-note{font-size:12.5px;color:var(--text-dim);margin:-2px 0 14px;text-align:center;}

  .locked-banner{
    background:rgba(58,157,95,0.14);border:1px solid rgba(58,157,95,0.5);
    border-radius:12px;padding:14px;margin-bottom:14px;
    display:flex;align-items:center;gap:10px;font-weight:700;color:#7cd99c;font-size:14px;
  }
  .fixed-notice{
    background:#12162a;border:1px dashed #3a4370;border-radius:10px;
    padding:10px 12px;font-size:12.5px;color:var(--text-dim);margin-top:10px;line-height:1.6;
  }

  /* ---- 모달 ---- */
  .modal-backdrop{
    display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);
    align-items:flex-end;justify-content:center;z-index:100;
  }
  .modal-backdrop.open{display:flex;}
  .modal{
    background:var(--card);border-radius:18px 18px 0 0;
    padding:20px 18px 24px;width:100%;max-width:720px;
    max-height:88vh;overflow-y:auto;
  }
  .modal h3{margin:0 0 6px;font-size:18px;}
  .modal p.hint{color:var(--text-dim);font-size:13.5px;margin:0 0 16px;}
  .modal label{display:block;font-size:13.5px;font-weight:700;color:var(--text-dim);margin-bottom:6px;margin-top:14px;}
  .modal textarea{
    width:100%;background:#12162a;border:1.5px solid var(--warn);border-radius:10px;
    padding:12px;font-size:15px;color:var(--text);font-family:inherit;
  }
  .modal .modal-actions{display:flex;gap:10px;margin-top:20px;}
  .modal .modal-actions .btn{margin-bottom:0;}

  .hidden{display:none !important;}
  .toast{
    position:fixed;left:50%;bottom:24px;transform:translateX(-50%);
    background:#1a1f35;border:1px solid var(--accent);color:var(--text);
    padding:14px 18px;border-radius:12px;font-size:14.5px;max-width:90vw;
    box-shadow:0 8px 24px rgba(0,0,0,.4);z-index:200;
  }
</style>
</head>
<body>

<header class="topbar">
  <button class="back hidden" id="backBtn" onclick="backToQueue()">←</button>
  <div>
    <h1 id="topTitle">정부지원 검수</h1>
    <p class="subtitle" id="topSubtitle">클로드 정부지원사업 ai · 대표자검수 화면 (프로토타입)</p>
  </div>
</header>

<div class="wrap">
  <section id="queueView" class="screen"></section>
  <section id="detailView" class="screen hidden"></section>
</div>

<!-- 반려 모달 -->
<div class="modal-backdrop" id="rejectModal">
  <div class="modal">
    <h3 id="rejectModalTitle">반려</h3>
    <p class="hint">반려 사유는 필수입니다. 반려하면 이 화면에 기록만 되고, 자동으로 초안이 다시 만들어지지는 않습니다 —
      정부지원 파이프라인은 아직 "반려 후 어느 단계로 되돌아갈지"가 정해져 있지 않습니다
      (정부지원_manifest_v2.yaml open_issues 1번 참고). 재작성은 별도로 요청해주세요.</p>
    <label for="rejectReason">반려 사유 (필수, 5자 이상)</label>
    <textarea id="rejectReason" rows="3" placeholder="예: 4_팀_역량 섹션이 플레이스홀더뿐입니다. 실제 채용 계획으로 다시 채워주세요"></textarea>
    <div class="modal-actions">
      <button class="btn btn-secondary" style="flex:1" onclick="closeRejectModal()">취소</button>
      <button class="btn btn-reject" style="flex:1;border-color:var(--fail)" onclick="submitReject()">반려 확정</button>
    </div>
  </div>
</div>

<div id="toast" class="toast hidden"></div>

<script>
/* =====================================================================
   데이터 — 아래 두 종류 전부 지어낸 값이 아니라 실제 데이터를 그대로 옮김.
   1) CASE_DRAFT1: 이 프로토타입 작업 중 실제로
      `python3 scripts/run.py test/blind_test_oncheon_saenghwalmunhwa.json scripts/sample_announcements.json`
      을 target_period만 미래로 넓혀 재실행해서 얻은 실제 run.py 출력(온천꽃식물원, 화훼 소매,
      실사업자 프로필 기반 — business_description 등은 test/blind_test_oncheon_saenghwalmunhwa.json 원문 그대로).
   2) CASE_DRAFT2: test/sample_output_ideal.json (회귀테스트 fixture, 회사명 없음 — 이 스킬은
      애초에 회사명을 스키마에 넣지 않는다, draft_application() bullets4 주석 참고).
   3) CASE_PRES1: test/backend_result_2026-07-17.json (발표 뒷단 8-stage mock 실행 결과,
      온천꽃식물원의 "2026년 소상공인 생활문화 혁신지원" 트랙 — PPT/대본 반려→재작업 이력 포함).

function nowStr() {
  const d = new Date();
  const pad = function (n) { return String(n).padStart(2, "0"); };
  return d.getFullYear() + "-" + pad(d.getMonth() + 1) + "-" + pad(d.getDate()) + " " + pad(d.getHours()) + ":" + pad(d.getMinutes());
}

function escapeHtml(s) {
  if (s === null || s === undefined) return "";
  return String(s).replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;");
}

function fmtWon(n) {
  if (typeof n !== "number") return escapeHtml(n);
  return n.toLocaleString("ko-KR") + "원";
}

function getCase(id) {
  return QUEUE.find(function (c) { return c.id === id; });
}

function daysUntil(refDateStr, deadlineStr) {
  if (!refDateStr || !deadlineStr) return null;
  const ref = new Date(refDateStr + "T00:00:00");
  const dl = new Date(deadlineStr + "T00:00:00");
  return Math.round((dl - ref) / 86400000);
}

function ddayBadge(refDateStr, deadlineStr) {
  const d = daysUntil(refDateStr, deadlineStr);
  if (d === null) return '<span class="badge badge-warn"><span class="dot"></span>마감일 확인 필요</span>';
  if (d < 0) return '<span class="badge badge-fail"><span class="dot"></span>마감 지남</span>';
  if (d <= 3) return '<span class="badge badge-fail"><span class="dot"></span>D-' + d + ' (마감임박)</span>';
  if (d <= 7) return '<span class="badge badge-warn"><span class="dot"></span>D-' + d + '</span>';
  return '<span class="badge badge-accent"><span class="dot"></span>D-' + d + '</span>';
}

function lockStateBadge(lockState) {
  if (lockState === "READY_FOR_APPROVAL") {
    return '<span class="badge badge-ok"><span class="dot"></span>AI 자체검수 통과</span>';
  }
  return '<span class="badge badge-warn"><span class="dot"></span>AI 자체검수 미통과</span>';
}

function confidenceBadge(v) {
  const pct = Math.round((v || 0) * 100);
  let cls = "badge-fail";
  if (v >= 0.85) cls = "badge-ok";
  else if (v >= 0.5) cls = "badge-warn";
  return '<span class="badge ' + cls + '"><span class="dot"></span>적합도 ' + pct + '%</span>';
}

function renderPresentationQueueCard(c) {
  const ap = APPROVAL[c.id];
  const statuses = [
    ["PPT초안", ap.ppt_draft.status],
    ["발표대본", ap.presentation_script.status],
    ["예상QNA", ap.expected_qna.status],
  ];
  const allLocked = statuses.every(function (s) { return s[1] === "승인완료"; });
  const badgesRow = statuses.map(function (s) {
    const cls = s[1] === "승인완료" ? "badge-ok" : (s[1] === "반려" ? "badge-fail" : "badge-warn");
    return '<span class="badge ' + cls + '"><span class="dot"></span>' + s[0] + ' ' + escapeHtml(s[1]) + '</span>';

  return (
    '<div class="q-card" onclick="openDetail(\'' + c.id + '\')">' +
      '<div class="row1">' +
        '<div><div class="kind-tag">발표자료 패키지 승인 · ' + escapeHtml(c.business) + '</div>' +
        '<div class="headline">PPT초안 · 발표대본 · 예상QNA (3종 일괄 검수)</div></div>' +
      '</div>' +
      '<div class="meta">' + escapeHtml(c.subline) + '</div>' +

function openDetail(id) {

function backToQueue() {

  document.getElementById("queueView").classList.remove("hidden");

}

function renderDetail() {
  const c = getCase(currentCaseId);
  document.getElementById("detailView").innerHTML = c.kind === "draft" ? renderDraftDetail(c) : renderPresentationDetail(c);
}

function toggleRaw(key) {
  rawBoxOpen[key] = !rawBoxOpen[key];
  renderDetail();
}

function showToast(msg) {
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.classList.remove("hidden");
  clearTimeout(showToast._timer);
  showToast._timer = setTimeout(function () { t.classList.add("hidden"); }, 3600);
}

/* ---------------- 텍스트 렌더 도우미 ---------------- */
function highlightMarkers(text) {
  let s = escapeHtml(text);
  s = s.split("[확인 필요]").join('<span class="inline-tag inline-warn">확인 필요</span>');
  s = s.split("[AI 제안 — 실제 집행 전 사업주 확정 필요]").join('<span class="inline-tag inline-accent">AI 제안 · 확정 필요</span>');
  return s;
}

function renderSectionText(text) {
  if (!text) return '<div class="bullet-line" style="color:var(--text-dim)">(내용 없음)</div>';
  const lines = text.split("\n");
  return lines.map(function (line) {
    const m = line.match(/^○\s*([^:：]+)[:：]\s*(.*)$/);
    if (m) {
      return '<div class="bullet-line"><strong>○ ' + escapeHtml(m[1]) + '</strong> : ' + highlightMarkers(m[2]) + '</div>';
    }
    return '<div class="bullet-line">' + highlightMarkers(line) + '</div>';
  }).join("");
}

function sectionBadges(text) {
  const badges = [];
  if (!text) return '<span class="badge badge-warn"><span class="dot"></span>⚠ 확인 필요</span>';
  if (text.indexOf("[확인 필요]") !== -1) badges.push('<span class="badge badge-warn"><span class="dot"></span>⚠ 확인 필요 있음</span>');
  if (text.indexOf("[AI 제안") !== -1) badges.push('<span class="badge badge-accent"><span class="dot"></span>AI 제안 포함</span>');
  if (badges.length === 0) badges.push('<span class="badge badge-ai">AI 초안</span>');
  return badges.join(" ");
}

  // 확인 필요 목록
  if ((d.needs_confirmation || []).length > 0) {
    html += '<button class="raw-toggle" onclick="toggleRaw(\'needs\')">확인 필요 항목 ' + d.needs_confirmation.length + '건 <span>' + (rawBoxOpen["needs"] ? "▴" : "▾") + '</span></button>';
    html += '<div class="raw-box' + (rawBoxOpen["needs"] ? " open" : "") + '">';
    d.needs_confirmation.forEach(function (n) {
      html += '<div class="raw-item"><div class="raw-text">' + escapeHtml(n) + '</div></div>';
    });
    html += '</div>';
  }

  // 승인 처리
  html += '<div class="field-card"><h3 class="card-title">승인 처리</h3>';
  if (!locked && ap.status !== "반려") {
    html += '<button class="btn btn-confirm" onclick="approveDraft(\'' + c.id + '\')">승인</button>';
    html += '<button class="btn btn-reject" onclick="openRejectModal(\'' + c.id + '\', null)">반려</button>';
  } else if (ap.status === "반려") {
    html += '<button class="btn btn-confirm" onclick="approveDraft(\'' + c.id + '\')">그대로 승인</button>';
    html += '<button class="btn btn-reject" onclick="openRejectModal(\'' + c.id + '\', null)">다시 반려</button>';
    html += '<div class="btn-row-note">반려된 건도 대표자가 검토 후 그대로 승인하거나 다시 반려할 수 있습니다.</div>';
  } else {
    html += '<div class="fixed-notice">이 초안은 승인 완료(잠금) 상태입니다. 실제 제출은 자동화하지 않습니다 — 제출은 반드시 대표자가 직접 합니다(회사 헌장 §3).</div>';
  }
  html += '<div class="fixed-notice">이 화면의 승인/반려는 UI 시뮬레이션입니다. run.py 파이프라인에는 아직 "승인 후 자동 재개"가 연결돼 있지 않습니다.</div>';

  if (ap.version_history.length > 0) {
    html += '<div class="version-history" style="margin-top:14px"><strong>처리 이력</strong>';
    ap.version_history.slice().reverse().forEach(function (v) {
      html += '<div class="vh-item">v' + v.version + ' · ' + escapeHtml(v.action) + ' · ' + escapeHtml(v.by) + ' · ' + escapeHtml(v.at) + (v.detail ? " · " + escapeHtml(v.detail) : "") + '</div>';
    });
    html += '</div>';
  }
  html += '</div>';

  return html;
}

function approveDraft(id) {
  const ap = APPROVAL[id];
  ap.status = "승인완료";
  ap.approved_by = "혜미 (시뮬레이션)";
  ap.rejection_reason = null;
  ap.version += 1;
  ap.version_history.push({ version: ap.version, action: "승인완료", by: ap.approved_by, at: nowStr(), detail: "이후 값이 잠깁니다" });
  showToast("승인 처리했습니다. 실제 제출은 대표자가 직접 진행해주세요.");
  renderDetail();
}

/* ---------------- 발표자료 패키지 상세 ---------------- */
function docStatusBadge(status) {
  if (status === "승인완료") return '<span class="badge badge-ok"><span class="dot"></span>승인완료</span>';
  if (status === "반려") return '<span class="badge badge-reject">반려됨</span>';
  return '<span class="badge badge-warn"><span class="dot"></span>승인대기</span>';
}

function renderPresentationDetail(c) {
  const ctx = c.data.ctx;
  const ap = APPROVAL[c.id];
  let html = "";

  const notice = ctx.presentation_requirements || {};
  html += '<div class="field-card"><h3 class="card-title">발표 요건</h3>' +
    '<div class="doc-row"><div class="doc-name">발표평가 존재</div><div>' + (notice.발표평가_존재 === true ? "있음" : escapeHtml(notice.발표평가_존재)) + '</div></div>' +
    '<div class="doc-row"><div class="doc-name">발표시간</div><div>' + escapeHtml(notice.발표시간_분) + '분</div></div>' +
    '<div class="doc-row"><div class="doc-name">슬라이드 제한</div><div>' + escapeHtml(notice.슬라이드_제한) + '장</div></div>' +
    '<div class="doc-row"><div class="doc-name">질의응답 시간</div><div>' + escapeHtml(notice.질의응답_시간_분) + '분</div></div>' +
    '<div class="doc-note" style="margin-top:8px">심사기준: ' + escapeHtml(notice.발표평가_배점표) + '</div>' +
    '<div class="doc-note">제출확정본 참조: ' + escapeHtml(ctx.submitted_application_ref) + '</div>' +
    '</div>';

  html += renderPresDoc(c.id, "ppt_draft", "PPT초안", ap.ppt_draft, function () {
    let b = "";
    (ctx.ppt_draft.outline || []).forEach(function (s) {
      b += '<div class="doc-note" style="margin-bottom:4px"><strong style="color:var(--text)">' + (s.slide) + '번 슬라이드 · ' + escapeHtml(s.title) + '</strong></div>' +
        '<div class="ppt-outline-box">' + escapeHtml(s.content) + '</div>';
    });
    b += '<div class="doc-note">추출 방식: ' + escapeHtml(ctx.ppt_draft.extraction_method) + ' — 제출확정본 PDF에서 구간을 그대로 잘라낸 것이라 안내문·개인정보동의서 문구가 섞여 있을 수 있습니다(정제 필요, 기능_인덱스.md에 기록된 알려진 한계).</div>';
    return b;
  });

  html += renderPresDoc(c.id, "presentation_script", "발표대본", ap.presentation_script, function () {
    let b = "";
    (ctx.presentation_script.script_lines || []).forEach(function (line, i) {
      b += '<div class="doc-note" style="margin-bottom:6px">' + (i + 1) + '. ' + escapeHtml(line) + '</div>';
    });
    return b;
  });

  html += renderPresDoc(c.id, "expected_qna", "예상 QNA", ap.expected_qna, function () {
    let b = "";
    (ctx.expected_qna.qna_templates || []).forEach(function (q) {
      b += '<div class="doc-note" style="margin-bottom:8px"><strong style="color:var(--text)">' + q.template_id + '. ' + escapeHtml(q.label) + '</strong><br>' + escapeHtml(q.answer) +
        (q.mapped_questions && q.mapped_questions.length ? '<br>연계 질문: ' + q.mapped_questions.map(escapeHtml).join(", ") : '') + '</div>';
    });
    return b;
  });

  const allLocked = ap.ppt_draft.status === "승인완료" && ap.presentation_script.status === "승인완료" && ap.expected_qna.status === "승인완료";
  if (allLocked && ctx.presentation_package_record) {
    const rec = ctx.presentation_package_record;
    html += '<div class="locked-banner">🔒 발표패키지저장 완료 (' + escapeHtml(rec.saved_at) + ')</div>';
    html += '<div class="fixed-notice">' + escapeHtml(rec.note) + '</div>';
  } else {
    html += '<div class="info-banner warn"><div class="ib-title">아직 저장 전</div>3종 문서(PPT초안·발표대본·예상QNA)가 모두 승인완료 상태여야 발표패키지저장이 진행됩니다.</div>';
  }

  return html;
}

function renderPresDoc(caseId, docKey, label, docAp, contentFn) {
  const opened = rawBoxOpen[docKey];
  let html = '<div class="field-card">';
  html += '<h3 class="card-title">' + label + ' ' + docStatusBadge(docAp.status) + '<span class="badge badge-ai">v' + docAp.version + '</span></h3>';
  if (docAp.approved_by) {
    html += '<div class="doc-row"><div class="doc-name">승인자</div><div>' + escapeHtml(docAp.approved_by) + '</div></div>';
  }
  if (docAp.approved_at) {
    html += '<div class="doc-row"><div class="doc-name">승인일시</div><div>' + escapeHtml(docAp.approved_at) + '</div></div>';
  }
  html += '<button class="btn btn-toggle" style="margin:10px 0" onclick="toggleRaw(\'' + docKey + '\')">내용 ' + (opened ? "접기" : "보기") + '</button>';
  if (opened) {
    html += contentFn();
  }

  if ((docAp.version_history || []).length > 0) {
    html += '<div class="version-history" style="margin-top:10px"><strong>이전 처리 이력</strong>';
    docAp.version_history.slice().reverse().forEach(function (v) {
      html += '<div class="vh-item">v' + v.version + ' · ' + escapeHtml(v.status) + (v.rejection_reason ? ' · 사유: ' + escapeHtml(v.rejection_reason) : '') + (v.rejection_target ? ' · 대상: ' + escapeHtml(v.rejection_target) : '') + '</div>';
    });
    html += '</div>';
  }

  if (docAp.status === "승인완료") {
    html += '<div class="fixed-notice" style="margin-top:10px">승인완료(잠금) — 이 프로토타입에서는 이미 처리된 이력을 보여줍니다. 다시 반려하려면 아래 버튼을 쓰세요.</div>';
    html += '<button class="btn btn-reject" style="margin-top:8px" onclick="openRejectModal(\'' + caseId + '\', \'' + docKey + '\')">다시 반려</button>';
  } else if (docAp.status === "반려") {
    html += '<div class="info-banner warn" style="margin-top:10px"><div class="ib-title">반려됨</div>사유: ' + escapeHtml(docAp.rejection_reason || "") + '</div>';
    html += '<button class="btn btn-confirm" style="margin-top:4px" onclick="approvePresDoc(\'' + caseId + '\', \'' + docKey + '\')">승인</button>';
  } else {
    html += '<button class="btn btn-confirm" style="margin-top:10px" onclick="approvePresDoc(\'' + caseId + '\', \'' + docKey + '\')">승인</button>';
    html += '<button class="btn btn-reject" onclick="openRejectModal(\'' + caseId + '\', \'' + docKey + '\')">반려</button>';
  }

  html += '</div>';
  return html;
}

function approvePresDoc(caseId, docKey) {
  const docAp = APPROVAL[caseId][docKey];
  docAp.status = "승인완료";
  docAp.approved_by = "혜미 (시뮬레이션)";
  docAp.approved_at = nowStr();
  docAp.rejection_reason = null;
  docAp.version += 1;
  docAp.version_history.push({ version: docAp.version, status: "승인완료" });
  showToast("승인 처리했습니다.");
  renderDetail();
}

/* ---------------- 반려 모달 (공통) ---------------- */
function openRejectModal(caseId, docKey) {
  rejectContext = { caseId: caseId, docKey: docKey };
  document.getElementById("rejectReason").value = "";
  document.getElementById("rejectModalTitle").textContent = docKey ? "반려 — " + docKey : "반려 — 사업계획서 초안";
  document.getElementById("rejectModal").classList.add("open");
}
function closeRejectModal() {
  document.getElementById("rejectModal").classList.remove("open");
  rejectContext = null;
}
function submitReject() {
  const reason = document.getElementById("rejectReason").value.trim();
  if (reason.length < 5) { showToast("반려 사유를 5자 이상 입력해주세요."); return; }
  if (!rejectContext) return;

  if (rejectContext.docKey) {
    const docAp = APPROVAL[rejectContext.caseId][rejectContext.docKey];
    docAp.status = "반려";
    docAp.rejection_reason = reason;
    docAp.version += 1;
    docAp.version_history.push({ version: docAp.version, status: "반려", rejection_reason: reason });
  } else {
    const ap = APPROVAL[rejectContext.caseId];
    ap.status = "반려";
    ap.rejection_reason = reason;
    ap.version += 1;
    ap.version_history.push({ version: ap.version, action: "반려", by: "혜미 (시뮬레이션)", at: nowStr(), detail: "사유: " + reason });
  }

  closeRejectModal();
  showToast("반려 처리했습니다. 재작성은 이 화면 밖에서 별도로 진행해주세요.");
  renderDetail();
}

/* ---------------- 초기 렌더 ---------------- */
renderQueue();
</script>
</body>
</html>
