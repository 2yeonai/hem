      찾으면 그 요건에 맞춰 사업자등록 시점을 정한다(선 프로그램 발굴 → 후 창업 → 즉시
      지원 순서). bizinfo 스크래핑 결과(현재 열린 공고만)만으로는 부족 — 웹 검색으로
      보강 필요.

# 수집기 공통 규칙 (T7 설계 §14·§15)
collector_rules:
  match_output_field: matched_profiles   # candidate 카드에 해당 사업 id 배열로 태그
  min_keyword_match: 1                   # 키워드 1개 이상 걸리면 candidate 승격, 최종 판단은 사람 검수 게이트
  deadline_filter: 접수 마감 지난 공고는 raw 단계에서 제외

# 창업 트랙 판별 키워드 정본 (decision-log_skill-factory-architecture.md §16 판정1, 2026-07-16)
# 배경: collector/promote_candidates.py의 STARTUP_TRACK_MARKERS와 run.py의
# _is_startup_track_announcement()에 같은 규칙이 각자 하드코딩돼 따로 진화하고 있었다 —
# 두 목록(구체 마커 9개 + run.py의 포괄어 "창업")을 합집합으로 합쳐 여기 단일 정본화한다.
# 양쪽 스크립트가 이 목록을 로드하며, yaml에 이 키가 없거나 로드 실패 시에는 각 스크립트에
# 남아있는 기존 하드코딩 값(이 목록과 동일한 합집합)으로 폴백해 하위호환을 유지한다.
# 판정2(애매하면 제외 금지)와 연동: "창업"(포괄어) 단독 일치는 다른 구체 마커 없이는
# "certain"이 아니라 "ambiguous"로 분류되어 자동 제외 대상이 아니라 사람 검수(unresolved/
# needs_confirmation)로 넘어간다 — 구체 마커(예비창업/창업패키지 등)만 "certain" 제외 근거.
startup_track_markers:
  - 예비창업
  - 초기창업
  - 청년창업
  - 창업패키지
  - 창업사업화
  - 창업기업
  - 창업지원
  - 창업경진대회
  - 창업오디션
  - 창업
