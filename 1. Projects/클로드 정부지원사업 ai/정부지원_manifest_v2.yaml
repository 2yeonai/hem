# =====================================================================
# 정부지원_manifest_v2.yaml — 정부지원사업 매칭 스킬 v1(manifest.yaml)의
# stage 기반 v2 스키마 역이식 (작업 B)
#
# 원본: manifest.yaml (v0.4.0) model_routing.stages (5단계, 선형)
# 스키마 기준: ai공장짓기/manifest.schema.v2.yaml
#
# 중요 — 이 파일은 "문서/스펙"이며 scripts/run.py의 실제 동작을 바꾸지
# 않는다. run.py는 manifest.yaml을 파싱해서 실행하는 게 아니라, 각
# 함수(check_eligibility_and_disqualification, check_budget_compatibility,
# judge_mode_self_review 등)에 로직이 직접 하드코딩돼 있고 manifest.yaml은
# 그 로직과 "동일해야 함"이라는 주석으로만 연결되어 있음(run.py 69행 등).
# 즉 v1→v2 마이그레이션은 지금 단계에서는 순수 문서화 작업이고, 이 파일
# 자체를 해석해 실행하는 범용 러너는 아직 없음(decision-log stop_rule 4,
# "실행기는 manifest v2를 해석하는 범용 러너 하나여야 한다"는 아직 미착수).
# =====================================================================
#
# v0.6.1 추가 (2026-07-16) — 뒷단(선정 후: PPT·발표대본·예상Q&A) 8 stage.
# 설계 근거: ai공장짓기/decision-log_skill-factory-architecture.md §17,
#            설계_뒷단자동화_PPT발표대본QNA.md (Fable 5). 구현: 클로드 정부지원사업 ai/
#            scripts/run.py의 run_presentation_backend() 및 stage_* 함수들
#            (기존 매칭~초안~심사위원 함수와 완전히 분리된 별도 진입점, 위 head
#            주석의 "run.py는 manifest를 파싱하지 않는다" 원칙 그대로 유지).
# tier 어휘 참고: 위 §16까지의 stage들은 이 파일에서 haiku/sonnet/opus를 쓰지만
#   (open_issues 기존 항목 "tier 어휘 불일치" 참고), 뒷단 4개 model stage는
#   Fable 5 설계가 명시적으로 지정한 low_cost/mid/high를 그대로 썼다 — 두 어휘
#   중 어느 쪽이 정본인지는 여전히 미해결(이 파일의 기존 open_issues 참고), 이번
#   추가에서 임의로 통일하지 않았다.
# 실측 발견 (2026-07-16, pdftotext로 골든 레퍼런스 원문 확인): QnA.pdf 실물은
#   "약점별 1문항" 구조가 아니라 "5개 만능 답변 템플릿 + 질문 카테고리 매핑"
#   구조였다(예: "상품·차별성 답변"류 5개 답변에 여러 실제 질문을 매핑). 아래
#   stage_예상qna생성 mock은 "약점별 1문항" 방식으로 단순화돼 있어 실물과 다르다
#   — 실 LLM 연동 시점에 이 구조 차이를 반영할 것(지금은 파이프라인 배선만
#   증명하는 mock이라 즉시 수정하지 않음, run.py 주석에도 동일 기록).
#
# =====================================================================

schema_version: v2
domain: gov_support

# ---------------------------------------------------------------------
# 트리거 — v0.6.1 추가. 뒷단은 "선정 통보"라는 예측 불가한 외부 이벤트로만
# 시작된다(schedule 없음, entry_points 불필요 — 진입 경로 단일).
# ---------------------------------------------------------------------
triggers:
  - type: event
    source: selection_notice
    entry_stage: 선정접수
    description: "선정 통보(관공서發, 예측 불가) — 혜미가 통보를 받아 직접 시작시킨다"
  - type: event
    source: draft_build_request
    entry_stage: 입력충분성진단
    description: "[v0.7.0] 사업계획서 내용 생성 요청(혜미發) — 외부감사(2026-07-19) 반영 신설 구간의 입구"

# ---------------------------------------------------------------------
# 공유 컨텍스트 객체 — 원본 v1에는 이런 명시적 공유 객체가 없었고,
# io_contract.input_schema / output_schema에 흩어져 있던 것을 필드 단위로
# 재구성함 (v2 shared_context 요구사항 반영)
# ---------------------------------------------------------------------
shared_context:

  # --- v0.6.1 추가: 뒷단(선정 후) 신규 필드 7개 — §17 판정4 ---
  selection_notice:
    type: object
    description: "선정 통보 정보: 공고 id(real_announcements.json 참조), 발표일시, 발표방식, 통보 원문"
    written_by: [선정접수]
    read_by: [발표요건추출]

  needs_confirmation:
    type: array
    description: >
      기존 v1 output_schema.needs_confirmation과 동일(가정값/불확실 항목 목록) — 이 v2
      마이그레이션에서 judge_self_review의 writes에는 누락돼 있었으나(§16까지), 예상QNA생성이
      실제로 이 신호를 재사용하므로 뒷단 추가와 함께 shared_context에 정식 등록한다(§17 판정4).
    written_by: [judge_self_review]
    read_by: [예상QNA생성]

  submitted_application_ref:
    type: string
    description: >
      사람이 실제로 제출한 확정본의 경로/참조. draft_application(초안)이 아님 —
      발표는 심사위원이 읽은 제출본과 일치해야 하므로, 선정접수 시 사람이 지정한다.
      없으면 stage_선정접수가 즉시 ValueError로 중단한다(추측 금지 원칙).
    written_by: [선정접수]
    read_by: [PPT초안생성, 예상QNA생성]

  presentation_requirements:
    type: object
    description: "발표시간/슬라이드 제한/발표평가 배점표/질의응답 시간. 미확인 항목은 [확인 필요]"
    written_by: [발표요건추출]
    read_by: [PPT초안생성, 발표대본생성]

  ppt_draft:
    type: object
    description: >
      슬라이드 아웃라인+내용. approval_required + approval 블록(check_output_schema.approval_block)
      + locked 패턴 적용(방역 document_draft.report/certificate와 동일 컨벤션).
    written_by: [PPT초안생성, PPT승인]
    read_by: [발표대본생성, 예상QNA생성, 발표패키지승인, 발표패키지저장]

  presentation_script:
    type: object
    description: "발표대본. approval 블록 동일 적용"
    written_by: [발표대본생성, 발표패키지승인]
    read_by: [발표패키지저장]

  expected_qna:
    type: object
    description: >
      예상 질문+답변. approval 블록 동일 적용. 질문 소재는 중간구간의 judge_panel_review/
      deduction_map/needs_confirmation/exaggeration_flags를 재사용(새 판정 로직 없음).
    written_by: [예상QNA생성, 발표패키지승인]
    read_by: [발표패키지저장]

  presentation_package_record:
    type: object
    description: "승인완료 패키지의 보관 기록(경로/버전/승인자/시각). 이 파이프라인은 저장까지만 — 실전 사용은 사람"
    written_by: [발표패키지저장]
    read_by: []

  business_profile:
    type: object
    description: "사업자 정보 입력 전체 (manifest.yaml io_contract.input_schema.business_profile과 동일 스키마, 여기서는 참조만)"
    written_by: []   # 외부(호출자)가 채워서 파이프라인에 주입 — 파이프라인 내부 stage가 쓰지 않음
    read_by: [eligibility_screen, program_matching, draft_application_stage, judge_self_review]

  target_period:
    type: object
    description: "조회기간 (start_date/end_date)"
    written_by: []
    read_by: [program_matching]

  raw_announcements:
    type: array
    description: >
      공고 원문 데이터. 현재는 scripts/sample_announcements.json 또는
      scripts/real_announcements.json에서 그대로 읽어옴(collect_and_extract_announcements()).
      PDF/HWP 원문에서 이 필드를 자동으로 채우는 stage는 아직 존재하지 않음 — 결측 참고.
    written_by: [collect_announcements]
    read_by: [eligibility_screen, program_matching]

  eligibility_check_result:
    type: object
    description: "check_eligibility_and_disqualification()의 사전 판정 결과(자격/결격/확인필요 표시)"
    written_by: [eligibility_screen]
    read_by: [program_matching]

  matched_programs:
    type: array
    description: "manifest.yaml output_schema.matched_programs와 동일"
    written_by: [program_matching]
    read_by: [draft_application_stage, judge_self_review]

  excluded_programs:
    type: array
    description: "manifest.yaml output_schema.excluded_programs와 동일"
    written_by: [program_matching]
    read_by: []

  draft_application:
    type: object
    description: "manifest.yaml output_schema.draft_application과 동일"
    written_by: [draft_application_stage]
    read_by: [judge_self_review]

  judge_review:
    type: object
    description: "manifest.yaml output_schema.judge_review와 동일 (rejection_risks, exaggeration_flags, unsupported_claims, overall_pass_recommendation)"
    written_by: [judge_self_review]
    read_by: []

  quality_gate_result:
    type: object
    description: >
      manifest.yaml output_schema.quality_gate_result와 동일. v2에서는 이 값이
      judge_self_review stage의 check 출력과 사실상 동일한 역할을 함(아래 stages 참고).
    written_by: [judge_self_review]
    read_by: []

  # =====================================================================
  # v0.7.0 추가 (2026-07-20, [gombeck1]) — 내용 생성 구간 필드.
  # 근거: 외부감사 "초창패_예창패_초안 평가_2026-07-19.md" 지시 1~15
  # (원문 보존: 자동화_개선지시_외부감사_2026-07-20.md). 구현: scripts/content_gate.py
  # (결정론적 게이트, LLM 호출 없음) + 작성 stage는 TASK-PACKET으로 하위모델(sonnet) 병렬 실행.
  # =====================================================================

  input_sufficiency_report:
    type: object
    description: "[v0.7.0] 작성 전 입력 충분성 진단서 — 작성가능/부족/가정필요/사용금지 구분 + 수준(%). 감사 지시 5"
    written_by: [입력충분성진단]
    read_by: [시나리오확정]

  application_scenario:
    type: object
    description: >
      [v0.7.0] 프로그램별 기준 시점: program_type(예창패/초창패), simulation_mode,
      reference_date, business_stage, company_status, current_performance(초창패 필수:
      사업자등록일·제품단계·시범업체·사용자·기록·유료고객·월매출). 감사 지시 1·2·11.
      예창패와 초창패는 이 객체가 달라야 하며, 같으면 content_gate가 복사본으로 차단한다.
    written_by: [시나리오확정]
    read_by: [잠금값추출, 작성_문제인식, 작성_실현가능성, 작성_성장전략, 작성_팀]

  content_locks:
    type: object
    description: "[v0.7.0] 변경 금지 잠금값: 회사명 mo,on·지불고객(단일)·중심문제·1차 MVP 4종(홍재우 골든셋 G8 확정, 임의 축소 금지)·비의료 범위·확장 로드맵·대표자 실경력(3종 100만개 판매). 감사 최종지시"
    written_by: [잠금값추출]
    read_by: [작성_문제인식, 작성_실현가능성, 작성_성장전략, 작성_팀, 수정본생성]

  evidence_ledger:
    type: array
    description: "[v0.7.0] 주장·수치별 증빙 원장: claim/status(7종 상태값)/evidence_type/source_file/sample_size/usable_in_submission. 감사 지시 3·4. 검사: content_gate.check_evidence_ledger"
    written_by: [잠금값추출]
    read_by: [작성_문제인식, 작성_실현가능성, 작성_성장전략, 작성_팀, 내용검증게이트, 재검증]

  conflict_log:
    type: array
    description: "[v0.7.0] 자료 간 충돌 기록(조용히 선택 금지). 우선순위: 사용자 잠금값 > 최신 강사 피드백 > 실제 심사평 > 기존 프로필 > 증빙자료 > 과거 계획서 > AI 제안. 감사 지시 6"
    written_by: [잠금값추출]
    read_by: [수정본생성]

  section_draft_problem:
    type: object
    description: "[v0.7.0] PSST '문제인식' 섹션 초안 (병렬 작성 1/4)"
    written_by: [작성_문제인식]
    read_by: [초안통합]

  section_draft_solution:
    type: object
    description: "[v0.7.0] PSST '실현가능성' 섹션 초안 (병렬 작성 2/4)"
    written_by: [작성_실현가능성]
    read_by: [초안통합]

  section_draft_scaleup:
    type: object
    description: "[v0.7.0] PSST '성장전략' 섹션 초안 (병렬 작성 3/4)"
    written_by: [작성_성장전략]
    read_by: [초안통합]

  section_draft_team:
    type: object
    description: "[v0.7.0] PSST '팀' 섹션 초안 (병렬 작성 4/4)"
    written_by: [작성_팀]
    read_by: [초안통합]

  merged_draft:
    type: object
    description: "[v0.7.0] 4개 섹션 통합본 — 일관성(회사명·고객·MVP·KPI·예산 교차) 맞춤. 기존 judge_self_review(8인+홍재우)는 이 통합본을 심사 대상으로 쓴다(기존 stage 정의는 불변, 실행 시 대상만 교체)"
    written_by: [초안통합]
    read_by: [내용검증게이트, 수정본생성]

  content_gate_report:
    type: object
    description: "[v0.7.0] content_gate.py 검증 결과: 산술오류/복사본/고객군혼합/출처없는 수치/예산합계. FAIL이면 다음 단계 진행 금지. 감사 지시 7·8"
    written_by: [내용검증게이트, 재검증]
    read_by: [수정본생성, 출력분리]

  revised_draft:
    type: object
    description: "[v0.7.0] 심사(8인+홍재우)·게이트 지적 반영 수정본. 문장·구조·계산은 수정하되 없는 증빙(조사·계약·매출·MOU)은 생성 금지. 감사 지시 12"
