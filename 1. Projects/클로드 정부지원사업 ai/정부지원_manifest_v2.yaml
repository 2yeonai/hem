# =====================================================================
# 정부지원_manifest_v2.yaml — 정부지원사업 매칭 스킬 v1(manifest.yaml)의
# stage 기반 v2 스키마 역이식 (작업 B)
#
# 원본: manifest.yaml (v0.4.0) model_routing.stages (5단계, 선형)
# 스키마 기준: ai공장짓기/manifest.schema.v2.yaml
#
# 중요 — 이 파일은 "문서/스펙"이며 scripts/run.py의 실제 동작을 바꾸지
# 않는다. run.py는 manifest.yaml을 파싱해서 실행하는 게 아니라, 각
# 함수(check_eligibility_and_disqualification, check_budget_compatibility,
# judge_mode_self_review 등)에 로직이 직접 하드코딩돼 있고 manifest.yaml은
# 그 로직과 "동일해야 함"이라는 주석으로만 연결되어 있음(run.py 69행 등).
# 즉 v1→v2 마이그레이션은 지금 단계에서는 순수 문서화 작업이고, 이 파일
# 자체를 해석해 실행하는 범용 러너는 아직 없음(decision-log stop_rule 4,
# "실행기는 manifest v2를 해석하는 범용 러너 하나여야 한다"는 아직 미착수).
# =====================================================================
#
# v0.6.1 추가 (2026-07-16) — 뒷단(선정 후: PPT·발표대본·예상Q&A) 8 stage.
# 설계 근거: ai공장짓기/decision-log_skill-factory-architecture.md §17,
#            설계_뒷단자동화_PPT발표대본QNA.md (Fable 5). 구현: 클로드 정부지원사업 ai/
#            scripts/run.py의 run_presentation_backend() 및 stage_* 함수들
#            (기존 매칭~초안~심사위원 함수와 완전히 분리된 별도 진입점, 위 head
#            주석의 "run.py는 manifest를 파싱하지 않는다" 원칙 그대로 유지).
# tier 어휘 참고: 위 §16까지의 stage들은 이 파일에서 haiku/sonnet/opus를 쓰지만
#   (open_issues 기존 항목 "tier 어휘 불일치" 참고), 뒷단 4개 model stage는
#   Fable 5 설계가 명시적으로 지정한 low_cost/mid/high를 그대로 썼다 — 두 어휘
#   중 어느 쪽이 정본인지는 여전히 미해결(이 파일의 기존 open_issues 참고), 이번
#   추가에서 임의로 통일하지 않았다.
# 실측 발견 (2026-07-16, pdftotext로 골든 레퍼런스 원문 확인): QnA.pdf 실물은
#   "약점별 1문항" 구조가 아니라 "5개 만능 답변 템플릿 + 질문 카테고리 매핑"
#   구조였다(예: "상품·차별성 답변"류 5개 답변에 여러 실제 질문을 매핑). 아래
#   stage_예상qna생성 mock은 "약점별 1문항" 방식으로 단순화돼 있어 실물과 다르다
#   — 실 LLM 연동 시점에 이 구조 차이를 반영할 것(지금은 파이프라인 배선만
#   증명하는 mock이라 즉시 수정하지 않음, run.py 주석에도 동일 기록).
#
# =====================================================================

schema_version: v2
domain: gov_support

# ---------------------------------------------------------------------
# 트리거 — v0.6.1 추가. 뒷단은 "선정 통보"라는 예측 불가한 외부 이벤트로만
# 시작된다(schedule 없음, entry_points 불필요 — 진입 경로 단일).
# ---------------------------------------------------------------------
triggers:
  - type: event
    source: selection_notice
    entry_stage: 선정접수
    description: "선정 통보(관공서發, 예측 불가) — 혜미가 통보를 받아 직접 시작시킨다"

# ---------------------------------------------------------------------
# 공유 컨텍스트 객체 — 원본 v1에는 이런 명시적 공유 객체가 없었고,
# io_contract.input_schema / output_schema에 흩어져 있던 것을 필드 단위로
# 재구성함 (v2 shared_context 요구사항 반영)
# ---------------------------------------------------------------------
shared_context:

  # --- v0.6.1 추가: 뒷단(선정 후) 신규 필드 7개 — §17 판정4 ---
  selection_notice:
    type: object
    description: "선정 통보 정보: 공고 id(real_announcements.json 참조), 발표일시, 발표방식, 통보 원문"
    written_by: [선정접수]
    read_by: [발표요건추출]

  needs_confirmation:
    type: array
    description: >
      기존 v1 output_schema.needs_confirmation과 동일(가정값/불확실 항목 목록) — 이 v2
      마이그레이션에서 judge_self_review의 writes에는 누락돼 있었으나(§16까지), 예상QNA생성이
      실제로 이 신호를 재사용하므로 뒷단 추가와 함께 shared_context에 정식 등록한다(§17 판정4).
    written_by: [judge_self_review]
    read_by: [예상QNA생성]

  submitted_application_ref:
    type: string
    description: >
      사람이 실제로 제출한 확정본의 경로/참조. draft_application(초안)이 아님 —
      발표는 심사위원이 읽은 제출본과 일치해야 하므로, 선정접수 시 사람이 지정한다.
      없으면 stage_선정접수가 즉시 ValueError로 중단한다(추측 금지 원칙).
    written_by: [선정접수]
    read_by: [PPT초안생성, 예상QNA생성]

  presentation_requirements:
    type: object
    description: "발표시간/슬라이드 제한/발표평가 배점표/질의응답 시간. 미확인 항목은 [확인 필요]"
    written_by: [발표요건추출]
    read_by: [PPT초안생성, 발표대본생성]

  ppt_draft:
    type: object
    description: >
      슬라이드 아웃라인+내용. approval_required + approval 블록(check_output_schema.approval_block)
      + locked 패턴 적용(방역 document_draft.report/certificate와 동일 컨벤션).
    written_by: [PPT초안생성, PPT승인]
    read_by: [발표대본생성, 예상QNA생성, 발표패키지승인, 발표패키지저장]

  presentation_script:
    type: object
    description: "발표대본. approval 블록 동일 적용"
    written_by: [발표대본생성, 발표패키지승인]
    read_by: [발표패키지저장]

  expected_qna:
    type: object
    description: >
      예상 질문+답변. approval 블록 동일 적용. 질문 소재는 중간구간의 judge_panel_review/
      deduction_map/needs_confirmation/exaggeration_flags를 재사용(새 판정 로직 없음).
    written_by: [예상QNA생성, 발표패키지승인]
    read_by: [발표패키지저장]

  presentation_package_record:
    type: object
    description: "승인완료 패키지의 보관 기록(경로/버전/승인자/시각). 이 파이프라인은 저장까지만 — 실전 사용은 사람"
    written_by: [발표패키지저장]
    read_by: []

  business_profile:
    type: object
    description: "사업자 정보 입력 전체 (manifest.yaml io_contract.input_schema.business_profile과 동일 스키마, 여기서는 참조만)"
    written_by: []   # 외부(호출자)가 채워서 파이프라인에 주입 — 파이프라인 내부 stage가 쓰지 않음
    read_by: [eligibility_screen, program_matching, draft_application_stage, judge_self_review]

  target_period:
    type: object
    description: "조회기간 (start_date/end_date)"
    written_by: []
    read_by: [program_matching]

  raw_announcements:
    type: array
    description: >
      공고 원문 데이터. 현재는 scripts/sample_announcements.json 또는
      scripts/real_announcements.json에서 그대로 읽어옴(collect_and_extract_announcements()).
      PDF/HWP 원문에서 이 필드를 자동으로 채우는 stage는 아직 존재하지 않음 — 결측 참고.
    written_by: [collect_announcements]
    read_by: [eligibility_screen, program_matching]

  eligibility_check_result:
    type: object
    description: "check_eligibility_and_disqualification()의 사전 판정 결과(자격/결격/확인필요 표시)"
    written_by: [eligibility_screen]
    read_by: [program_matching]

  matched_programs:
    type: array
    description: "manifest.yaml output_schema.matched_programs와 동일"
    written_by: [program_matching]
    read_by: [draft_application_stage, judge_self_review]

  excluded_programs:
    type: array
    description: "manifest.yaml output_schema.excluded_programs와 동일"
    written_by: [program_matching]
    read_by: []

  draft_application:
    type: object
    description: "manifest.yaml output_schema.draft_application과 동일"
    written_by: [draft_application_stage]
    read_by: [judge_self_review]

  judge_review:
    type: object
    description: "manifest.yaml output_schema.judge_review와 동일 (rejection_risks, exaggeration_flags, unsupported_claims, overall_pass_recommendation)"
    written_by: [judge_self_review]
    read_by: []

  quality_gate_result:
    type: object
    description: >
      manifest.yaml output_schema.quality_gate_result와 동일. v2에서는 이 값이
      judge_self_review stage의 check 출력과 사실상 동일한 역할을 함(아래 stages 참고).
    written_by: [judge_self_review]
    read_by: []

# ---------------------------------------------------------------------
# stages — v1 model_routing.stages 5개를 선형 depends_on 체인으로 역이식.
# kind 판정 근거: 원본 5단계 모두 tier(low_cost/mid/high)가 이미 부여돼
# 있었음 = "판단/해석이 필요한 단계"라는 뜻으로 해석해 전부 kind: model로
# 분류함. 실제 run.py 구현은 결정론적 Python 규칙(자연어 LLM 호출 없음)
# 이지만, manifest가 명시한 tier 배정 자체가 "이 단계는 사람 대신 AI가
# 판단 수준의 작업을 한다"는 선언이므로 v2 kind 분류에서도 유지함.
# (참고: PDF/HWP 원문에서 raw_announcements를 자동 추출하는 kind=local
#  전처리 stage는 설계상 필요하지만 아직 구현되지 않음 — HANDOFF.md
#  "PDF/HWP 공고문 자동 파싱" 보류 항목과 동일. 여기서는 없는 stage를
#  임의로 만들어 넣지 않고 open_issues에만 기록함.)
# ---------------------------------------------------------------------
stages:

  - id: collect_announcements
    kind: model
    tier: haiku          # v1 tier: low_cost
    io:
      reads: []
      writes: [raw_announcements]
    depends_on: []
    async: false
    # v1 step 원문: "공고문 수집 및 핵심 기준 추출(신청자격/지원제외/제출양식/페이지제한/예산기준/심사표)"
    # 실제 구현: collect_and_extract_announcements() — 오늘은 로컬 JSON 로드일 뿐, PDF 추출은 미구현

  - id: eligibility_screen
    kind: model
    tier: sonnet          # v1 tier: mid
    io:
      reads: [business_profile, raw_announcements]
      writes: [eligibility_check_result]
    depends_on: [collect_announcements]
    async: false
    # v1 step 원문: "신청자격 체크 및 지원제외·결격 위험 점검"
    # 실제 구현: check_eligibility_and_disqualification()

  - id: program_matching
    kind: model
    tier: sonnet          # v1 tier: mid
    io:
      reads: [business_profile, target_period, raw_announcements, eligibility_check_result]
      writes: [matched_programs, excluded_programs]
    depends_on: [eligibility_screen]
    async: false
    # v1 step 원문: "자격요건 매칭(마감지남 제외, 필수서류 없으면 실패처리)"
    # 실제 구현: match_programs() (+ check_budget_compatibility() v0.4.0)

  - id: draft_application_stage
    kind: model
    tier: sonnet          # v1 tier: mid
    io:
      reads: [business_profile, matched_programs]
      writes: [draft_application]
    depends_on: [program_matching]
    async: false
    # v1 step 원문: "신청서 초안 작성"
    # 실제 구현: draft_application()

  - id: judge_self_review
    kind: model
    tier: opus            # v1 tier: high
    io:
      reads: [draft_application, matched_programs, business_profile]
      writes: [judge_review, quality_gate_result, needs_confirmation]
    check:
      mode: self_check
      schema_ref: "ai공장짓기/manifest.schema.v2.yaml#check_output_schema.self_check"
      mapping:
        pass: "quality_gate_result.confidence_passed AND quality_gate_result.judge_pass_recommendation"
        confidence: "quality_gate_result.overall_confidence"
        reason: "quality_gate_result.reasons (array) — self_check 스키마는 string 하나만 받으므로 join(\"; \")해서 매핑. 원본이 array를 반환한다는 사실 자체는 유지(risks 확장 필드 후보, ai공장짓기 스키마 NOTE 참고)"
    on_fail:
      action: route_to_human
      human_reject:
        return_to: null   # 원본에 human stage(재개 가능한 pipeline node)가 없어 반려-복귀 개념 자체가 미정 — 아래 open_issues 참고
    depends_on: [draft_application_stage]
    async: false
    # v1 step 원문: "심사위원 모드 자기검수(감점위험/과장/증빙부족/예산정합성 탐지)"
    # 실제 구현: judge_mode_self_review() + apply_quality_gate()

  # =====================================================================
  # v0.6.1 추가 (2026-07-16, Fable 5 설계 §17 → Sonnet 구현) — 뒷단 8 stage.
  # 위 judge_self_review까지의 중간구간과 별도 진입점(triggers: event/selection_notice).
  # local 2 / model 4 / human 2 = 8. 실제 구현: scripts/run.py의
  # run_presentation_backend() + stage_* 함수(기존 함수는 하나도 안 건드림).
  # =====================================================================

  - id: 선정접수
    kind: local
    io:
      reads: []
      writes: [selection_notice, submitted_application_ref]
    depends_on: []
    async: false
    # 실제 구현: stage_선정접수() — submitted_application_ref 없으면 즉시 ValueError(추측 금지)

  - id: 발표요건추출
    kind: model
    tier: low_cost   # §17 판정5 — 이 파일의 기존 haiku/sonnet/opus 어휘와 다름(위 v0.6.1 헤더 참고)
    io:
      reads: [selection_notice]
      writes: [presentation_requirements]
    depends_on: [선정접수]
    async: false
    # 실제 구현: stage_발표요건추출() — 추출·분류 수준, 미확인 항목은 [확인 필요]

  - id: PPT초안생성
    kind: model
    tier: mid
    io:
      reads: [presentation_requirements, submitted_application_ref]
      writes: [ppt_draft]
    run_if: "발표평가_또는_발표자료가_요구됨"
    run_if_status: "확정 — 발표요건추출.발표평가_존재로 판정. [확인 필요]뿐이면 스킵하지 않고 계속 진행(모름≠발표없음, evaluate_presentation_run_if 구현 참고)."
    check:
      mode: self_check
      schema_ref: "ai공장짓기/manifest.schema.v2.yaml#check_output_schema.approval_block"
    depends_on: [발표요건추출]
    async: false
    # 실제 구현: stage_ppt초안생성() — known limitation: 실 LLM 미연동, 규칙기반 목업

  - id: PPT승인
    kind: human
    io:
      reads: [ppt_draft]
      writes: [ppt_draft]
    run_if: "발표평가_또는_발표자료가_요구됨"
    run_if_status: "확정 — 발표요건추출.발표평가_존재로 판정. [확인 필요]뿐이면 스킵하지 않고 계속 진행(모름≠발표없음, evaluate_presentation_run_if 구현 참고)."
    check:
      mode: human_gate
      schema_ref: "ai공장짓기/manifest.schema.v2.yaml#check_output_schema.human_gate"
    on_fail:
      action: retry
      human_reject:
        return_to: PPT초안생성   # rejection_target=PPT문제 -> 여기로(§17 판정3), 재승인 필요
    depends_on: [PPT초안생성]
    async: true
    # 실제 구현: stage_ppt승인() — mock 자동승인(실제 승인 UI 없음, 방역/꽃집과 동일 한계)

  - id: 발표대본생성
    kind: model
    tier: mid
    io:
      reads: [ppt_draft, presentation_requirements]
      writes: [presentation_script]
    run_if: "발표평가_또는_발표자료가_요구됨"
    run_if_status: "확정 — 발표요건추출.발표평가_존재로 판정. [확인 필요]뿐이면 스킵하지 않고 계속 진행(모름≠발표없음, evaluate_presentation_run_if 구현 참고)."
    depends_on: [PPT승인]   # 초안생성이 아니라 승인에 건다 — §17 판정2(반려 전파 차단)
    async: false
    # 실제 구현: stage_발표대본생성() — PPT.locked가 아니면 RuntimeError(depends_on 강제 재검증)

  - id: 예상QNA생성
    kind: model
    tier: high   # §17 판정5 — 심사위원 모드 자기검수(high)와 동급 난이도
    io:
      reads: [ppt_draft, submitted_application_ref, judge_review, needs_confirmation]
      writes: [expected_qna]
    run_if: "발표평가_또는_발표자료가_요구됨"
    run_if_status: "확정 — 발표요건추출.발표평가_존재로 판정. [확인 필요]뿐이면 스킵하지 않고 계속 진행(모름≠발표없음, evaluate_presentation_run_if 구현 참고)."
    depends_on: [PPT승인]   # 발표대본생성과 병렬 그래프(둘 다 PPT승인만 선행) — 실행은 순차 나열
    async: false
    # 실제 구현: stage_예상qna생성() — 중간구간 신호 재사용. known limitation: 실물(QnA.pdf)은
    # "약점별 1문항"이 아니라 "5개 만능답변 템플릿+질문매핑" 구조 — mock은 아직 단순화됨(위 v0.6.1 헤더 참고)

  - id: 발표패키지승인
    kind: human
    io:
      reads: [ppt_draft, presentation_script, expected_qna]
      writes: [presentation_script, expected_qna]
    run_if: "발표평가_또는_발표자료가_요구됨"
    run_if_status: "확정 — §17 판정1(run_if는 발표요건추출 결과 기반). [확인 필요]뿐이면 스킵하지 않고 사람에게 확인시킨다(모름≠발표없음, evaluate_presentation_run_if 구현 참고)."
    check:
      mode: human_gate
      schema_ref: "ai공장짓기/manifest.schema.v2.yaml#check_output_schema.human_gate"
    on_fail:
      action: retry
      human_reject:
        return_to: { "대본문제": 발표대본생성, "질문답변문제": 예상QNA생성 }   # 문서별 부분 반려(§17 판정3)
    depends_on: [발표대본생성, 예상QNA생성]
    async: true
    # 실제 구현: stage_발표패키지승인() — 대본+Q&A 일괄 게이트, approval은 문서별 독립

  - id: 발표패키지저장
    kind: local
    io:
      reads: [ppt_draft, presentation_script, expected_qna]
      writes: [presentation_package_record]
    run_if: "발표평가_또는_발표자료가_요구됨"
    run_if_status: "확정 — 발표요건추출.발표평가_존재로 판정. [확인 필요]뿐이면 스킵하지 않고 계속 진행(모름≠발표없음, evaluate_presentation_run_if 구현 참고)."
    depends_on: [발표패키지승인]
    async: false
    # 실제 구현: stage_발표패키지저장() — 저장 직전 3종 문서 전부 승인완료인지 강제 재검증
    # (방역 문자장부봇 패턴), 아니면 RuntimeError로 저장 자체를 차단. 헌장 적용: 이 stage
    # 다음에 "발송" stage는 존재하지 않는다 — 실전 사용은 반드시 사람(헌장 §3).

# ---------------------------------------------------------------------
# 마이그레이션에서 v1→v2로 표현이 안 되거나 임의로 결정하지 않은 부분
# (작업 B "막히면" 지침 준수 — 필드를 임의로 새로 만들지 않고 여기 기록)
# ---------------------------------------------------------------------
open_issues:
  - "human stage 없음: v1은 quality_gate 미달 시 routed_to=human_review로 '종료'되는 구조이지, v2가 가정하는 '사람이 검수하고 pipeline이 재개(resumable)되는 human stage'가 아님. judge_self_review.on_fail.human_reject.return_to를 null로 둔 이유가 이것 — 실제로 되돌아갈 stage가 정의된 적이 없어서 임의로 만들지 않음. 사람 검토 후 재실행은 현재 '동일 입력으로 run.py 재호출'이라는 외부 프로세스로만 존재함."
  - "kind=local 전처리 stage(PDF/HWP → raw_announcements 자동 추출) 없음: HANDOFF.md에 의도적 보류로 기록된 항목과 동일. v2 스키마상으로는 collect_announcements 앞에 local stage 하나가 있어야 자연스럽지만, 실제로 존재하지 않는 코드를 매니페스트에만 그려 넣지 않음."
  - "tier 어휘 불일치: v1은 low_cost/mid/high, v2는 haiku/sonnet/opus. 위 stages에서는 저비용→haiku, 중간→sonnet, 고비용→opus로 1:1 대응시켰지만, 이 대응이 실제 모델 성능/비용 요구사항에 맞는지는 검증되지 않은 추정 매핑임(ASSUMPTION)."
  - "check.mapping의 reason 필드: quality_gate_result.reasons는 array인데 v2 self_check.reason은 string 하나. 위에서는 join으로 임시 대응했지만, ai공장짓기/manifest.schema.v2.yaml의 NOTE(risks 확장 필드 옵션 검토 필요)가 가리키는 바로 그 상황임 — v2 스키마 쪽에서 먼저 array 지원 여부를 정해야 근본적으로 해결됨."
  - "[v0.6.1 신규] 뒷단 8 stage의 tier가 low_cost/mid/high인데 위 §16까지 stage들은 haiku/sonnet/opus — 두 tier 어휘 공존 문제(기존 open_issue 3번)가 이번 추가로 한 파일 안에서 실제로 공존하게 됨. 어느 쪽을 정본으로 통일할지는 여전히 미결."
  - "[v0.6.1 신규] stage_예상qna생성 mock이 '약점별 1문항' 구조인데 골든 레퍼런스 QnA.pdf 실물은 '5개 만능답변 템플릿+질문 카테고리 매핑' 구조(2026-07-16 pdftotext 실측) — 실 LLM 연동 시점에 재설계 필요, 지금은 파이프라인 배선 증명용 mock이라 그대로 둠."
  - "[v0.6.1 신규] .pptx/.docx 등 실물 파일 렌더링은 이 manifest/run.py 범위 밖 — ppt_draft/presentation_script/expected_qna는 구조화 데이터까지만, 실제 문서 생성은 실행 시점 도구(pptx 스킬 등) 몫."
