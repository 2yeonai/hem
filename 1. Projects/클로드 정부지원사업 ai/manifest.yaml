name: gov-support-matching-skill
version: 0.5.4
domain: gov_support

io_contract:
  input_schema:
    type: object
    required: ["business_profile", "target_period"]
    properties:
      business_profile:
        type: object
        description: "사업자 정보 — 기업형태(법인/개인), 업종(KSIC 코드), 설립일, 소재지, 직전연도 매출액, 상시근로자수, 대표자 생년월일, 성별, 경력단절 여부, 인증/이력(벤처인증, 여성/사회적기업 등), 신용상태(세금체납 등 결격사유 관련), 신청서 작성을 위한 서술형 내용, 필수서류 준비 현황"
        properties:
          biz_type: { type: string }
          industry_code: { type: string }
          founded_date: { type: string, format: date }
          region: { type: string }
          annual_revenue_krw: { type: number }
          employees: { type: integer }
          ceo_birth_date: { type: string, format: date }
          gender:
            type: string
            description: "대표자 성별 (예: '여성'/'남성'). 여성 전용 등 성별 제한이 있는 공고 매칭에 사용. (v0.4.0 신규) 비어있으면 성별 조건이 있는 공고에서 '확인 필요'로 처리됨"
          career_interruption_status:
            type: boolean
            description: "경력단절 여부 (혼인·임신·출산·육아·가족돌봄·근로조건 등으로 경제활동을 중단한 이력이 있는지). 경력단절여성 대상 공고 매칭에 사용. (v0.4.0 신규) 비어있으면 '확인 필요'로 처리됨"
          career_interruption_reason:
            type: string
            description: "경력단절 사유 (예: '출산·육아'). 선택 항목 — 참고용 서술, 매칭 로직에는 career_interruption_status만 사용됨 (v0.4.0 신규)"
          certifications: { type: array, items: { type: string } }
          disqualification_flags: { type: array, items: { type: string }, description: "세금체납, 부정수급 이력, 휴폐업 등 결격 관련 자기신고 항목" }
          business_description:
            description: "사업 아이템 설명. string(v0.2.0) 또는 실제 예비창업패키지류 사업계획서에서 흔한 중첩 객체(v0.3.0)를 지원한다. 비어있으면 draft_application의 '2_신청동기_및_필요성' 섹션이 [확인 필요]로 표시됨"
            oneOf:
              - type: string
                description: "v0.2.0 방식 — 자유서술 텍스트 그대로 사용"
              - type: object
                description: "v0.3.0 방식 — 구조화된 사업 설명 (실사용 사례 기준)"
                properties:
                  brand_name: { type: string }
                  brand_meaning: { type: string }
                  business_item: { type: string }
                  description: { type: string }
                  target_customer: { type: string }
                  core_problem: { type: string }
                  solution_structure:
                    type: object
                    properties:
                      service_type: { type: string }
                      program_steps: { type: array, items: { type: string } }
                      measurement_items: { type: array, items: { type: string } }
                      differentiation: { type: array, items: { type: string } }
                      non_medical_boundary: { type: string }
                  initial_channels: { type: array, items: { type: string } }
                  long_term_direction: { type: array, items: { type: string } }
          team_experience:
            description: "대표자 및 팀원 이력/역할. draft_application의 '4_팀_역량' 섹션에 반영됨. 비어있으면 [확인 필요]로 표시됨"
            oneOf:
              - type: string
                description: "v0.2.0 방식 — 자유서술 텍스트"
              - type: object
                description: "v0.3.0 방식 — 구조화된 팀 정보"
                properties:
                  founder:
                    type: object
                    properties:
                      role: { type: string }
                      experience_summary: { type: string }
                      certifications_and_training: { type: array, items: { type: string } }
                      work_experience: { type: array, items: { type: string } }
                      execution_strength: { type: array, items: { type: string } }
                  planned_team:
                    type: array
                    items:
                      type: object
                      properties:
                        role: { type: string }
                        status: { type: string }
                        responsibility: { type: string }
                        requirement: { type: string }
                        training_plan: { type: string }
                  partners_or_advisors:
                    type: array
                    items:
                      type: object
                      properties:
                        role: { type: string }
                        status: { type: string }
                        purpose: { type: string }
          budget_detail:
            description: "예산 세부내역. draft_application의 '3_사업화_계획'/'5_예산_계획' 섹션에 반영됨. 또한 judge_review 단계에서 공고 budget_criteria와의 정합성(정부지원분 한도 초과, 집행제외 항목 카테고리 포함 여부) 점검에 사용됨(v0.4.0, v0.5.3부터 정부지원분/자기부담분 구분 반영). 비어있으면 [확인 필요]로 표시됨"
            oneOf:
              - type: array
                description: "v0.2.0 방식 — 항목별 평면 리스트"
                items:
                  type: object
                  properties:
                    category: { type: string, description: "예산 항목 카테고리 (예: 인건비, 재료비, 외주용역비). budget_criteria.excluded_categories와의 충돌 검사에 사용됨 (v0.4.0)" }
                    item: { type: string }
                    amount_krw: { type: number }
                    fund_source: { type: string, enum: ["government", "self"], description: "이 항목 금액의 자금 출처 — \"government\"(정부지원분) | \"self\"(자기부담분). 선택 필드(optional), 없으면 미지정으로 처리됨(v0.5.3). check_budget_compatibility()가 budget_criteria.max_grant_krw와 비교할 때 fund_source==\"government\"로 명시된 항목의 합계만 사용함 — 총사업비(정부지원+자부담 합계) 전체를 지원한도와 비교하면 자부담이 있는 정상적인 사업 구성도 '한도 초과'로 오탐되기 때문(v0.4.0 known issue, v0.5.3에서 수정). 미지정 항목은 이 초과 판정에서 제외되고, 대신 judge_review.budget_breakdown.unresolved_note에 '확인 필요' 안내로만 노출됨(자동 판정에는 영향 없음 — 오탐 방지가 우선이라는 원칙, 2026-07-09 사용자 결정)" }
                    note: { type: string }
              - type: object
                description: "v0.3.0 방식 — 단계(phase)별 예산 구조 (실사용 사례 기준, 예: 예비창업패키지)"
                properties:
                  budget_principle: { type: string }
                  phase_1:
                    type: object
                    properties:
                      title: { type: string }
                      items:
                        type: array
                        items:
                          type: object
                          properties:
                            category: { type: string }
                            item: { type: string }
                            amount_krw: { type: number }
                            fund_source: { type: string, enum: ["government", "self"], description: "v0.2.0 리스트 방식의 fund_source와 동일 의미/동작 (v0.5.3)" }
                            verification_purpose: { type: string }
                            expected_output: { type: string }
                      subtotal_krw: { type: number }
                  phase_2:
                    type: object
                    description: "phase_1과 동일 구조. phase_3 이상 필요 시 동일 패턴으로 확장 가능 (phase_ 접두사 키를 모두 스캔함)"
                  total_krw: { type: number }
                  self_funding_note: { type: string }
          expected_outcomes:
            description: "기대효과 및 산출 근거. draft_application의 '6_기대효과' 섹션에 반영됨. 비어있으면 [확인 필요]로 표시됨"
            oneOf:
              - type: string
                description: "v0.2.0 방식 — 자유서술 텍스트"
              - type: object
                description: "v0.3.0 방식 — 구조화된 기대효과"
                properties:
                  business_outputs: { type: array, items: { type: string } }
                  market_validation_goals: { type: array, items: { type: string } }
                  revenue_goals:
                    type: object
                    properties:
                      main_product: { type: string }
                      package_price_krw: { type: number }
                      initial_customer_goal: { type: string }
                      estimated_revenue_krw: { type: string }
                      calculation: { type: string }
                  social_value: { type: array, items: { type: string } }
                  long_term_outcomes: { type: array, items: { type: string } }
          documents_status:
            description: "필수서류 준비 현황. required_documents_checklist.prepared에 반영됨. document_name은 공고의 required_documents 문자열과 정확히 일치해야 매칭됨 (fuzzy match 없음 — 표기가 다르면 미준비로 집계되고 needs_confirmation에 표시됨)"
            oneOf:
              - type: object
                description: "v0.2.0 방식 — {문서명: true/false} 평면 맵"
                additionalProperties: { type: boolean }
              - type: object
                description: "v0.3.0 방식 — 준비됨/미준비 목록을 분리 (실사용 사례 기준)"
                properties:
                  prepared_documents:
                    type: array
                    items:
                      type: object
                      properties:
                        document_name: { type: string }
                        status: { type: string, description: "'준비됨' 또는 '파일 보유' 포함 시 prepared=true로 매핑" }
                        note: { type: string }
                  not_prepared_or_needs_check:
                    type: array
                    items:
                      type: object
                      properties:
                        document_name: { type: string }
                        status: { type: string, description: "'확인 필요' 또는 '미보유' 포함 시 prepared=false로 매핑" }
                        note: { type: string }
      target_period:
        type: object
        required: ["start_date", "end_date"]
        properties:
          start_date: { type: string, format: date }
          end_date: { type: string, format: date }
        description: "이 기간 내 마감(접수)하는 공고만 조회 대상. 필수 항목 — 생략 시 실행 불가 (사업자 프로필 파일에 이 값이 없다면 별도로 보완해서 넣어야 함)"
  output_schema:
    type: object
    properties:
      matched_programs:
        type: array
        description: "마감일이 지나지 않고 필수서류 목록이 확인된 공고만 포함 (그 외는 excluded_programs로 분리)"
        items:
          type: object
          properties:
            program_name: { type: string }
            eligibility_confidence: { type: number, minimum: 0, maximum: 1 }
            required_documents: { type: array, items: { type: string } }
            deadline: { type: string, format: date }
            disqualification_risks: { type: array, items: { type: string } }
      excluded_programs:
        type: array
        description: "마감지남/필수서류 없음/결격사유로 자동 제외된 공고와 사유"
        items:
          type: object
          properties:
            program_name: { type: string }
            exclusion_reason: { type: string }
      draft_application:
        type: object
        description: "matched_programs 중 confidence 최고 1건에 대한 신청서 초안 (섹션별 텍스트). business_description/team_experience/budget_detail/expected_outcomes가 채워진 경우(string 또는 object 어느 쪽이든) 해당 섹션은 실제 내용으로, 비어있으면 [확인 필요]로 표시됨"
      judge_review:
        type: object
        description: "심사위원 모드 자기검수 결과 — 감점위험, 과장표현, 증빙부족 주장 목록. 무조건 긍정 금지, 떨어질 이유를 우선 탐색. v0.4.0부터 예산 정합성(총액 초과, 집행제외 항목 카테고리 충돌) 점검도 rejection_risks에 포함됨. v0.5.0부터 psst_review/judge_panel_review/deduction_map 3개 필드가 추가되어 overall_pass_recommendation 판정 근거가 '형식요건만' -> '형식+내용품질'로 넓어짐"
        properties:
          rejection_risks: { type: array, items: { type: string } }
          exaggeration_flags:
            type: array
            items: { type: string }
            description: "v0.5.0부터 위험표현 사전(9종 고정세트) 스캔 결과가 '원문 표현 + 대체문구 제안' 형태로 추가됨(append, 기존 EXAGGERATION_WORDS 체크는 유지). 자동 치환 없음 — 제안만, 최종 수정은 사람"
          unsupported_claims: { type: array, items: { type: string } }
          overall_pass_recommendation:
            type: boolean
            description: "v0.5.0부터 기존 조건(미준비서류==0, 확인필요섹션==0, 결격위험없음, 페이지제한존재)에 psst_review 전항목 pass AND judge_panel_review.warning_count==0 조건이 추가됨"
          psst_review:
            type: object
            description: "(v0.5.0 신규) Problem/Solution/Support/Traction 4구간 자동검수. 각 구간은 {result: pass|fail|not_applicable, reason: 구체적 부족 사유}. 판정만 하고 문장을 대신 써주지 않음 — 어느 구간이 왜 FAIL인지만 지적. 매칭 프로그램이 없으면 4구간 모두 not_applicable"
            properties:
              problem: { type: object, properties: { result: { type: string }, reason: { type: string } } }
              solution: { type: object, properties: { result: { type: string }, reason: { type: string } } }
              support: { type: object, properties: { result: { type: string }, reason: { type: string } } }
              traction: { type: object, properties: { result: { type: string }, reason: { type: string } } }
          judge_panel_review:
            type: object
            description: "(v0.5.0 신규) 8인 가상 심사위원(공고적합성/자격규정/문제정의/AI필요성/실행계획/예산증빙/성과확장/발표Q&A) 평가. 8인 로직 자체는 공고 불변, mapped_rubric_items만 공고별 scoring_rubric에 키워드 기반으로 가변 매핑됨"
            properties:
              panel:
                type: array
                items:
                  type: object
                  properties:
                    judge: { type: string }
                    key_question: { type: string }
                    score: { type: integer, minimum: 0, maximum: 5 }
                    warning: { type: boolean }
                    reason: { type: string }
                    mapped_rubric_items: { type: array, items: { type: string } }
              immediate_warnings: { type: array, items: { type: string } }
              warning_count: { type: integer }
          deduction_map:
            type: object
            description: "(v0.5.0 신규) 감점 전파 모델 — 대표 이슈 5종(예산근거누락/자격증빙미확보/작업시간실측없음/AI필요성불명확/산출물미정의)의 발생 여부와, 발생 시 다른 평가항목으로 번지는 연쇄 리스크(스펙 원문 고정 계수). quality_gate_result.overall_confidence는 다시 깎지 않음 — 설명 문장 용도로만 사용"
            properties:
              triggered_issues:
                type: array
                items:
                  type: object
                  properties:
                    issue: { type: string }
                    direct_deduction: { type: object }
                    propagated_deductions: { type: array, items: { type: object } }
                    interpretation: { type: string }
              note: { type: string }
          budget_breakdown:
            type: object
            nullable: true
            description: "(v0.5.3 신규) check_budget_compatibility()의 예산 정합성 판단 근거를 사람이 볼 수 있게 노출. business_profile.budget_detail 또는 announcement.budget_criteria가 없으면 null. fund_source가 지정된 항목이 하나도 없으면(기존 데이터 전부 해당) confirmed_government_krw/confirmed_self_krw는 0이 되고 unresolved_note에 안내문이 채워짐 — 이 note는 참고 정보 전용이며 quality_gate_result.overall_confidence나 judge_panel_review/deduction_map 판정에는 반영되지 않음(2026-07-09 사용자 결정: fund_source 미지정 항목을 '전부 정부지원분'으로도 '전부 확인필요 처리'로도 자동 취급하지 않고, 한도초과 판정에서는 제외하되 그 사실만 별도로 알림)"
            properties:
              total_krw: { type: number, description: "budget_detail 전체 항목 합계(정부지원+자기부담 포함, fund_source 무관)" }
              confirmed_government_krw: { type: number, description: "fund_source==\"government\"로 명시된 항목의 합계. budget_criteria.max_grant_krw와의 초과 여부 비교에 사용되는 값" }
              confirmed_self_krw: { type: number, description: "fund_source==\"self\"로 명시된 항목의 합계" }
              unresolved_krw: { type: number, description: "fund_source가 지정되지 않은 항목의 합계 (한도초과 판정에는 포함되지 않음)" }
              unresolved_count: { type: integer }
              unresolved_note: { type: string, nullable: true, description: "unresolved_count > 0이고 max_grant_krw가 있을 때만 채워짐. 정부지원분 합계를 완전히 확인하지 못했다는 사실을 사람에게 알리는 안내문 — 자동 판정에는 미반영" }
      quality_gate_result:
        type: object
        description: "숫자 기준(confidence)과 질적 기준(judge_review) 둘 다 통과해야 lock_state가 READY_FOR_APPROVAL이 됨. 하나라도 미달이면 DRAFT로 유지."
        properties:
          overall_confidence: { type: number }
          confidence_threshold: { type: number }
          confidence_passed: { type: boolean, description: "숫자 기준(overall_confidence >= confidence_threshold) 통과 여부" }
          judge_pass_recommendation: { type: boolean, description: "질적 기준 — judge_review.overall_pass_recommendation 값을 그대로 반영" }
          lock_state: { type: string, enum: ["READY_FOR_APPROVAL", "DRAFT"], description: "confidence_passed AND judge_pass_recommendation 일 때만 READY_FOR_APPROVAL" }
          routed_to: { type: string, enum: ["auto_complete", "human_review"] }
          reasons: { type: array, items: { type: string }, description: "숫자 기준/질적 기준 각각의 통과 여부와 구체적 미통과 사유([확인 필요] 섹션 수, 미준비 서류 수 등)" }
      lock_state:
        type: string
        enum: ["READY_FOR_APPROVAL", "DRAFT"]
        description: "quality_gate_result.lock_state와 동일한 값을 최상위에도 노출 (호출측 편의)"
      needs_confirmation:
        type: array
        items: { type: string }
        description: "가정값/불확실 항목 — 사람이 반드시 확인해야 할 목록. 공고 eligibility에 _unmapped_requirements가 있으면(스키마로 표현 못하는 자격요건) 여기에도 노출됨"

model_routing:
  stages:
    - step: "공고문 수집 및 핵심 기준 추출 (신청자격/지원제외/제출양식/페이지제한/예산기준/심사표)"
      tier: low_cost
    - step: "신청자격 체크 및 지원제외·결격 위험 점검"
      tier: mid
    - step: "자격요건 매칭 (마감지남 제외, 필수서류 없으면 실패처리)"
      tier: mid
    - step: "신청서 초안 작성"
      tier: mid
    - step: "심사위원 모드 자기검수 (감점위험/과장/증빙부족/예산정합성 탐지)"
      tier: high

quality_gate:
  confidence_threshold: 0.85
  self_check_rules:
    - "마감일이 target_period.end_date 이전이거나 오늘 이전인 공고는 matched_programs에서 자동 제외되어야 함"
    - "required_documents가 비어있거나 원문에서 확인 불가한 공고는 매칭 실패(excluded_programs) 처리되어야 함"
    - "disqualification_flags에 해당하는 결격사유가 있으면 해당 공고는 confidence와 무관하게 excluded_programs로 이동해야 함"
    - "judge_review는 rejection_risks가 0건이어도 '검토했으나 없음'을 명시적으로 기재해야 함 (생략 금지)"
    - "overall_confidence가 confidence_threshold 미만이면 quality_gate_result.routed_to는 human_review여야 함"
    - "lock_state는 confidence_passed와 judge_pass_recommendation이 모두 true일 때만 READY_FOR_APPROVAL이어야 함 — 숫자 기준만 통과하고 심사위원 모드가 불합격 추천을 낸 경우에도 반드시 DRAFT로 유지"
    - "lock_state가 DRAFT인 경우 reasons에 confidence_passed/judge_pass_recommendation 중 무엇이, 왜(어떤 섹션·서류·위험 때문에) 실패했는지 구체적으로 명시해야 함"
    - "business_description/team_experience/budget_detail/expected_outcomes가 채워져 있는데도 draft_application에 [확인 필요]가 남아있으면 버그로 간주 (string이든 object든 값이 있으면 반영되어야 함)"
    - "documents_status에 명시된 준비완료 서류는 required_documents_checklist.prepared=true로 정확히 반영되어야 함 (문서명이 required_documents와 정확히 일치하는 경우에 한함 — 불일치는 needs_confirmation에 표시)"
    - "biz_type/industry_code/founded_date/region/employees/annual_revenue_krw/ceo_birth_date/gender/career_interruption_status가 profile에 없을 때는 '불합격(False)'이 아니라 '확인 필요(unresolved)'로 채점해야 함"
    - "business_profile.budget_detail 중 fund_source==\"government\"로 명시된 항목의 합계가 공고 budget_criteria.max_grant_krw를 초과하거나, budget_detail 항목의 category가 budget_criteria.excluded_categories에 해당하면 judge_review.rejection_risks에 구체적으로 명시해야 함 (v0.4.0, v0.5.3부터 총액이 아니라 정부지원분 명시 항목 기준으로 판정)"
    - "심사배점 커버리지 판정('가점'류 제외)은 항목명 전체 토큰을 확인해야 하며, 단일 첫 단어 완전일치만으로 판정해서는 안 됨 (v0.4.0 — 실전 공고 문구 차이로 인한 오탐 방지 목적, 단 여전히 키워드 휴리스틱이므로 의미 기반 판정은 아님)"
    - "psst_review 4구간이 전부 pass이고 judge_panel_review.warning_count가 0일 때만 judge_pass_recommendation의 질적 조건을 만족한 것으로 간주해야 함 (v0.5.0 — 기존 형식요건 조건에 AND로 추가, 대체 아님)"
    - "deduction_map은 quality_gate_result.overall_confidence를 다시 깎는 데 사용해서는 안 됨 — 설명 문장으로만 노출해야 함 (v0.5.0)"
  on_fail:
    retry_count: 1
    escalation_target: human_review

invocation:
  entrypoint: "scripts/run.py"
  callable_by:
    - "manual_cli"
    - "ai_employee_platform"
  cli_usage: "python3 scripts/run.py <input.json> [announcements.json] — announcements.json 생략 시 scripts/sample_announcements.json(목업) 사용 (v0.4.0)"

state:
  external_store_ref: "실행별 결과 JSON(run_result_<timestamp>.json)이 상태 — 동일 사업자/기간 재실행 시 이전 결과와 diff 비교 권장"

failure_log_format:
  fields:
    - "timestamp"
    - "step"
    - "input_summary"
    - "error"
    - "confidence_at_failure"

changelog:
  - version: "0.5.4"
    changes:
      - "[JUDGE_DEFINITIONS 키워드 보강] 예산·증빙 심사위원 rubric_keywords에 \"사업비\" 추가, 성과·확장 심사위원 rubric_keywords에 \"기대효과\" 추가. 3번째 실제 공고(생활문화 혁신지원)의 심사배점 항목이 '예산'/'자금'/'성과'/'확장'/'고용'/'사회적' 어느 키워드와도 매칭되지 않아 발견된 과소매칭(backlog 항목) 해소. 추가 전 real_announcements.json/sample_announcements.json 전체 scoring_rubric 텍스트와 기타 JSON 필드를 스캔해 \"사업비전\" 같은 무관 단어에 우연히 포함되는 사례가 없는지 확인한 뒤 추가함(v0.4.0의 짧은 키워드 과다매칭 재발 방지 원칙 준수)"
      - "교차 검증: 경력단절여성 공고/AI활용지원 공고(과장·구체 대조군 2건)/생활문화 공고 4개 케이스 전부 재실행 — AI활용지원 공고에서 기존 'AI' 키워드 과다매칭 문제가 재발하지 않음을 확인(신규 키워드 2개가 이 공고의 rubric 텍스트에 아예 등장하지 않아 매핑 변화 없음). 생활문화 공고에서만 예산·증빙/성과·확장 심사위원의 mapped_rubric_items가 빈 배열에서 정확한 항목으로 채워짐"
      - "회귀테스트 12개(6개 정식 + AI판사 대조군 2개 + synthetic 4개) 전부 기존과 완전히 동일한 lock_state/confidence/judge_panel_review.warning_count/deduction_map.triggered_issues로 재확인됨 — rubric_keywords는 mapped_rubric_items(표시용 필드)에만 영향을 주고 score/warning 계산에는 관여하지 않으므로 이론적으로도 예상된 결과"
      - "[부분 해소로 기록] 이번 라운드에서 3번째 공고의 '수행역량 - 참여인력현황및경험/참여인력별 수행역할'(30점) 항목은 여전히 8인 중 어느 심사위원에도 매핑되지 않음을 추가로 발견함 — 이는 어휘 차이(키워드 테이블 보강으로 해결 가능한 문제)가 아니라, 스펙상 고정된 8인 심사위원 중 '팀/참여인력의 역량'을 평가 목적으로 하는 심사위원이 애초에 없는 구조적 공백으로 판단됨(8인 로직 자체는 스펙상 공고 불변이라 함부로 확장하지 않음). 억지로 기존 심사위원 중 하나에 키워드를 끼워맞추면 그 심사위원의 실제 평가 취지와 맞지 않게 되므로 이번 라운드에서는 손대지 않고 기록만 함 — 즉 'rubric 키워드 과소매칭' backlog는 이번에 지시받은 2개 사례(사업비/기대효과)에 대해서는 해소됐으나, 키워드 휴리스틱 자체의 한계(의미 기반 매칭이 아님, 공고마다 새 표현이 나오면 재발 가능)와 이번에 새로 발견한 구조적 공백(수행역량류 심사위원 부재) 두 가지는 미해결 상태로 남음"
  - version: "0.5.3"
    changes:
      - "[budget_detail 스키마] 각 항목에 fund_source(\"government\"|\"self\", 선택 필드) 추가. business_profile.budget_detail.oneOf[0].items.properties와 oneOf[1].phase_N.items.properties 양쪽 모두에 추가(v0.2.0 리스트 방식/v0.3.0 phase 방식 둘 다 지원)"
      - "[check_budget_compatibility() 수정] 기존에는 budget_detail 총액(정부지원+자기부담 합계)을 budget_criteria.max_grant_krw와 그대로 비교해, 자기부담이 있는 정상적인 사업 구성도 '한도 초과'로 오탐하는 버그가 있었음(2026-07-08 세션, 3번째 실제 공고 real_program_3rd_input.json에서 발견 — 총사업비 111.2백만원 vs 지원한도 100백만원). v0.5.3부터 fund_source==\"government\"로 명시된 항목의 합계만 한도 비교에 사용하도록 수정"
      - "[후행 호환 — 미지정 항목 처리, 2026-07-09 사용자 결정] fund_source가 없는 기존/향후 데이터(현재 모든 test/*.json 전부 해당)를 '전부 정부지원분으로 간주'하지도 '전부 확인필요로 제외'하지도 않기로 함. 대신: (1) 한도초과 자동 판정에서는 미지정 항목을 제외(안전장치 우선), (2) 미지정 항목이 있다는 사실 자체는 judge_review.budget_breakdown.unresolved_note에 참고 정보로만 노출(quality_gate/8인심사위원/감점전파 등 자동 판정에는 미반영 — deduction_map과 동일한 '설명 전용' 원칙 적용). 두 기존 대안(전부 정부지원 간주 / 전부 제외)을 실제로 시뮬레이션해서 6개 회귀테스트에 대한 영향을 비교한 결과, 어느 쪽을 택하든 6개 회귀테스트의 최종 lock_state/confidence/judge_panel_review/deduction_map은 전혀 달라지지 않음을 먼저 확인한 뒤(즉 판단은 오직 향후의 새 데이터에만 영향), 이 절충안으로 결정함"
      - "budget_breakdown 필드 신설(judge_review 하위) — total_krw/confirmed_government_krw/confirmed_self_krw/unresolved_krw/unresolved_count/unresolved_note. 총액과 정부지원분 단독 금액을 항상 함께 노출해 어느 기준으로 판정됐는지 사람이 볼 수 있게 함"
      - "회귀테스트 12개(6개 정식 + AI판사 대조군 2개 + synthetic 4개) 전부 기존과 동일한 lock_state/confidence/judge_panel_review.warning_count/deduction_map.triggered_issues로 재확인됨 — fund_source 스키마 추가가 기존 결과에 전혀 영향 없음"
      - "real_program_3rd_input.json(111.2백만원 케이스) 재검증 결과: 예산 관련 오탐이 해소됨(confidence 0.35→0.40, judge_panel_review.warning_count 3→2, deduction_map.triggered_issues에서 '예산 근거 누락' 소멸, '예산·증빙 심사위원' score 1/warning True → score 5/warning False). 단, 이 파일의 실제 예산 8개 항목에 fund_source를 채워 넣지는 않음 — 원본 합격 사업계획서에 '총사업비 111.2백만원(정부지원금 100백만원+기업부담금 11.2백만원)'이라는 총액 단위 구분만 있고 항목별 구분은 원문에 없어 임의로 배정하지 않기로 함(추측 금지 원칙). 즉 이번 케이스의 개선은 '항목별로 정확히 확인해서 통과시킨 것'이 아니라 '확인 안 된 상태를 정직하게 확인 필요로 남기고, 그로 인해 근거 없는 초과 경고만 제거한 것' — 위 confirmed_government_krw=0, unresolved_count=8 상태로 남아있음"
  - version: "0.5.0"
    changes:
      - "정부지원사업_판정로직_확장스펙.md(위험표현 사전/PSST/8인 가상 심사위원/감점 전파 모델 4개 표) 기반으로 judge_mode_self_review()에 질적 판정 레이어 4종 추가. 기존 confidence 공식(overall_confidence)은 불변 — 4개 신규 결과는 judge_pass_recommendation 판정 근거를 '형식요건만' -> '형식+내용품질'로 넓히는 데만 사용"
      - "[위험표현 사전] RISK_PHRASE_DICTIONARY(9종 고정세트, 완벽히 해결/100% 자동화/AI가 판단한다/자동 발송/외주 개발만 하면 된다/단순 구독/장비 구매/플랫폼으로 대박 확장/기존 문제를 다 없앤다) 스캔 결과를 exaggeration_flags에 '원문 표현 + 대체문구 제안' 형태로 추가(append, 자동 치환 없음)"
      - "[PSST 자동검수] psst_review 필드 신설 — Problem/Solution/Support/Traction 4구간을 draft 섹션 존재여부 + 숫자·단위 정규식(만/억 단위 포함) + budget_detail/documents_status 존재여부로 pass/fail 판정. 판정만 하고 문장을 대신 써주지 않음"
      - "[8인 가상 심사위원] judge_panel_review 필드 신설 — 공고적합성/자격규정/문제정의/AI필요성/실행계획/예산증빙/성과확장/발표Q&A 8인이 기존 신호(자격미확정/미준비서류/결격위험/예산리스크/위험표현/PSST결과)를 근거로 0~5점+즉시경고 판정. 8인 로직은 공고 불변, scoring_rubric 키워드 매핑만 공고별 가변"
      - "[감점 전파 모델] deduction_map 필드 신설 — 대표 이슈 5종(예산근거누락/자격증빙미확보/작업시간실측없음/AI필요성불명확/산출물미정의)의 발생 여부를 판정하고, 발생 시 스펙 원문 고정 계수로 다른 평가항목 전파 리스크를 설명. overall_confidence는 건드리지 않음"
      - "overall_pass_recommendation에 'psst_review 전항목 pass' AND 'judge_panel_review.warning_count==0' 조건 추가 (기존 조건에 AND로 결합, 기존 조건 대체 아님)"
      - "회귀테스트 6종 전부 기존과 동일한 lock_state/overall_confidence로 재확인됨 (sample_input_ideal.json은 READY_FOR_APPROVAL 유지). 추가로 합성 결함 케이스 4종(test/synthetic_*.json)으로 신규 로직 4개가 실제로 발동하는지 개별 검증함"
      - "PSST 숫자+단위 정규식 최초 버전은 '300만 개'처럼 만/억 단위가 낀 한국어 수량 표현을 인식하지 못해 sample_input_ideal.json의 Problem을 오탐(FAIL)시키는 버그가 있었음 -> 정규식에 만/억 옵션 그룹을 추가해 수정, 회귀테스트로 재확인"
  - version: "0.4.0"
    changes:
