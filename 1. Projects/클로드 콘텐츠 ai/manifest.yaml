# =====================================================================
# 콘텐츠 공장 (주제→발행) — manifest v2
# =====================================================================
# 목적: 혜미가 "주제"만 주면 → 자료조사 → 분석카드 → 블로그/스레드 초안
#       → 형식검사 → 대표승인 → 게시 → 기록 까지 한 줄로 처리.
#
# 설계 근거 (전부 기존 확정 패턴에서 파생 — 새 구조 발명 없음):
#   - 분석카드 수렴 원칙: 설계노트 5-8 콘텐츠재생산 공장
#     ("카드뉴스를 블로그에서 파생시키지 말 것 — 전부 분석카드 하나로만 수렴")
#   - 발행(외부 전송) 전 human 게이트 + 발송단에서 승인 재검증(이중방어):
#     company_charter + 방역 문자장부봇 패턴
#   - 승인 블록(approval)·반려 라우팅: manifest.schema.v2.yaml approval_block
#   - rerun_gate/on_reject/review: 설계노트 1-4 공통규칙 3가지 (이 공장이
#     처음부터 3가지 전부 적용한 첫 공장)
#
# ※ stage 구성 자체는 위 확정 패턴들의 조합으로 만든 "초안"임 —
#   운영하다 구조 변경급 판단이 필요해지면 Fable 상정(사용자 승인 후) 원칙 유지.
# =====================================================================
# ---------------------------------------------------------------------
# 팩 참조 (2026-07-19 [hyemi], decision-log §25 F7 — 마케팅팀 v1 승격)
#   brand-pack   : 무엇을 파는 누구인가 (브랜드마다 1개)
#   channel-pack : 채널별 글쓰기·게시 규칙 (업종·고객과 직교, 전 브랜드 공유)
#   파이프라인 stage 구조는 바뀌지 않았다 — 읽어 오는 설정의 위치만 규격화.
# ---------------------------------------------------------------------
packs:
  brand_packs_dir: brand-packs/
  channel_packs_dir: channel-packs/
  default_brand: brand-packs/hyemi-ai-company.yaml   # 마케팅팀 1호 고객 = 혜미 AI 자동화 사업
  channels:
    - channel-packs/naver-blog.yaml
    - channel-packs/threads.yaml                     # 현재 브랜드1호에서는 비활성(계정 미정)

schema_version: v2
domain: content
skill_name: content-topic-to-publish
based_on_schema: ai공장짓기/manifest.schema.v2.yaml
execution: pipeline-type

triggers:
  - type: event
    source: topic
    entry_stage: 주제접수봇
    note: "혜미가 주제 1개(+옵션: 채널 선택, 참고자료)를 주면 시작"
  - type: schedule
    interval: publish_cycle
    entry_stage: 주제접수봇
    note: "발행 주기(주 3회, 5시 — 요일·오전/오후는 channel_config.yaml에서 확정) 도래 시,
      주제 백로그에서 다음 주제를 꺼내 초안을 미리 준비. 실제 날짜 확인·트리거링은
      manifest 밖 별도 스케줄러(Cowork 예약작업) 담당 — 방역 리마인더 패턴과 동일 원칙.
      [2026-07-12 추가, 혜미 회신 반영]"

rerun_gate:              # 공통규칙 ① — 같은 주제·같은 옵션이면 재실행 안 함
  enabled: true
  hash_inputs: [user_input]
  scope: full

shared_context:
  topic:
    type: object
    description: "주제·옵션(대상 채널 blog/threads, 참고자료, 요청 톤). 주제접수봇이 정규화해 기록"
    written_by: [주제접수봇]
    read_by: [자료조사봇, 분석카드봇]
  research_notes:
    type: object
    description: "자료조사 결과 — 핵심 사실/근거/출처 후보. '사실 미확인' 표시 필수(환각 방지)"
    written_by: [자료조사봇]
    read_by: [분석카드봇]
  content_card:
    type: object
    description: "분석카드(공유장부) — 모든 채널 초안은 반드시 이 카드에서만 파생(5-8 원칙). 핵심메시지/구조/근거/금지표현"
    written_by: [분석카드봇]
    read_by: [블로그작성봇, 스레드작성봇, 대표승인]
  blog_draft:
    type: object
    description: "블로그 초안 — 본문/제목/태그 + approval 블록(초안/승인대기/승인완료/반려)"
    written_by: [블로그작성봇]
    read_by: [형식게이트봇, 대표승인, 게시봇]
  thread_draft:
    type: object
    description: "스레드(Threads) 초안 — 게시물 배열(글자수 제한 준수) + approval 블록"
    written_by: [스레드작성봇]
    read_by: [형식게이트봇, 대표승인, 게시봇]
  format_check:
    type: object
    description: "형식게이트 판정 결과 — 길이/금지어/해시태그 규칙(조건테이블) 통과 여부. 질적 판단은 안 함(5-8 shorts_gate 원칙)"
    written_by: [형식게이트봇]
    read_by: [대표승인]
  publish_result:
    type: object
    description: "게시 결과 — 채널별 성공/실패/URL. 승인완료 아닌 초안은 게시봇이 절대 게시 안 함(이중방어)"
    written_by: [게시봇]
    read_by: [기록봇]
  publish_log:
    type: object
    description: "발행 장부 — 언제/어디에/무엇을/어느 버전으로 게시했는지 누적 기록(다음 콘텐츠 기획의 근거)"
    written_by: [기록봇]
    read_by: []

stages:
  - id: 주제접수봇
    kind: local
    kind_rationale: "주제·옵션을 그대로 정규화 저장 — 판단 없음"
    io: {reads: [], writes: [topic]}
    exec_params: {retry_count: 0}
    depends_on: []

  - id: 자료조사봇
    kind: model
    tier: mid
    kind_rationale: "주제 관련 사실·근거 수집과 요약 — LLM 판단 필요. 실운영시 웹검색 도구 결합"
    io: {reads: [topic], writes: [research_notes]}
    exec_params: {retry_count: 1}
    depends_on: [주제접수봇]

  - id: 분석카드봇
    kind: model
    tier: mid
    kind_rationale: "핵심메시지·구조 설계 — 모든 채널이 여기서만 파생(채널 간 파생 금지, 5-8 원칙)"
    io: {reads: [topic, research_notes], writes: [content_card]}
    exec_params: {retry_count: 1}
    depends_on: [자료조사봇]

  - id: 블로그작성봇
    kind: model
    tier: mid
    kind_rationale: "장문 작성 — 분석카드에서만 파생"
    io: {reads: [content_card], writes: [blog_draft]}
    exec_params: {retry_count: 1}
    depends_on: [분석카드봇]
    run_if: 블로그_채널이_선택됨
    run_if_status: "확정 — topic.channels에 blog 포함 여부로 판정"

  - id: 스레드작성봇
    kind: model
    tier: low_cost
    kind_rationale: "단문 변환 — 분석카드에서만 파생(블로그에서 파생 금지)"
    io: {reads: [content_card], writes: [thread_draft]}
    exec_params: {retry_count: 1}
    depends_on: [분석카드봇]
    run_if: 스레드_채널이_선택됨
    run_if_status: "확정 — topic.channels에 threads 포함 여부로 판정"

  - id: 형식게이트봇
    kind: local
    kind_rationale: "글자수/금지어/해시태그 개수 — 조건테이블화 가능한 것만 local(질적 판단 없음)"
    io: {reads: [blog_draft, thread_draft], writes: [format_check]}
    exec_params: {retry_count: 0}
    depends_on: [블로그작성봇, 스레드작성봇]

  - id: 대표승인
    kind: human
    kind_rationale: "외부 발행 = 되돌리기 어려움 → 사람 승인 필수(company_charter). 채널별 부분승인 가능"
    io: {reads: [content_card, blog_draft, thread_draft, format_check], writes: []}
    depends_on: [형식게이트봇]
    review:                  # 공통규칙 ③ — 골격만(값 집행은 러너 MVP 범위 밖)
      risk_tier: T2
      reviewer_grade: senior
      sla_hours: 24
      queue_priority: high
      mandatory: true
    on_reject:               # 공통규칙 ② — 사유별 재작업 라우팅
      default: 분석카드봇
      by_reason:
        형식: 형식게이트봇        # 형식 문제 → 재판정만
        내용: 분석카드봇          # 내용 문제 → 카드부터 다시(작성봇들 자동 재파생)
        제약위반: 자료조사봇      # 사실오류·근거 문제 → 조사부터 다시
      max_loops: 3
      on_exhaust: escalate_human

  - id: 게시봇
    kind: tool
    kind_rationale: "외부 게시 도구 호출(tool-external). 승인완료 아닌 초안은 여기서 다시 검증해 차단(이중방어 — 파이프라인 순서만 믿지 않음)"
    io: {reads: [blog_draft, thread_draft], writes: [publish_result]}
    exec_params: {retry_count: 1}
    depends_on: [대표승인]

  - id: 기록봇
    kind: local
    kind_rationale: "발행 장부 기록 — 판단 없음"
    io: {reads: [publish_result], writes: [publish_log]}
    exec_params: {retry_count: 0}
    depends_on: [게시봇]

summary: >
  9 stage (local 3 / model 4 / human 1 / tool 1). 주제→조사→분석카드→
  블로그·스레드 병렬 파생→형식게이트→대표승인(반려 라우팅)→게시(승인 재검증)→장부.
  공통규칙 3가지(rerun_gate/on_reject/review) 최초 전면 적용 공장.

open_questions:
  - "블로그 플랫폼 미확정(네이버/티스토리/기타) — 게시봇 실제 구현 전에 혜미 확인 필요"
  - "Threads 게시 방법 미확정 — 공식 API vs Cowork 세션에서 Claude가 Chrome으로 게시. 후자면 '자동'의 의미는 '승인 후 클릭 대행'"
  - "톤·금지어·해시태그 규칙(형식게이트 조건테이블)이 아직 기본값 — 혜미 골든셋(기존 글 3~5개)으로 보정 필요"
  - "발행 주기·채널별 분량 기준 미정"
  - "model stage 실제 LLM 연동은 전 공장 공통 미착수 항목 — 러너의 ModelProvider 교체 시점에 함께"
