행동_유도_문구:
  기본: "[확인 필요] — 문의를 어디로 받을지 정해야 함(카톡채널/폼/전화 중)"
  연락처: "[확인 필요] — 사업용 연락처 미정"

콘텐츠_소재_출처:
  원칙: >
    업무 결과에서 나온 실제 사례를 콘텐츠로 전환한다(§25 F7-2). 단 마케팅
    공장이 각 공장의 완료 산출물을 읽기 전용으로 가져오며, 첫 단계는 반드시
    개인정보 제거·공개가능 판정이다. 고객 정보가 든 사례는 고객 동의 없이
    쓰지 않는다.
  후보:
    - "지원사업 매칭 실사례(사업체명 익명화)"
    - "꽃집·방역 자동화 전후 비교(가족 사업 — 동의 확보됨/필요)"
    - "만들면서 알게 된 것(설계 판단·실패 기록) — decision-log 기반"
