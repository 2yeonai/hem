# =====================================================================
# brand-pack 1호: 혜미 AI 자동화 사업
# 근거: decision-log_skill-factory-architecture.md §25 F7-5.
#   "마케팅팀의 첫 고객은 혜미 회사 자신" — 업무 결과가 콘텐츠가 되고,
#   콘텐츠가 문의를 만들고, 문의가 판매가 되는 순환의 첫 바퀴를 돌리는
#   대상이 이 브랜드다.
# 브랜드팩 = "무엇을 파는 누구인가"(업종·고객과 무관한 채널 규칙은
#   channel-packs/에 따로 있음 — 여기 섞지 않는다).
# ⚠️ 혜미만 아는 값은 지어내지 않고 전부 [확인 필요]로 비워 뒀다.
#   채우기 전에는 게시용 콘텐츠 생성에 쓰지 말 것.
# 작성: 2026-07-19 [hyemi]
# =====================================================================
brand_id: hyemi-ai-company
brand_name: "[확인 필요] — 사업체명 미정(mo,on과 별개 라인, §25 F9-1)"
status: 초안          # 초안 | 확정 — [확인 필요] 항목이 남아 있어 초안

사업_소개:
  한줄: >
    소상공인이 매일 반복하는 업무(주문 접수·견적·문서 작성·지원사업 찾기)를
    업종에 맞게 자동화해 주는 AI 시스템을 만들고 운영해 준다.
  긴설명: >
    앱을 하나 만들어 주고 끝나는 것이 아니라, 업종별 규칙팩과 고객별 설정만
    바꿔 조립하는 공통 AI 운영 시스템을 제공한다. 실제로 꽃집(14봇)·방역
    (18단계)·정부지원사업 매칭을 같은 구조로 만들어 돌리고 있다.
  차별점:
    - "업종 실무 규칙을 아는 것 — 꽃집의 리본 문구·보내는 사람 누락, 방역의 현장 조건, 지원사업의 제외 조건 같은 것"
    - "되돌릴 수 없는 일(발송·제출·게시)에는 반드시 사람 승인 단계를 남기는 설계"
    - "실제로 돌아가는 실적: 지원사업 공고 1,496건 실수집 + 3개 사업체 매칭 후보 생성"

고객_유형:
  주요: "소상공인 — 특히 반복 주문·견적·문서 업무가 매일 발생하는 업종"
  구체_후보:
    - "정부지원사업을 자주 신청하는 소상공인 (진입장벽 가장 낮음, §25 F9-4)"
    - "꽃집형 주문제작업 (주문 정보 누락이 잦은 업종)"
    - "방역·청소·시설관리업 (현장 견적·작업지시·증명서 발급)"
  베타_0호: "가족 사업 — 온천꽃식물원(꽃집팩), 방역앤클린(방역팩, 김남오 사업이라 별도 동의 필요)"

핵심_상품:
  목록:
    - 이름: "업무자동화 진단"
      가격: "15~30만원"
      내용: "현재 업무 인터뷰 → 자동화 가능·불가능 구분 → 예상 절감 시간 → 구축 견적"
      상태: "지금 판매 가능"
    - 이름: "정부지원 매칭 리포트"
      가격: "월 5~15만원 (최종 가격 [확인 필요] — 혜미 결정)"
      내용: "사업체에 맞는 지원사업 후보를 정기적으로 찾아 리포트로 제공"
      상태: "지금 판매 가능 — 유일하게 실가동 중인 자산"
    - 이름: "업종팩 구축"
      가격: "구축 100~250만원 + 월 10~29만원 (첫 1~2곳 기준)"
      내용: "업종에 맞는 자동화 시스템 구축 + 운영"
      상태: "조건부 — 범위 고정·수정 2회·익명 사례 공개 동의 필수"
  주의: >
    490만원 이상 상위 상품(픽셀 AI 회사 패키지 등)은 해당 기능이 실제로
    존재한 뒤에만 게시한다(§25 F9-2). 없는 것을 팔지 않는다.

브랜드_문체:
  톤: "[확인 필요] — 혜미 확인 필요. 잠정: 과장 없이, 되는 것과 안 되는 것을 그대로 말하는 톤"
  기준: >
    비개발자 소상공인이 읽는다. 전문용어를 쓰면 그 자리에서 일상 비유로
    풀어 쓴다(볼트 전역 규칙과 동일). 초등학생도 알아듣는 수준이 기준.
  금지_표현:
    - "완전 자동 / 100% 자동 — 사람 승인 단계가 실제로 있으므로 사실이 아님"
    - "AI가 알아서 다 해준다 — 같은 이유"
    - "아직 만들지 않은 기능을 이미 있는 것처럼 쓰는 모든 표현"
    - "[확인 필요] — 혜미가 추가로 싫어하는 표현이 있으면 여기 적을 것"

지역: "전국 비대면 (mo,on의 진주 지역 제약과 달리 지역 무관 — §25 F9-1)"

