# =====================================================================
# channel-pack: threads (스레드)
# 근거: decision-log_skill-factory-architecture.md §25 F7-3.
#   channel-pack은 업종(industry-pack)·고객(client-pack)과 직교하는
#   제3의 팩 — "스레드 글쓰기 규칙"은 어느 브랜드가 쓰든 동일하다.
#   브랜드별로 이 파일을 복사하지 않는다(팩 드리프트 방지).
# 정본 출처: 기존 channel_config.yaml의 threads_1/threads_2 항목 +
#   발행_스케줄을 채널 단위로 분리·규격화(2026-07-19, [hyemi]).
#   원본에 없던 값은 전부 [확인 필요] — 새 사실을 지어내지 않음.
# 이 파일을 읽는 stage: 스레드작성봇(형식 기준), 형식게이트봇(통과 판정),
#   게시봇(계정·승인 방식)
# =====================================================================
channel_id: threads
platform: Threads
status: 확정

format:
  구조: "짧은 관점·경험·공감형 단문. 첫 문장이 후킹."
  길이: "[확인 필요] — 원본 channel_config.yaml에 글자수 기준 없음. 스레드 플랫폼 기본 상한은 500자."
  시리즈: "긴 글은 여러 게시물로 분해 가능(마스터 콘텐츠 1개 → 스레드 여러 개)"
  이미지: "선택 — 혜미가 직접 찍은 사진만 사용(원칙: 기초자료_공유)"
  해시태그: "[확인 필요] — 원본에 규칙 없음"
  링크: "[확인 필요] — 원본에 규칙 없음"

파생_원칙:
  근거: "설계노트 5-8 + 기존 manifest 주석 — 모든 채널 초안은 분석카드(content_card) 하나에서만 파생.
    블로그 글을 잘라 스레드로 만들지 않는다(채널 간 파생 금지, 카드로 수렴)."

# ---------------------------------------------------------------------
# 계정 매핑
# ⚠️ 중요(2026-07-19 실측): 현재 확보된 스레드 계정 2개는 둘 다 주제가
#    고정된 별개 계정이라, 브랜드팩 1호(혜미 AI 자동화 사업)의 홍보 채널로
#    바로 쓸 수 없다. 아래 unresolved 항목 참고 — 혜미 결정 필요.
# ---------------------------------------------------------------------
account_mapping:
  maasittang:
    account: "@maasittang"
    url: https://www.threads.com/@maasittang
    용도: "진주(시내) 맛집 계정 — 진주 지역 맛집 소개·후기"
    상태: 확정
    사용_브랜드: "[해당 없음 — AI 자동화 사업과 무관]"
  yeon_sz:
    account: "@2yeon_sz"
    url: https://www.threads.com/@2yeon_sz
    용도: "육아 계정 — 육아 + 육아코디 + 엄마 바이브. 아기 코디 콘텐츠 바이럴 이력 있어 그 중심 유지"
    상태: 확정
    사용_브랜드: "[해당 없음 — AI 자동화 사업과 무관]"

unresolved:
  - 항목: "AI 자동화 사업용 스레드 계정"
    내용: >
      브랜드팩 1호(hyemi-ai-company)가 스레드로 홍보하려면 계정이 필요한데,
      기존 2개는 맛집·육아 전용이라 주제가 안 맞는다. 선택지 3개 —
      ①새 스레드 계정 신설 ②AI 사업은 네이버 블로그만 쓰고 스레드는 보류
      ③기존 계정 중 하나의 용도 확장(권장하지 않음 — 계정 정체성 훼손).
      결정 전까지 브랜드팩 1호의 channels에서 threads는 비활성으로 둔다.
    결정자: 혜미
    상태: 미결정

발행:
  주기: "주 3회"
  시각: "오후 5시"
  요일: [월, 수, 금]
  방식: >
    Cowork 예약작업이 발행일에 초안을 준비하고, 혜미 승인 후 게시
    (manifest의 schedule 트리거와 연동)
  승인: >
    승인완료 아니면 게시 절대 불가. 게시봇이 발송 직전 승인 상태를 다시
    검사한다(이중방어) — company_charter 및 방역 문자장부봇과 동일 패턴.
