# =====================================================================
# channel-pack: naver-blog (네이버 블로그)
# 근거: decision-log_skill-factory-architecture.md §25 F7-3.
#   channel-pack은 업종(industry-pack)·고객(client-pack)과 직교하는
#   제3의 팩 — "네이버 블로그 글쓰기 규칙"은 꽃집이든 방역이든
#   AI 자동화 회사든 동일하게 적용된다. 이 팩 하나를 모든 브랜드팩이
#   공유해서 참조한다(브랜드마다 복사하지 않음).
# 정본 출처: 기존 channel_config.yaml의 blog_naver 항목 + 발행_스케줄을
#   채널 단위로 분리·규격화(2026-07-19, [hyemi]). 새 사실 추가 없음 —
#   원본에 없던 값은 전부 [확인 필요]로 표시.
# 이 파일을 읽는 stage: 블로그작성봇(형식 기준), 형식게이트봇(통과 판정),
#   게시봇(계정·승인 방식)
# =====================================================================
channel_id: naver_blog
platform: 네이버 블로그
status: 확정

account_mapping:
  account: eunoia9496
  blog_name: "eunoia: 유노이어"
  url: https://m.blog.naver.com/eunoia9496
  note: >
    브랜드팩(예: hyemi-ai-company)이 이 채널을 선택하면 기본으로 이 계정을
    쓴다. 브랜드마다 다른 네이버 블로그 계정을 쓰게 되면(예: mo,on 전용
    블로그가 따로 생기면) 이 필드를 브랜드팩 쪽에서 override하는 방식을
    쓴다 — 이 팩 자체를 브랜드별로 복사하지 않는다(팩 드리프트 방지 원칙,
    §25 F7-3).

format:
  구조: "제목 + 본문(소제목·문단 구분) + 사진(선택)"
  글자수_기준: "[확인 필요] — manifest.yaml open_questions에 '형식게이트 조건테이블이 아직 기본값'으로 명시됨. 혜미 골든셋(기존 글 3~5개) 확보 후 실측값으로 채울 것. 그 전까지 형식게이트봇은 이 값으로 자동 통과/차단 판정을 내리지 않는다."
  이미지: "혜미가 직접 찍은 사진 우선 사용 (원칙: 기초자료_공유 — 분석카드+글스타일+실사진에서 파생)"

hashtag_rules:
  개수: "[확인 필요] — 골든셋 미수집"
  형식: "[확인 필요]"
  금지_해시태그: []   # 확인되는 대로 채움

forbidden_expressions:
  공통: "company_charter의 과장·확정되지 않은 효능 표현 금지 원칙 상속 (예: 의료적 효과 단정, 확정 안 된 가격/일정 명시)"
  채널_추가: []   # 네이버 블로그 특유의 금지표현은 아직 없음 — 골든셋 검토 후 추가

수익화:
  적용: true
  방식: 애드포스트
  근거: "channel_config.yaml 원칙 — 네이버·티스토리 둘 다 수익화 가능한 구조를 전제로 글 구성"

발행_스케줄:
  주기: 주 3회
  요일: [월, 수, 금]
  시각: "오후 5시"
  방식: "Cowork 예약작업이 발행일에 초안을 준비해두고, 혜미가 승인하면 게시 (manifest schedule 트리거와 연동). 이 스케줄은 채널 공통값이며, 브랜드팩이 여러 채널을 동시에 쓸 경우 채널마다 이 값을 참고한다."

publish_approval:
  방식: "대표승인(human stage) 필수 — 승인완료 아닌 초안은 게시봇이 자체 검증으로 재차단(이중방어, company_charter 준수)"
  게시_방법: "Cowork 세션에서 혜미 로그인된 Chrome으로 게시 대행 (승인 후)"

golden_set:
  상태: 수집_대기
  수집방법_후보:
    - "Chrome 확장 연결되면 Claude가 네이버 블로그에서 직접 읽기"
    - "혜미가 대표 글 2~3개 복붙으로 전달"

# 티스토리는 아직 개설 전(혜미 몫)이라 별도 channel-pack 미작성.
# 개설 확정되면 이 파일을 템플릿으로 tistory.yaml 신설.
