  - "이 목록(읍/면/법정리)에 있는 단어가 '기관명+직책(면장/이장 등)' 패턴 안에 나오면 인명이 아니라 지명으로 우선 해석"
  - "단, '북면'처럼 이 목록 밖에 있지만 실제로 존재하는 인근 지명은 이 파일 갱신 전까지 놓칠 수 있음 — 지명사전은 완전하지 않다는 전제로 설계할 것 (fallback: 사전에 없어도 '~면장/~읍장/~군수' 같은 직책 접미사 패턴으로 지명 여부를 보조 판단)"
  - "이 사전은 창녕군 기준 golden set에서 시작했지만, 실제 거래처가 인접 시/군까지 걸쳐 있으므로 창원시 등 인접 행정구역도 향후 추가 필요(지금은 미착수)"
