# =====================================================================
# 참고자료_행정구역_지명사전.yaml
# 목적: 주문 원문에서 "기관/부서/직책 뒤에 오는 단어"가 사람 이름인지
# 지명(행정구역명)인지 구분할 때 참조. correction_bot/order_draft_bot이
# 이 목록에 있는 단어는 인명 후보에서 제외하는 데 쓸 수 있음.
#
# 출처가 있는 사실만 기록하고, 확인 안 된 것은 명시적으로 "미확인"으로 표시.
# =====================================================================

created: "2026-07-07"
trigger: "실데이터 diff 로그 #2 — 통화 중 '부곡면장'/'북면장' 파싱하며 필요해짐"

창녕군_행정구역:
  source: "나무위키 창녕군/행정 (검색 결과 기준, 2026-07-07 확인)"
  구성: "2읍 12면"
  읍:
    - 창녕읍
    - 남지읍
  면:
    - 고암면
    - 성산면
    - 대합면
    - 이방면
    - 유어면
    - 대지면
    - 계성면
    - 영산면
    - 장마면
    - 도천면
    - 길곡면
    - 부곡면
  부곡면_법정리:
    note: "부곡면 안의 리(里) 단위 — 더 세부적인 지명 구분이 필요할 때 참고"
    법정리: [부곡리, 거문리, 사창리, 온정리, 청암리, 노리, 학포리, 구산리, 비봉리, 수다리]

# ---------------------------------------------------------------------
# ⚠️ 중요한 정정 — 사용자 원 진술과 다름, 확인 필요
# ---------------------------------------------------------------------
북면_관련_주의사항:
  사용자_원_진술: "'부곡면', '북면' 등은 창녕군 안의 행정구역 이름"
  검색으로_확인된_사실: >
    현재(2026년 기준) 창녕군의 공식 행정구역에는 "북면"이 없음. 검색 결과에 따르면
    "북면(北面)"은 1914년 행정구역 개편 때 옛 마산부 북면의 일부가 창녕군 부곡면에
    편입된 것으로 나오며, 그 이후 창녕군 자체의 면으로는 존재하지 않음(위 2읍12면
    목록에 북면 없음).
  그러나: >
    창녕군과 지리적으로 인접한 창원시에는 현재도 활성 행정구역인 "북면"이 실제로
    존재함(부곡온천 인근, 옛 의창군 → 창원군 → 창원시로 이어짐, 2009년 기준 약
    4,637세대·12,109명). 즉 통화에서 언급된 "북면장"은:
    (a) 창녕군 부곡면 안의 옛 지명을 사람들이 관습적으로 여전히 "북면"이라 부르는 것일 수도,
    (b) 실제로는 창원시 북면(다른 행정구역)의 면장을 가리키는 것일 수도,
    (c) 원문 STT/전사 과정의 오인식일 수도 있음
  결론: >
    "북면"이 창녕군 행정구역이라는 전제로 골든셋을 만들면 부정확할 수 있음 —
    골든셋 항목(006)에는 recipient_region을 "북면(창녕 또는 창원 여부 확인 필요)"로
    표시하고 단정하지 않음. 이 지명사전 자체도 사용자 확인 후 갱신 필요.
  sources:
    - "https://namu.wiki/w/%EC%B0%BD%EB%85%95%EA%B5%B0/%ED%96%89%EC%A0%95"
    - "https://namu.wiki/w/%EB%B6%81%EB%A9%B4(%EC%B0%BD%EC%9B%90)"
    - "https://ko.wikipedia.org/wiki/%EB%B6%80%EA%B3%A1%EB%A9%B4"

