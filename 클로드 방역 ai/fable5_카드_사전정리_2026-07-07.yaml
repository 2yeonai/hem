    summary: "일부 stage(검수매니저 등)가 원본 필드를 폭넓게 읽음 — 개인정보 최소수집/목적제한 원칙을 지키려면 접근범위 재설계가 필요할 수 있음"
    evidence: "새 문서 '개인정보와 접근통제' 표: 최소수집/목적제한/접근권한분리 원칙. manifest.yaml 검수매니저 io.reads가 13개 필드(report_requested/certificate_requested 분리로 1개 증가)"
    confidence: 0.4

