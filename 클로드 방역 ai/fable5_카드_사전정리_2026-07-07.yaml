    summary: "visit_cycle이 문자열 하나뿐 — 시설유형별로 법정 소독주기가 다르게 적용된다면 시설유형-주기 매핑 구조가 필요할 수 있음"
    evidence: "새 문서에도 시설별 법정주기 원문 확인 안 됨(보수적 체크리스트로만 존재). manifest.yaml visit_cycle: string 타입 하나. run.py의 CYCLE_DAYS 매핑(격월/분기/반기/연1회)도 임시값일 뿐 법령 근거 없음"
    confidence: 0.3

