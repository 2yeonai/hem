    type: unknown
    summary: "customer_record가 고객+현장 정보를 하나의 object로 뭉쳐 저장 — 고객 1명이 현장 여러 곳을 갖거나 한 현장에 방문 이력이 여러 번 쌓이는 경우를 표현 못할 수 있음"
    evidence: "새 문서 '스키마 관련 유보 사항' 표: 고객/현장/방문 3엔터티 분리 여부 unspecified. manifest.yaml customer_record는 단일 object(written_by: 고객DB저장봇)"
