# =====================================================================
# golden_set_template.yaml — 방역&클린 실제 사례 입력 양식 (빈 템플릿)
#
# 대표님께: 이 파일은 실제 있었던 일을 편하게 채워 넣으시라고 만든
# 빈 양식입니다. 개발 용어는 몰라도 전혀 상관없습니다 — 각 항목 옆에
# "여기에 뭘 적으면 되는지" 쉬운 말로 설명을 달아뒀습니다.
#
# 채우시는 방법:
#   1. 실제 있었던 통화나 문자 내용을 최대한 원문 그대로 적어주세요.
#      말투를 다듬거나 요약하지 마시고, 있는 그대로가 제일 좋습니다.
#      (사투리, 어색한 말투도 그대로 괜찮습니다 — 오히려 더 도움이 됩니다.)
#   2. 잘 모르겠거나 확실하지 않은 항목은 비워두시거나 "모름"이라고만
#      적으셔도 됩니다. 억지로 채우지 않으셔도 됩니다.
#   3. 개인정보(실명, 전화번호 등)가 걱정되시면 살짝 바꿔서 적으셔도
#      됩니다 (예: 실제 이름 대신 "김OO"). 말투나 표현은 최대한
#      그대로 유지해주시면 더 도움이 됩니다.
#   4. 채우신 뒤 그대로 다시 보내주시면 됩니다. 파일 형식은 전혀
#      신경 쓰지 않으셔도 되고, 아래 빈칸(" " 부분)에 텍스트만
#      채워서 보내주셔도 충분합니다. 워드나 메모장에 그냥 옮겨
#      적어서 주셔도 괜찮습니다.
# =====================================================================

# ---------------------------------------------------------------------
# 유형 1. 신규 문의 전화/문자 사례 (2~3건 부탁드립니다)
#   -> 손님이 처음 연락 와서 방역을 문의했던 사례
# ---------------------------------------------------------------------
신규_문의_사례:
  - 번호: 1
    통화_또는_문자_원문: "저희집에 바퀴가 나와서요. 평수 41평정도고 5층이요."
    채널: "미확인"                                    # 전화 / 카카오톡 / 문자 중 하나
    손님이_요청한_내용: "바퀴벌레 방역 (가정집, 41평, 5층)"
    희망_방문일: "미확인"
    소독증명서나_완료보고서를_요청했나요: "미확인"
    이_통화_안에_여러_현장_이야기가_섞여있나요: "미확인 (가정집 1곳으로 추정)"
    확인_필요한_부분: "평수/층수는 현재 스키마 필드에 없어 원문 텍스트로만 보존됨. run.py 테스트 실행(2026-07-11) 결과 PASS - test/실사례_테스트_1_바퀴벌레_가정집.json 참고"

  - 번호: 2
    통화_또는_문자_원문: ""
    채널: ""
    손님이_요청한_내용: ""
    희망_방문일: ""
    소독증명서나_완료보고서를_요청했나요: ""
    이_통화_안에_여러_현장_이야기가_섞여있나요: ""
    확인_필요한_부분: ""

  - 번호: 3
    통화_또는_문자_원문: ""
    채널: ""
    손님이_요청한_내용: ""
    희망_방문일: ""
    소독증명서나_완료보고서를_요청했나요: ""
    이_통화_안에_여러_현장_이야기가_섞여있나요: ""
    확인_필요한_부분: ""

# ---------------------------------------------------------------------
# 유형 2. 정기 방문 리마인더 사례 (1~2건 부탁드립니다)
#   -> 정기 고객사 방문 시기가 돌아와서 다시 방문했던 사례
# ---------------------------------------------------------------------
정기방문_리마인더_사례:
  - 번호: 1
    고객사명: ""                                      # 예: "OO식당" (실명 부담되면 이니셜로 가리셔도 됩니다)
    방문_주기: ""                                      # 예: "2개월마다", "분기마다" 등
    지난번_방문일: ""                                 # 예: "2026-05-10" 또는 "지난 5월쯤"
    이번_방문일: ""
    방문_전에_어떻게_알림을_받으셨나요: ""            # 예: "제가 그냥 달력 보고 기억함", "따로 알림 방법 없음" 등 지금 실제로 하시는 방식
    확인_필요한_부분: ""

  - 번호: 2
    고객사명: ""
    방문_주기: ""
    지난번_방문일: ""
    이번_방문일: ""
    방문_전에_어떻게_알림을_받으셨나요: ""
    확인_필요한_부분: ""

# ---------------------------------------------------------------------
# 유형 3. 완료보고서·소독증명서 요청 사례 (1~2건 부탁드립니다)
#   -> 방역이 끝나고 손님이 서류를 요청했던 사례
# ---------------------------------------------------------------------
문서요청_사례:
  - 번호: 1
    고객명_또는_업체명: ""
    요청한_서류: ""                                   # 완료보고서 / 소독증명서 / 둘 다
    서류에_꼭_들어가야_하는_내용: ""                  # 예: "업체명, 방역일자, 사용 약품명" 등 알고 계신 것만 적어주세요
    실제로_어떻게_전달하셨나요: ""                    # 예: "손으로 써서 줌", "한글 문서로 만들어서 문자로 보냄" 등
    이_문서에_들어간_사업자_정보_상호명_대표자명_사업자등록번호: ""   # 예: "방역&클린 / 홍길동 / 123-45-67890" — 매번 같은 값이면 한 번만 적어주셔도 됩니다
    보내기_전에_대표님이_확인_승인_하셨나요: ""       # 예: "네, 확인하고 보냄" / "바빠서 그냥 보냄" — 지금 실제로 하시는 방식 그대로 적어주세요
    한_번에_확정됐나요_아니면_고치고_다시_보낸_적_있나요: ""   # 예: "한 번에 그대로 나감" / "약품명이 틀려서 한 번 고쳐서 다시 보냄" — 고친 적 있으면 이유도 같이 적어주세요
    확인_필요한_부분: ""

  - 번호: 2
    고객명_또는_업체명: ""
    요청한_서류: ""
    서류에_꼭_들어가야_하는_내용: ""
    실제로_어떻게_전달하셨나요: ""
    이_문서에_들어간_사업자_정보_상호명_대표자명_사업자등록번호: ""
    보내기_전에_대표님이_확인_승인_하셨나요: ""
    한_번에_확정됐나요_아니면_고치고_다시_보낸_적_있나요: ""
    확인_필요한_부분: ""

# ---------------------------------------------------------------------
# 유형 4. 방역과 상관없는 일반 통화 사례 (1~2건 부탁드립니다)
#   -> AI가 "이건 방역 문의가 아니구나"를 구분하는 법을 배우기 위한
#      사례입니다. 방역 얘기가 전혀 아니었던 통화/문자를 적어주시면
#      됩니다 (예: 안부 전화, 다른 용건 전화, 잘못 걸려온 전화 등).
# ---------------------------------------------------------------------
무관한_통화_사례:
  - 번호: 1
    통화_또는_문자_원문_또는_요약: ""                 # 예: "그냥 안부 전화였음, 방역 얘기 없었음"
    왜_방역과_무관한지: ""

  - 번호: 2
    통화_또는_문자_원문_또는_요약: ""
    왜_방역과_무관한지: ""

# ---------------------------------------------------------------------
# 추가로 궁금한 것 3가지 — 아시는 만큼만 적어주세요 (몰라도 괜찮습니다)
# ---------------------------------------------------------------------
추가_확인사항:
  한_통화에_여러_현장_이야기가_섞이는_일이_실제로_자주_있나요: ""
  # 예: "가끔 있음, 한 달에 1~2번 정도" / "거의 없음"

  방역_견적_금액을_정해진_표나_기준으로_계산하시나요: ""
  # 예: "평수 기준 표가 있음" / "그때그때 다르게 정함, 정해진 표 없음"

  현장_방역_끝나고_사진을_찍어두시나요: ""
  # 예: "네, 스마트폰으로 찍어둠" / "아니요, 안 찍음"

# =====================================================================
# (아래는 내부 참고용 — 대표님은 안 보셔도 됩니다)
# 이 템플릿의 각 항목은 클로드 방역 ai/manifest.yaml의 shared_context
# 필드와 아래처럼 매핑됩니다. 실제 값이 채워지면 이 파일을
# golden_set.yaml(꽃집 폴더의 golden_set.yaml과 같은 형식 — 원문 보존 +
# 불확실 값은 null+확인필요 표시)로 옮겨 담을 예정.
#   신규_문의_사례        -> raw_text/source_type, inquiry_classification,
#                            visit_requested_date, report_requested/
#                            certificate_requested(2026-07-07 필드 분리,
#                            예전 document_requested 단일값에서 교체됨),
#                            site_segments(다중현장 여부 -> 현장분리봇 판단 근거)
#   정기방문_리마인더_사례 -> visit_cycle, last_visit_date, reminder_due_list
#   문서요청_사례          -> report_requested/certificate_requested=true 케이스,
#                            document_draft.report/certificate.
#                            [2026-07-07 신규] "이_문서에_들어간_사업자_정보..." ->
#                            business_info(상호명/대표자명/사업자등록번호).
#                            "보내기_전에_대표님이..." -> document_draft.*.approval.status
#                            (승인완료가 아니면 문자장부봇이 발송 자체를 막음).
#                            "한_번에_확정됐나요..." -> approval.rejection_reason/
#                            rejection_target(반려 이력이 있었는지, 표현오류인지
#                            데이터오류인지) — 문서승인 stage의 반려 2갈래 분류
#                            근거로 사용.
#   무관한_통화_사례       -> inquiry_classification=일반문의/스팸무관 negative example
#   추가_확인사항          -> 현장분리봇/견적금액산정봇/현장사진봇 3개의 run_if on/off 결정 근거
# =====================================================================
